class Particle {
    constructor(x, y, vx, vy, life, color, size) {
        this.x = x; this.y = y; this.vx = vx; this.vy = vy;
        this.life = life; this.maxLife = life;
        this.color = color; this.size = size || 3;
    }
    update() {
        this.x += this.vx; this.y += this.vy;
        this.vy += 0.1; this.life--;
        return this.life > 0;
    }
    draw(ctx, camera) {
        ctx.globalAlpha = this.life / this.maxLife;
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x - camera.x, this.y - camera.y, this.size, this.size);
        ctx.globalAlpha = 1;
    }
}

class Player {
    constructor(x, y) {
        this.x = x * TILE_SIZE; this.y = y * TILE_SIZE;
        this.width = 14; this.height = 20;
        this.vx = 0; this.vy = 0;
        this.speed = 3; this.jumpForce = -9;
        this.gravity = 0.45; this.friction = 0.85;
        this.maxFallSpeed = 10;
        this.onGround = false; this.jumping = false;
        this.facing = 1; this.hp = 5; this.maxHp = 5;
        this.coins = 0; this.totalCoins = 0;
        this.dead = false; this.deathTimer = 0;
        this.invincible = 0;
        this.jumpBufferTimer = 0; this.coyoteTimer = 0;
        this.wallSliding = false; this.wallJumpTimer = 0;
        this.dashTimer = 0; this.dashCooldown = 0;
        this.canDash = true; this.dashDir = 0;
        this.animFrame = 0; this.animTimer = 0;
        this.runParticleTimer = 0;
        this.attackTimer = 0; this.attackCooldown = 0;
        this.attackDir = 1;
        this.combo = 0; this.comboTimer = 0;
        this.hasShield = false; this.shieldHp = 0;
        this.damageMultiplier = 1;
        this.cells = 0;
        this.hasPixelCore = false;
    }
    getAttackDamage() {
        let base = 10 + this.combo * 3;
        base *= this.damageMultiplier;
        if (this.hasPixelCore) base *= 1.15;
        return base;
    }
    getAttackBox() {
        if (this.attackTimer <= 0) return null;
        const range = 28;
        const w = range; const h = 20;
        return {
            x: this.facing > 0 ? this.x + this.width : this.x - w,
            y: this.y, width: w, height: h
        };
    }
    attack() {
        if (this.attackCooldown > 0) return;
        this.attackTimer = 8;
        this.attackCooldown = 18;
        this.attackDir = this.facing;
        if (this.comboTimer > 0 && this.combo < 3) this.combo++;
        else this.combo = 1;
        this.comboTimer = 30;
    }
    takeDamage(amount) {
        if (this.invincible > 0 || this.dead) return;
        if (this.hasShield && this.shieldHp > 0) {
            this.shieldHp -= amount;
            if (this.shieldHp <= 0) this.hasShield = false;
            this.invincible = 30;
            return;
        }
        this.hp -= amount;
        this.invincible = 60;
        if (this.hp <= 0) { this.hp = 0; this.dead = true; this.deathTimer = 60; }
    }
    update(keys, platforms, level) {
        if (this.dead) { this.deathTimer--; return; }
        if (this.invincible > 0) this.invincible--;
        if (this.attackTimer > 0) this.attackTimer--;
        if (this.attackCooldown > 0) this.attackCooldown--;
        if (this.comboTimer > 0) { this.comboTimer--; if (this.comboTimer <= 0) this.combo = 0; }
        if (this.jumpBufferTimer > 0) this.jumpBufferTimer--;
        if (this.dashCooldown > 0) this.dashCooldown--;

        // Dash
        if (this.dashTimer > 0) {
            this.dashTimer--;
            this.vx = this.dashDir * 10;
            this.vy = 0;
            this.gravity = 0;
            if (this.dashTimer <= 0) { this.gravity = 0.45; }
            return this.applyPhysics(platforms, level);
        }
        this.gravity = 0.45;

        // Movement
        let moveX = 0;
        if (keys['ArrowLeft'] || keys['KeyA']) { moveX = -1; this.facing = -1; }
        if (keys['ArrowRight'] || keys['KeyD']) { moveX = 1; this.facing = 1; }
        this.vx += moveX * this.speed * 0.3;
        this.vx *= this.friction;

        // Jump
        if (keys['ArrowUp'] || keys['KeyW'] || keys['Space']) {
            this.jumpBufferTimer = 8;
        }
        if (this.jumpBufferTimer > 0 && (this.onGround || this.coyoteTimer > 0)) {
            this.vy = this.jumpForce;
            this.onGround = false;
            this.jumping = true;
            this.jumpBufferTimer = 0;
            this.coyoteTimer = 0;
        }
        if (this.jumping && !(keys['ArrowUp'] || keys['KeyW'] || keys['Space']) && this.vy < 0) {
            this.vy *= 0.5;
            this.jumping = false;
        }

        // Dash
        if ((keys['ShiftLeft'] || keys['ShiftRight']) && this.dashCooldown <= 0 && this.canDash) {
            this.dashTimer = 6;
            this.dashDir = this.facing;
            this.dashCooldown = 40;
            this.canDash = false;
        }
        if (this.onGround) this.canDash = true;

        // Attack
        if (keys['KeyX'] || keys['KeyJ']) {
            this.attack();
            keys['KeyX'] = false;
            keys['KeyJ'] = false;
        }

        this.applyPhysics(platforms, level);

        // Animation
        this.animTimer++;
        if (Math.abs(this.vx) > 0.5 && this.onGround) {
            if (this.animTimer % 8 === 0) this.animFrame = (this.animFrame + 1) % 4;
        } else { this.animFrame = 0; }
    }
    applyPhysics(platforms, level) {
        this.vy += this.gravity;
        if (this.vy > this.maxFallSpeed) this.vy = this.maxFallSpeed;

        this.x += this.vx;
        this.resolveCollisionsX(platforms);

        const wasOnGround = this.onGround;
        this.y += this.vy;
        this.onGround = false;
        this.resolveCollisionsY(platforms);

        if (wasOnGround && !this.onGround) this.coyoteTimer = 6;
        if (this.onGround) this.coyoteTimer = 0;

        // World bounds
        if (this.x < 0) this.x = 0;
        if (level && this.x + this.width > level.width * TILE_SIZE) this.x = level.width * TILE_SIZE - this.width;
        if (this.y > (level ? level.height : 30) * TILE_SIZE + 100) {
            this.takeDamage(1);
            if (!this.dead && level) {
                this.x = level.spawnPoint.x * TILE_SIZE;
                this.y = level.spawnPoint.y * TILE_SIZE;
                this.vx = 0; this.vy = 0;
            }
        }
    }
    resolveCollisionsX(platforms) {
        if (!platforms) return;
        platforms.forEach(p => {
            if (p.type === 'solid' || p.type === 'ice') {
                const px = p.x * TILE_SIZE, py = p.y * TILE_SIZE;
                const pw = p.w * TILE_SIZE, ph = p.h * TILE_SIZE;
                if (this.x + this.width > px && this.x < px + pw &&
                    this.y + this.height > py && this.y < py + ph) {
                    if (this.vx > 0) this.x = px - this.width;
                    else if (this.vx < 0) this.x = px + pw;
                    this.vx = 0;
                }
            }
        });
    }
    resolveCollisionsY(platforms) {
        if (!platforms) return;
        platforms.forEach(p => {
            const px = p.x * TILE_SIZE, py = p.y * TILE_SIZE;
            const pw = p.w * TILE_SIZE, ph = p.h * TILE_SIZE;
            if (p.type === 'solid' || p.type === 'ice') {
                if (this.x + this.width > px && this.x < px + pw &&
                    this.y + this.height > py && this.y < py + ph) {
                    if (this.vy > 0) {
                        this.y = py - this.height;
                        this.vy = 0;
                        this.onGround = true;
                    } else if (this.vy < 0) {
                        this.y = py + ph;
                        this.vy = 0;
                    }
                }
            } else if (p.type === 'platform' || p.type === 'crumbling') {
                if (this.x + this.width > px && this.x < px + pw &&
                    this.y + this.height > py && this.y + this.height < py + ph + 10 &&
                    this.vy >= 0) {
                    this.y = py - this.height;
                    this.vy = 0;
                    this.onGround = true;
                }
            }
        });
    }
    draw(ctx, camera) {
        if (this.dead) return;
        const sx = Math.round(this.x - camera.x);
        const sy = Math.round(this.y - camera.y);

        if (this.invincible > 0 && Math.floor(this.invincible / 3) % 2 === 0) return;

        // Dash trail
        if (this.dashTimer > 0) {
            ctx.globalAlpha = 0.4;
            ctx.fillStyle = COLORS.dash;
            ctx.fillRect(sx - this.dashDir * 8, sy, this.width, this.height);
            ctx.globalAlpha = 1;
        }

        ctx.save();
        ctx.translate(sx + this.width / 2, sy);
        ctx.scale(this.facing, 1);

        // Body
        ctx.fillStyle = COLORS.player;
        ctx.fillRect(-this.width / 2 + 2, 4, 10, 12);
        // Head
        ctx.fillStyle = COLORS.player;
        ctx.fillRect(-this.width / 2 + 3, 0, 8, 6);
        // Eye
        ctx.fillStyle = '#fff';
        ctx.fillRect(-this.width / 2 + 7, 2, 3, 2);
        ctx.fillStyle = '#000';
        ctx.fillRect(-this.width / 2 + 8, 2, 2, 2);
        // Legs
        ctx.fillStyle = COLORS.playerDark;
        const legAnim = Math.sin(this.animFrame * Math.PI / 2) * 2;
        ctx.fillRect(-this.width / 2 + 3, 16, 3, 4 + (this.onGround ? legAnim : 0));
        ctx.fillRect(-this.width / 2 + 8, 16, 3, 4 - (this.onGround ? legAnim : 0));

        // Attack visual
        if (this.attackTimer > 0) {
            ctx.fillStyle = '#fff';
            ctx.globalAlpha = this.attackTimer / 8;
            const aw = 24, ah = 4;
            ctx.fillRect(this.width / 2 - 4, 6, aw, ah);
            ctx.fillRect(this.width / 2 - 4, 10, aw - 4, ah);
            ctx.globalAlpha = 1;
        }

        // Shield
        if (this.hasShield) {
            ctx.globalAlpha = 0.3;
            ctx.strokeStyle = COLORS.shield;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(0, this.height / 2, this.width, 0, Math.PI * 2);
            ctx.stroke();
            ctx.globalAlpha = 1;
        }

        ctx.restore();
    }
}

class Enemy {
    constructor(x, y, type, range) {
        this.x = x * TILE_SIZE; this.y = y * TILE_SIZE;
        this.startX = this.x; this.startY = this.y;
        this.width = 16; this.height = 16;
        this.type = type || 'walker';
        this.range = range || 60;
        this.vx = 1; this.vy = 0;
        this.hp = 3; this.maxHp = 3;
        this.alive = true; this.direction = 1;
        this.animTimer = 0; this.hurtTimer = 0;
        this.damage = 1;
    }
    takeDamage(amount) {
        this.hp -= amount;
        this.hurtTimer = 10;
        if (this.hp <= 0) this.alive = false;
    }
    update() {
        if (!this.alive) return;
        this.animTimer++;
        if (this.hurtTimer > 0) this.hurtTimer--;
        this.x += this.vx * this.direction;
        if (Math.abs(this.x - this.startX) > this.range) this.direction *= -1;
    }
    draw(ctx, camera) {
        if (!this.alive) return;
        const sx = this.x - camera.x;
        const sy = this.y - camera.y;
        if (this.hurtTimer > 0 && this.hurtTimer % 2 === 0) return;
        ctx.fillStyle = COLORS.enemy;
        ctx.fillRect(sx + 2, sy + 4, 12, 12);
        ctx.fillRect(sx + 4, sy, 8, 6);
        ctx.fillStyle = '#fff';
        ctx.fillRect(sx + 4 + (this.direction > 0 ? 4 : 0), sy + 2, 3, 3);
        ctx.fillStyle = '#000';
        ctx.fillRect(sx + 5 + (this.direction > 0 ? 4 : 0), sy + 3, 1, 1);
        ctx.fillStyle = COLORS.enemyDark;
        const la = Math.sin(this.animTimer * 0.15) * 2;
        ctx.fillRect(sx + 3, sy + 14, 3, 3 + la);
        ctx.fillRect(sx + 10, sy + 14, 3, 3 - la);
        if (this.hp < this.maxHp) {
            ctx.fillStyle = '#300'; ctx.fillRect(sx, sy - 4, this.width, 2);
            ctx.fillStyle = '#f44'; ctx.fillRect(sx, sy - 4, this.width * (this.hp / this.maxHp), 2);
        }
    }
}

class Game {
    constructor() {
        this.state = 'menu';
        this.currentLevel = 0;
        this.keys = {};
        this.camera = { x: 0, y: 0 };
        this.particles = [];
        this.screenShake = 0;
        this.player = null;
        this.enemies = [];
        this.coins = [];
        this.platforms = [];
        this.movingPlatforms = [];
        this.spikes = [];
        this.springs = [];
        this.trampolines = [];
        this.checkpoints = [];
        this.portal = null;
        this.activeCheckpoint = null;
        this.levelComplete = false;
        this.levelCompleteTimer = 0;
        this.menuAnim = 0;
        this.time = 0;

        // *** BOSS INTEGRATION ***
        this.boss = null;
        this.bossActive = false;
        this.bossDefeated = false;
        this.bossGlitchEffect = new GlitchEffect();
        this.bossPortal = null;
        this.bossVictoryTimer = 0;
        this.bossRewards = null;
        this.bossVictoryShown = false;
        this.previousLevel = 0;
        this.inBossArena = false;
        this.bossBattleStartTime = 0;

        this.setupInput();
    }

    setupInput() {
        window.addEventListener('keydown', e => {
            this.keys[e.code] = true;
            if (e.code === 'Enter' || e.code === 'Space') {
                if (this.state === 'menu') this.startGame();
                else if (this.state === 'gameover') this.startGame();
                else if (this.state === 'boss_victory') this.exitBossArena();
            }
            if (e.code === 'KeyE' && this.state === 'playing') {
                this.tryEnterBossPortal();
            }
        });
        window.addEventListener('keyup', e => this.keys[e.code] = false);
    }

    startGame() {
        this.state = 'playing';
        this.currentLevel = 0;
        this.bossDefeated = false;
        this.inBossArena = false;
        this.loadLevel(0);
    }

    loadLevel(index) {
        if (index >= LEVELS.length) {
            this.state = 'menu';
            return;
        }
        this.currentLevel = index;
        const level = LEVELS[index];

        if (!this.player) {
            this.player = new Player(level.spawnPoint.x, level.spawnPoint.y);
        } else {
            this.player.x = level.spawnPoint.x * TILE_SIZE;
            this.player.y = level.spawnPoint.y * TILE_SIZE;
            this.player.vx = 0; this.player.vy = 0;
            this.player.dead = false;
            if (!this.inBossArena) {
                this.player.hp = this.player.maxHp;
            }
        }

        this.platforms = level.platforms ? JSON.parse(JSON.stringify(level.platforms)) : [];
        this.coins = level.coins ? level.coins.map(c => ({ ...c, collected: false })) : [];
        this.enemies = level.enemies ? level.enemies.map(e => new Enemy(e.x, e.y, e.type, e.range)) : [];
        this.spikes = level.spikes ? [...level.spikes] : [];
        this.springs = level.springs ? [...level.springs] : [];
        this.trampolines = level.trampolines ? [...level.trampolines] : [];
        this.checkpoints = level.checkpoints ? level.checkpoints.map(c => ({ ...c, activated: false })) : [];
        this.portal = level.portal ? { ...level.portal } : null;
        this.movingPlatforms = level.movingPlatforms ? level.movingPlatforms.map(mp => ({
            ...mp, startX: mp.x, startY: mp.y, progress: 0
        })) : [];
        this.particles = [];
        this.levelComplete = false;
        this.levelCompleteTimer = 0;
        this.activeCheckpoint = null;
        this.screenShake = 0;
        this.inBossArena = !!level.isBossArena;

        // Setup boss portal if this level has one
        this.bossPortal = null;
        if (level.bossPortalPosition && !this.bossDefeated) {
            this.bossPortal = new BossPortal(
                level.bossPortalPosition.x * TILE_SIZE,
                level.bossPortalPosition.y * TILE_SIZE
            );
        }

        // If boss arena, spawn boss
        if (level.isBossArena) {
            this.spawnBoss();
        } else {
            this.boss = null;
            this.bossActive = false;
        }
    }

    // *** BOSS METHODS ***
    spawnBoss() {
        const spawnX = 25 * TILE_SIZE - 40;
        const spawnY = 20 * TILE_SIZE;
        this.boss = new NexusBoss(spawnX, spawnY);
        this.bossActive = true;
        this.bossBattleStartTime = Date.now();
        this.bossVictoryShown = false;
        this.bossRewards = null;
        this.bossVictoryTimer = 0;
    }

    tryEnterBossPortal() {
        if (!this.bossPortal || !this.player || this.bossDefeated) return;
        if (this.bossPortal.canInteract(this.player)) {
            this.previousLevel = this.currentLevel;
            // Boss arena is the last level in LEVELS
            const bossLevelIndex = LEVELS.length - 1;
            this.loadLevel(bossLevelIndex);
        }
    }

    exitBossArena() {
        this.state = 'playing';
        this.inBossArena = false;
        // Apply rewards
        if (this.bossRewards && this.player) {
            this.player.coins += this.bossRewards.gold;
            this.player.cells += this.bossRewards.cells;
            if (this.bossRewards.pixelCore) {
                this.player.hasPixelCore = true;
            }
        }
        this.loadLevel(this.previousLevel);
    }

    updateBoss() {
        if (!this.boss || !this.bossActive) return;
        if (!this.player || this.player.dead) return;

        this.boss.update(this.player, this.platforms, TILE_SIZE);

        // Glitch
        if (this.boss.glitchIntensity > 0) {
            this.bossGlitchEffect.activate(this.boss.glitchIntensity);
        } else {
            this.bossGlitchEffect.deactivate();
        }
        this.bossGlitchEffect.update();

        // Screen shake from boss
        if (this.boss.screenShake > 0) {
            this.screenShake = Math.max(this.screenShake, this.boss.screenShake);
        }

        // Player damage from boss
        if (this.player.invincible <= 0) {
            const bossHit = this.boss.checkCollisions(this.player);
            if (bossHit.hit && bossHit.damage > 0) {
                this.player.takeDamage(Math.ceil(bossHit.damage / 10)); // Scale damage to game's HP system
                this.screenShake = Math.max(this.screenShake, 3);
                this.spawnParticles(this.player.x + this.player.width / 2, this.player.y + this.player.height / 2, '#ff4444', 8);
            }
        }

        // Player attacks boss
        const atkBox = this.player.getAttackBox();
        if (atkBox && this.player.attackTimer === 7) { // First frame of attack
            const dmg = this.player.getAttackDamage();
            // Check boss
            if (this.boss.checkHitByPlayer(atkBox)) {
                this.boss.takeDamage(dmg);
                this.screenShake = Math.max(this.screenShake, 2);
                this.spawnParticles(this.boss.x + this.boss.width / 2, this.boss.y + this.boss.height / 2, '#0fa', 6);
            }
            // Check minions
            this.boss.checkMinionHit(atkBox, dmg);
        }

        // Platform hiding from Death Cry
        if (this.boss.platformsHidden) {
            // We handle this in collision — skip platform types temporarily
            // by marking them. We'll restore after.
        }

        // Boss death check
        if (this.boss.isDead()) {
            this.bossActive = false;
            this.bossDefeated = true;
            this.state = 'boss_victory';
            this.bossVictoryTimer = 0;
            this.generateBossRewards();
        }
    }

    generateBossRewards() {
        const battleTime = ((Date.now() - this.bossBattleStartTime) / 1000).toFixed(1);
        this.bossRewards = {
            gold: 50 + Math.floor(Math.random() * 31),
            cells: 8 + Math.floor(Math.random() * 5),
            battleTime: battleTime,
            pixelCore: true
        };
    }

    spawnParticles(x, y, color, count) {
        for (let i = 0; i < count; i++) {
            this.particles.push(new Particle(
                x, y,
                (Math.random() - 0.5) * 4,
                (Math.random() - 0.5) * 4 - 2,
                20 + Math.random() * 20,
                color,
                2 + Math.random() * 3
            ));
        }
    }

    update() {
        this.time++;
        if (this.state === 'menu') { this.menuAnim++; return; }
        if (this.state === 'gameover') return;
        if (this.state === 'boss_victory') {
            this.bossVictoryTimer++;
            // Still update boss death animation
            if (this.boss) this.boss.update(this.player, this.platforms, TILE_SIZE);
            return;
        }
        if (this.state !== 'playing') return;

        const level = LEVELS[this.currentLevel];
        if (!level) return;

        // Update player
        // Handle platform hiding for death cry
        let effectivePlatforms = this.platforms;
        if (this.boss && this.boss.platformsHidden) {
            effectivePlatforms = this.platforms.filter(p => p.type === 'solid');
        }
        this.player.update(this.keys, effectivePlatforms, level);

        if (this.player.dead) {
            if (this.player.deathTimer <= 0) {
                if (this.inBossArena) {
                    // Restart boss fight
                    this.loadLevel(this.currentLevel);
                } else if (this.activeCheckpoint) {
                    this.player.dead = false;
                    this.player.hp = this.player.maxHp;
                    this.player.x = this.activeCheckpoint.x * TILE_SIZE;
                    this.player.y = this.activeCheckpoint.y * TILE_SIZE;
                    this.player.vx = 0; this.player.vy = 0;
                } else {
                    this.player.dead = false;
                    this.player.hp = this.player.maxHp;
                    this.player.x = level.spawnPoint.x * TILE_SIZE;
                    this.player.y = level.spawnPoint.y * TILE_SIZE;
                    this.player.vx = 0; this.player.vy = 0;
                }
            }
            return;
        }

        // Level complete
        if (this.levelComplete) {
            this.levelCompleteTimer++;
            if (this.levelCompleteTimer > 60) {
                this.loadLevel(this.currentLevel + 1);
            }
            return;
        }

        // Update boss
        this.updateBoss();

        // Update boss portal
        if (this.bossPortal) this.bossPortal.update();

        // Enemies
        this.enemies.forEach(e => {
            e.update();
            if (e.alive && this.player) {
                // Player hits enemy
                const atkBox = this.player.getAttackBox();
                if (atkBox && this.player.attackTimer === 7) {
                    if (atkBox.x + atkBox.width > e.x && atkBox.x < e.x + e.width &&
                        atkBox.y + atkBox.height > e.y && atkBox.y < e.y + e.height) {
                        e.takeDamage(this.player.getAttackDamage());
                        this.spawnParticles(e.x + e.width / 2, e.y + e.height / 2, COLORS.enemy, 5);
                        this.screenShake = 2;
                    }
                }
                // Enemy hits player
                if (this.player.invincible <= 0 &&
                    this.player.x + this.player.width > e.x && this.player.x < e.x + e.width &&
                    this.player.y + this.player.height > e.y && this.player.y < e.y + e.height) {
                    this.player.takeDamage(e.damage);
                    this.player.vx = (this.player.x < e.x ? -4 : 4);
                    this.player.vy = -3;
                    this.screenShake = 3;
                }
            }
        });

        // Coins
        this.coins.forEach(c => {
            if (!c.collected) {
                const cx = c.x * TILE_SIZE, cy = c.y * TILE_SIZE;
                if (this.player.x + this.player.width > cx && this.player.x < cx + TILE_SIZE &&
                    this.player.y + this.player.height > cy && this.player.y < cy + TILE_SIZE) {
                    c.collected = true;
                    this.player.coins++;
                    this.player.totalCoins++;
                    this.spawnParticles(cx + 8, cy + 8, COLORS.coin, 5);
                }
            }
        });

        // Spikes
        this.spikes.forEach(s => {
            const sx = s.x * TILE_SIZE, sy = s.y * TILE_SIZE;
            const sw = s.w * TILE_SIZE;
            if (this.player.x + this.player.width > sx && this.player.x < sx + sw &&
                this.player.y + this.player.height > sy && this.player.y < sy + TILE_SIZE) {
                this.player.takeDamage(1);
                this.player.vy = -6;
            }
        });

        // Springs
        if (this.springs) {
            this.springs.forEach(s => {
                const sx = s.x * TILE_SIZE, sy = s.y * TILE_SIZE;
                if (this.player.x + this.player.width > sx && this.player.x < sx + TILE_SIZE &&
                    this.player.y + this.player.height > sy && this.player.y < sy + TILE_SIZE &&
                    this.player.vy >= 0) {
                    this.player.vy = s.power || -14;
                    this.spawnParticles(sx + 8, sy, COLORS.spring, 5);
                }
            });
        }

        // Trampolines
        if (this.trampolines) {
            this.trampolines.forEach(t => {
                const tx = t.x * TILE_SIZE, ty = t.y * TILE_SIZE;
                if (this.player.x + this.player.width > tx && this.player.x < tx + TILE_SIZE &&
                    this.player.y + this.player.height > ty && this.player.y < ty + TILE_SIZE &&
                    this.player.vy >= 0) {
                    this.player.vy = t.power || -18;
                    this.spawnParticles(tx + 8, ty, COLORS.trampoline, 8);
                }
            });
        }

        // Checkpoints
        this.checkpoints.forEach(c => {
            const cx = c.x * TILE_SIZE, cy = c.y * TILE_SIZE;
            if (!c.activated &&
                this.player.x + this.player.width > cx && this.player.x < cx + TILE_SIZE &&
                this.player.y + this.player.height > cy && this.player.y < cy + TILE_SIZE) {
                c.activated = true;
                this.activeCheckpoint = c;
                this.spawnParticles(cx + 8, cy + 8, COLORS.checkpoint, 10);
            }
        });

        // Moving platforms
        this.movingPlatforms.forEach(mp => {
            mp.progress += mp.speed || 0.01;
            const t = (Math.sin(mp.progress) + 1) / 2;
            const oldX = mp.x;
            const oldY = mp.y;
            mp.x = mp.startX + (mp.moveX || 0) * t;
            mp.y = mp.startY + (mp.moveY || 0) * t;
            const dx = (mp.x - oldX) * TILE_SIZE;
            const dy = (mp.y - oldY) * TILE_SIZE;
            const px = mp.x * TILE_SIZE, py = mp.y * TILE_SIZE;
            const pw = mp.w * TILE_SIZE;
            if (this.player.x + this.player.width > px && this.player.x < px + pw &&
                this.player.y + this.player.height >= py - 2 && this.player.y + this.player.height <= py + 6 &&
                this.player.vy >= 0) {
                this.player.x += dx;
                this.player.y = py - this.player.height;
                this.player.vy = 0;
                this.player.onGround = true;
            }
        });

        // Portal
        if (this.portal && !this.inBossArena) {
            const px = this.portal.x * TILE_SIZE, py = this.portal.y * TILE_SIZE;
            if (this.player.x + this.player.width > px && this.player.x < px + TILE_SIZE * 2 &&
                this.player.y + this.player.height > py && this.player.y < py + TILE_SIZE * 2) {
                this.levelComplete = true;
                this.spawnParticles(px + TILE_SIZE, py + TILE_SIZE, COLORS.portal, 20);
            }
        }

        // Particles
        this.particles = this.particles.filter(p => p.update());

        // Camera
        const targetX = this.player.x - canvas.width / 2 + this.player.width / 2;
        const targetY = this.player.y - canvas.height / 2 + this.player.height / 2;
        this.camera.x += (targetX - this.camera.x) * 0.1;
        this.camera.y += (targetY - this.camera.y) * 0.1;
        this.camera.x = Math.max(0, Math.min(level.width * TILE_SIZE - canvas.width, this.camera.x));
        this.camera.y = Math.max(0, Math.min(level.height * TILE_SIZE - canvas.height, this.camera.y));

        if (this.screenShake > 0) this.screenShake -= 0.3;
    }

    draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (this.state === 'menu') { this.drawMenu(); return; }
        if (this.state === 'gameover') { this.drawGameOver(); return; }
        if (this.state === 'boss_victory') {
            this.drawGame();
            this.drawBossVictory();
            return;
        }
        if (this.state === 'playing') this.drawGame();
    }

    drawGame() {
        const level = LEVELS[this.currentLevel];
        if (!level) return;

        // Screen shake
        ctx.save();
        if (this.screenShake > 0) {
            ctx.translate(
                (Math.random() - 0.5) * this.screenShake * 2,
                (Math.random() - 0.5) * this.screenShake * 2
            );
        }

        // Background
        const bg = level.background || { top: '#1a1a2e', bottom: '#2a1a3e' };
        const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
        gradient.addColorStop(0, bg.top);
        gradient.addColorStop(1, bg.bottom);
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Boss arena background
        if (this.inBossArena) {
            this.drawBossArenaBackground();
        }

        // Platforms
        this.platforms.forEach(p => {
            const px = p.x * TILE_SIZE - this.camera.x;
            const py = p.y * TILE_SIZE - this.camera.y;
            const pw = p.w * TILE_SIZE;
            const ph = p.h * TILE_SIZE;

            // Skip drawing if hidden by death cry (platforms only, not solid)
            if (this.boss && this.boss.platformsHidden && p.type === 'platform') {
                ctx.globalAlpha = 0.2;
            }

            if (p.type === 'solid') {
                ctx.fillStyle = COLORS.ground;
                ctx.fillRect(px, py, pw, ph);
                ctx.fillStyle = COLORS.groundLight;
                ctx.fillRect(px, py, pw, 2);
                ctx.fillStyle = COLORS.groundDark;
                for (let gx = 0; gx < pw; gx += TILE_SIZE) {
                    for (let gy = 0; gy < ph; gy += TILE_SIZE) {
                        if ((gx / TILE_SIZE + gy / TILE_SIZE) % 2 === 0) {
                            ctx.fillRect(px + gx + 2, py + gy + 2, TILE_SIZE - 4, TILE_SIZE - 4);
                        }
                    }
                }
            } else if (p.type === 'platform' || p.type === 'crumbling') {
                ctx.fillStyle = p.type === 'crumbling' ? COLORS.crumbling : COLORS.platform;
                ctx.fillRect(px, py, pw, 6);
                ctx.fillStyle = p.type === 'crumbling' ? COLORS.crumblingWeak : COLORS.groundLight;
                ctx.fillRect(px, py, pw, 2);
            } else if (p.type === 'ice') {
                ctx.fillStyle = COLORS.ice;
                ctx.fillRect(px, py, pw, ph);
                ctx.fillStyle = COLORS.iceShine;
                ctx.globalAlpha = 0.5;
                ctx.fillRect(px + 4, py + 2, pw / 3, 2);
                ctx.globalAlpha = 1;
            }
            ctx.globalAlpha = 1;
        });

        // Moving platforms
        this.movingPlatforms.forEach(mp => {
            const mx = mp.x * TILE_SIZE - this.camera.x;
            const my = mp.y * TILE_SIZE - this.camera.y;
            const mw = mp.w * TILE_SIZE;
            ctx.fillStyle = COLORS.movingPlat;
            ctx.fillRect(mx, my, mw, TILE_SIZE);
            ctx.fillStyle = '#9999cc';
            ctx.fillRect(mx, my, mw, 2);
        });

        // Spikes
        this.spikes.forEach(s => {
            for (let i = 0; i < s.w; i++) {
                const sx = (s.x + i) * TILE_SIZE - this.camera.x;
                const sy = s.y * TILE_SIZE - this.camera.y;
                ctx.fillStyle = COLORS.spike;
                ctx.beginPath();
                ctx.moveTo(sx, sy + TILE_SIZE);
                ctx.lineTo(sx + TILE_SIZE / 2, sy + 2);
                ctx.lineTo(sx + TILE_SIZE, sy + TILE_SIZE);
                ctx.fill();
                ctx.fillStyle = COLORS.spikeDark;
                ctx.beginPath();
                ctx.moveTo(sx + 2, sy + TILE_SIZE);
                ctx.lineTo(sx + TILE_SIZE / 2, sy + 4);
                ctx.lineTo(sx + TILE_SIZE / 2, sy + TILE_SIZE);
                ctx.fill();
            }
        });

        // Springs
        if (this.springs) {
            this.springs.forEach(s => {
                const sx = s.x * TILE_SIZE - this.camera.x;
                const sy = s.y * TILE_SIZE - this.camera.y;
                ctx.fillStyle = COLORS.springCoil;
                ctx.fillRect(sx + 2, sy + 10, TILE_SIZE - 4, 6);
                ctx.fillStyle = COLORS.spring;
                ctx.fillRect(sx, sy + 6, TILE_SIZE, 4);
                ctx.fillRect(sx + 4, sy + 4, TILE_SIZE - 8, 2);
            });
        }

        // Trampolines
        if (this.trampolines) {
            this.trampolines.forEach(t => {
                const tx = t.x * TILE_SIZE - this.camera.x;
                const ty = t.y * TILE_SIZE - this.camera.y;
                ctx.fillStyle = COLORS.trampoline;
                ctx.fillRect(tx, ty + 10, TILE_SIZE, 6);
                ctx.fillStyle = COLORS.trampolinePad;
                const bounce = Math.sin(this.time * 0.1) * 2;
                ctx.fillRect(tx - 2, ty + 4 + bounce, TILE_SIZE + 4, 6);
            });
        }

        // Checkpoints
        this.checkpoints.forEach(c => {
            const cx = c.x * TILE_SIZE - this.camera.x;
            const cy = c.y * TILE_SIZE - this.camera.y;
            ctx.fillStyle = c.activated ? COLORS.checkpointActive : COLORS.checkpoint;
            ctx.fillRect(cx + 6, cy, 4, TILE_SIZE);
            if (c.activated) {
                ctx.fillStyle = COLORS.checkpointActive;
                const fw = 8 + Math.sin(this.time * 0.05) * 2;
                ctx.fillRect(cx + 10, cy + 2, fw, 6);
            }
        });

        // Coins
        this.coins.forEach(c => {
            if (c.collected) return;
            const cx = c.x * TILE_SIZE - this.camera.x;
            const cy = c.y * TILE_SIZE - this.camera.y;
            const bounce = Math.sin(this.time * 0.08 + c.x) * 2;
            ctx.fillStyle = COLORS.coin;
            ctx.beginPath();
            const coinW = 5 + Math.abs(Math.sin(this.time * 0.05 + c.x)) * 3;
            ctx.ellipse(cx + 8, cy + 6 + bounce, coinW, 6, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = COLORS.coinDark;
            ctx.beginPath();
            ctx.ellipse(cx + 8, cy + 6 + bounce, coinW - 2, 4, 0, 0, Math.PI * 2);
            ctx.fill();
        });

        // Portal
        if (this.portal) {
            const px = this.portal.x * TILE_SIZE - this.camera.x;
            const py = this.portal.y * TILE_SIZE - this.camera.y;
            ctx.fillStyle = COLORS.portalGlow;
            ctx.globalAlpha = 0.3 + Math.sin(this.time * 0.05) * 0.1;
            ctx.beginPath();
            ctx.arc(px + TILE_SIZE, py + TILE_SIZE, 20, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
            ctx.fillStyle = COLORS.portal;
            ctx.fillRect(px + 4, py, TILE_SIZE * 2 - 8, TILE_SIZE * 2);
            ctx.fillStyle = '#fff';
            ctx.globalAlpha = 0.5 + Math.sin(this.time * 0.1) * 0.3;
            ctx.fillRect(px + 8, py + 4, TILE_SIZE - 4, TILE_SIZE * 2 - 8);
            ctx.globalAlpha = 1;
        }

        // Boss portal
        if (this.bossPortal) {
            this.bossPortal.draw(ctx, this.camera);
        }

        // Enemies
        this.enemies.forEach(e => e.draw(ctx, this.camera));

        // Player
        this.player.draw(ctx, this.camera);

        // *** BOSS DRAW ***
        if (this.boss) {
            this.boss.draw(ctx, this.camera);
            this.boss.drawHPBar(ctx, canvas.width);
        }

        // Particles
        this.particles.forEach(p => p.draw(ctx, this.camera));

        ctx.restore();

        // Glitch effect (applied after restore to affect whole screen)
        if (this.bossGlitchEffect.active) {
            this.bossGlitchEffect.apply(ctx, canvas);
        }

        // HUD
        this.drawHUD();

        // Level complete overlay
        if (this.levelComplete) {
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 32px monospace';
            ctx.textAlign = 'center';
            ctx.fillText('LEVEL COMPLETE!', canvas.width / 2, canvas.height / 2);
            ctx.textAlign = 'left';
        }
    }

    drawBossArenaBackground() {
        const time = Date.now() * 0.001;
        for (let i = 0; i < 20; i++) {
            const px = (Math.sin(time * 0.3 + i * 1.7) * 0.5 + 0.5) * canvas.width;
            const py = (Math.cos(time * 0.2 + i * 2.3) * 0.5 + 0.5) * canvas.height;
            const size = 2 + Math.sin(time + i) * 1;
            ctx.globalAlpha = 0.1 + Math.sin(time * 0.5 + i) * 0.05;
            ctx.fillStyle = `hsl(${270 + i * 5}, 60%, 40%)`;
            ctx.fillRect(px, py, size, size);
        }
        ctx.globalAlpha = 1;
    }

    drawHUD() {
        // HP
        const hudY = this.inBossArena ? 55 : 10; // Move down if boss HP bar is showing
        for (let i = 0; i < this.player.maxHp; i++) {
            const hx = 10 + i * 20;
            ctx.fillStyle = i < this.player.hp ? COLORS.heart : '#333';
            ctx.beginPath();
            ctx.moveTo(hx + 7, hx === 10 ? hudY + 4 : hudY + 4);
            ctx.arc(hx + 4, hudY + 3, 4, Math.PI, 0);
            ctx.arc(hx + 10, hudY + 3, 4, Math.PI, 0);
            ctx.lineTo(hx + 14, hudY + 4);
            ctx.lineTo(hx + 7, hudY + 14);
            ctx.fill();
        }

        // Coins
        ctx.fillStyle = COLORS.coin;
        ctx.font = 'bold 14px monospace';
        ctx.fillText(`💰 ${this.player.coins}`, 10, hudY + 32);

        // Cells
        ctx.fillStyle = '#44aaff';
        ctx.fillText(`🔷 ${this.player.cells}`, 80, hudY + 32);

        // Level name
        const level = LEVELS[this.currentLevel];
        if (level) {
            ctx.fillStyle = '#aaa';
            ctx.font = '10px monospace';
            ctx.fillText(level.name, 10, hudY + 48);
        }

        // Pixel Core indicator
        if (this.player.hasPixelCore) {
            ctx.fillStyle = '#0fa';
            ctx.font = '10px monospace';
            ctx.fillText('✦ Pixel Core Active', canvas.width - 140, hudY + 14);
        }

        // Combo
        if (this.player.combo > 1) {
            ctx.fillStyle = '#ff8800';
            ctx.font = 'bold 12px monospace';
            ctx.fillText(`COMBO x${this.player.combo}`, canvas.width - 100, hudY + 32);
        }

        // Shield
        if (this.player.hasShield) {
            ctx.fillStyle = COLORS.shield;
            ctx.font = '10px monospace';
            ctx.fillText(`🛡 ${this.player.shieldHp}`, 150, hudY + 32);
        }

        // Boss portal hint
        if (this.bossPortal && this.bossPortal.canInteract(this.player)) {
            ctx.fillStyle = '#c44fff';
            ctx.font = 'bold 14px monospace';
            ctx.textAlign = 'center';
            ctx.fillText('Press E to enter Boss Arena', canvas.width / 2, canvas.height - 40);
            ctx.textAlign = 'left';
        }
    }

    drawBossVictory() {
        const progress = Math.min(1, this.bossVictoryTimer / 60);
        ctx.globalAlpha = progress * 0.6;
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.globalAlpha = progress;

        const cx = canvas.width / 2;
        const cy = canvas.height / 2;

        ctx.fillStyle = '#0fa';
        ctx.font = 'bold 28px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('NEXUS DEFEATED', cx, cy - 80);

        ctx.strokeStyle = '#0fa'; ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(cx - 120, cy - 65);
        ctx.lineTo(cx + 120, cy - 65);
        ctx.stroke();

        if (this.bossRewards && this.bossVictoryTimer > 30) {
            const rewardAlpha = Math.min(1, (this.bossVictoryTimer - 30) / 30);
            ctx.globalAlpha = rewardAlpha;
            ctx.font = '16px monospace';
            ctx.fillStyle = '#ffd700';
            ctx.fillText(`Gold: +${this.bossRewards.gold}`, cx, cy - 30);
            ctx.fillStyle = '#44aaff';
            ctx.fillText(`Cells: +${this.bossRewards.cells}`, cx, cy);
            ctx.fillStyle = '#0fa';
            ctx.fillText(`Time: ${this.bossRewards.battleTime}s`, cx, cy + 30);
        }

        if (this.bossVictoryTimer > 60) {
            ctx.fillStyle = '#ff44ff';
            ctx.font = 'bold 14px monospace';
            ctx.fillText('✦ PIXEL CORE OBTAINED ✦', cx, cy + 70);
            ctx.font = '11px monospace';
            ctx.fillStyle = '#aaa';
            ctx.fillText('+15% damage to all weapons', cx, cy + 90);
        }

        if (this.bossVictoryTimer > 90) {
            ctx.globalAlpha = 0.5 + Math.sin(this.bossVictoryTimer * 0.08) * 0.3;
            ctx.fillStyle = '#666';
            ctx.font = '12px monospace';
            ctx.fillText('Press ENTER to continue', cx, cy + 130);
        }

        ctx.textAlign = 'left';
        ctx.globalAlpha = 1;
    }

    drawMenu() {
        ctx.fillStyle = '#0a0a1e';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Animated background
        for (let i = 0; i < 50; i++) {
            const x = (Math.sin(this.menuAnim * 0.01 + i * 0.7) + 1) / 2 * canvas.width;
            const y = (Math.cos(this.menuAnim * 0.008 + i * 1.1) + 1) / 2 * canvas.height;
            ctx.globalAlpha = 0.1;
            ctx.fillStyle = i % 3 === 0 ? '#0ff' : i % 3 === 1 ? '#f0f' : '#ff0';
            ctx.fillRect(x, y, 3, 3);
        }
        ctx.globalAlpha = 1;

        // Title
        const titleY = 180 + Math.sin(this.menuAnim * 0.03) * 10;
        ctx.fillStyle = '#0ff';
        ctx.font = 'bold 40px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('PIXEL QUEST', canvas.width / 2, titleY);

        ctx.fillStyle = '#a040f0';
        ctx.font = 'bold 14px monospace';
        ctx.fillText('★ NEXUS BOSS EDITION ★', canvas.width / 2, titleY + 30);

        ctx.fillStyle = '#888';
        ctx.font = '14px monospace';
        ctx.fillText('Arrow Keys / WASD - Move & Jump', canvas.width / 2, 300);
        ctx.fillText('X / J - Attack', canvas.width / 2, 325);
        ctx.fillText('Shift - Dash', canvas.width / 2, 350);
        ctx.fillText('E - Interact with Boss Portal', canvas.width / 2, 375);

        ctx.fillStyle = '#fff';
        ctx.font = 'bold 18px monospace';
        ctx.globalAlpha = 0.5 + Math.sin(this.menuAnim * 0.05) * 0.5;
        ctx.fillText('Press ENTER to Start', canvas.width / 2, 440);
        ctx.globalAlpha = 1;
        ctx.textAlign = 'left';
    }

    drawGameOver() {
        ctx.fillStyle = '#0a0000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#ff2244';
        ctx.font = 'bold 36px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 30);
        ctx.fillStyle = '#888';
        ctx.font = '14px monospace';
        ctx.fillText(`Coins collected: ${this.player ? this.player.totalCoins : 0}`, canvas.width / 2, canvas.height / 2 + 20);
        ctx.fillStyle = '#fff';
        ctx.font = '16px monospace';
        ctx.globalAlpha = 0.5 + Math.sin(this.time * 0.05) * 0.5;
        ctx.fillText('Press ENTER to Restart', canvas.width / 2, canvas.height / 2 + 70);
        ctx.globalAlpha = 1;
        ctx.textAlign = 'left';
    }

    gameLoop() {
        this.update();
        this.draw();
        requestAnimationFrame(() => this.gameLoop());
    }
}

// ============================================================
// START THE GAME
// ============================================================
const game = new Game();
game.gameLoop();
</script>
