<script>
window.GAME_LEVELS=window.GAME_LEVELS||[];
// ============================================================
// COMPLETE INTEGRATED GAME WITH NEXUS BOSS EXPANSION
// ============================================================
// Single file - copy and paste entirely
// ============================================================

const canvas = document.getElementById('C');
const ctx = canvas.getContext('2d');
canvas.width = 800;
canvas.height = 600;

// ============================================================
// SECTION 1: BOSS EXPANSION CLASSES
// ============================================================

class BossProjectile {
    constructor(x, y, vx, vy, damage, type, lifetime) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.damage = damage;
        this.type = type || 'pixel';
        this.lifetime = lifetime || 180;
        this.age = 0;
        this.active = true;
        this.width = 8;
        this.height = 8;
        this.rotation = 0;
        this.alpha = 1;
        this.color = '#c44fff';
        this.trail = [];
    }

    update() {
        this.age++;
        if (this.age > this.lifetime) { this.active = false; return; }
        this.trail.push({ x: this.x, y: this.y, age: 0 });
        if (this.trail.length > 6) this.trail.shift();
        this.trail.forEach(t => t.age++);
        this.x += this.vx;
        this.y += this.vy;
        this.rotation += 0.1;
        if (this.age > this.lifetime - 30) this.alpha = (this.lifetime - this.age) / 30;
    }

    draw(ctx, camera) {
        if (!this.active) return;
        const sx = this.x - camera.x;
        const sy = this.y - camera.y;
        this.trail.forEach((t) => {
            const ta = (1 - t.age / 10) * 0.3 * this.alpha;
            if (ta > 0) {
                ctx.globalAlpha = ta;
                ctx.fillStyle = this.color;
                const size = this.width * (1 - t.age / 10);
                ctx.fillRect(t.x - camera.x - size / 2, t.y - camera.y - size / 2, size, size);
            }
        });
        ctx.globalAlpha = this.alpha;
        ctx.save();
        ctx.translate(sx, sy);
        ctx.rotate(this.rotation);
        ctx.fillStyle = this.color;
        ctx.fillRect(-this.width / 2, -this.height / 2, this.width, this.height);
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1;
        ctx.strokeRect(-this.width / 2, -this.height / 2, this.width, this.height);
        ctx.restore();
        ctx.globalAlpha = 1;
    }

    collidesWith(entity) {
        return this.active &&
            this.x - this.width / 2 < entity.x + entity.width &&
            this.x + this.width / 2 > entity.x &&
            this.y - this.height / 2 < entity.y + entity.height &&
            this.y + this.height / 2 > entity.y;
    }
}

class ShockwaveProjectile extends BossProjectile {
    constructor(x, y, direction) {
        super(x, y, direction * 5, 0, 15, 'shockwave', 120);
        this.width = 24;
        this.height = 32;
        this.color = '#ff4466';
        this.particles = [];
    }

    update() {
        super.update();
        if (this.age % 3 === 0) {
            this.particles.push({
                x: this.x + (Math.random() - 0.5) * this.width,
                y: this.y,
                vy: -(Math.random() * 3 + 1),
                life: 20, maxLife: 20
            });
        }
        this.particles.forEach(p => { p.y += p.vy; p.life--; });
        this.particles = this.particles.filter(p => p.life > 0);
    }

    draw(ctx, camera) {
        if (!this.active) return;
        const sx = this.x - camera.x;
        const sy = this.y - camera.y;
        this.particles.forEach(p => {
            const pa = p.life / p.maxLife * this.alpha;
            ctx.globalAlpha = pa;
            ctx.fillStyle = '#ff6688';
            ctx.fillRect(p.x - camera.x - 2, p.y - camera.y - 2, 4, 4);
        });
        ctx.globalAlpha = this.alpha;
        const gradient = ctx.createLinearGradient(sx, sy - this.height, sx, sy);
        gradient.addColorStop(0, 'rgba(255,68,102,0)');
        gradient.addColorStop(1, 'rgba(255,68,102,0.8)');
        ctx.fillStyle = gradient;
        ctx.fillRect(sx - this.width / 2, sy - this.height, this.width, this.height);
        ctx.fillStyle = '#fff';
        ctx.fillRect(sx - this.width / 2 + 4, sy - 4, this.width - 8, 4);
        ctx.globalAlpha = 1;
    }
}

class CorruptionBeam {
    constructor(boss, startAngle, endAngle, duration) {
        this.boss = boss;
        this.startAngle = startAngle;
        this.endAngle = endAngle;
        this.currentAngle = startAngle;
        this.duration = duration;
        this.age = 0;
        this.active = true;
        this.damage = 20;
        this.length = 800;
        this.width = 12;
        this.warningTime = 60;
        this.firing = false;
        this.warmupParticles = [];
    }

    update() {
        this.age++;
        if (this.age >= this.warningTime + this.duration) { this.active = false; return; }
        if (this.age >= this.warningTime) {
            this.firing = true;
            const progress = (this.age - this.warningTime) / this.duration;
            this.currentAngle = this.startAngle + (this.endAngle - this.startAngle) * progress;
        }
        if (!this.firing && this.age % 4 === 0) {
            const angle = Math.random() * Math.PI * 2;
            const dist = 40 + Math.random() * 30;
            this.warmupParticles.push({ x: Math.cos(angle) * dist, y: Math.sin(angle) * dist, life: 20, maxLife: 20 });
        }
        this.warmupParticles.forEach(p => { p.x *= 0.9; p.y *= 0.9; p.life--; });
        this.warmupParticles = this.warmupParticles.filter(p => p.life > 0);
    }

    getOrigin() {
        return { x: this.boss.x + this.boss.width / 2, y: this.boss.y + this.boss.height / 2 };
    }

    collidesWithPlayer(player) {
        if (!this.firing || !this.active) return false;
        const origin = this.getOrigin();
        const cos = Math.cos(this.currentAngle);
        const sin = Math.sin(this.currentAngle);
        const px = player.x + player.width / 2 - origin.x;
        const py = player.y + player.height / 2 - origin.y;
        const along = px * cos + py * sin;
        const perp = Math.abs(px * (-sin) + py * cos);
        return along > 0 && along < this.length && perp < this.width / 2 + player.width / 2;
    }

    draw(ctx, camera) {
        if (!this.active) return;
        const origin = this.getOrigin();
        const ox = origin.x - camera.x;
        const oy = origin.y - camera.y;
        if (!this.firing) {
            const warningAlpha = 0.3 + Math.sin(this.age * 0.3) * 0.2;
            ctx.globalAlpha = warningAlpha;
            ctx.strokeStyle = '#ff0044';
            ctx.lineWidth = 2;
            ctx.setLineDash([8, 8]);
            ctx.beginPath();
            ctx.moveTo(ox, oy);
            ctx.lineTo(ox + Math.cos(this.startAngle) * this.length, oy + Math.sin(this.startAngle) * this.length);
            ctx.stroke();
            ctx.setLineDash([]);
            this.warmupParticles.forEach(p => {
                ctx.globalAlpha = p.life / p.maxLife * 0.7;
                ctx.fillStyle = '#0fa';
                ctx.fillRect(ox + p.x - 2, oy + p.y - 2, 4, 4);
            });
            ctx.globalAlpha = 1;
        } else {
            const cos = Math.cos(this.currentAngle);
            const sin = Math.sin(this.currentAngle);
            const endX = ox + cos * this.length;
            const endY = oy + sin * this.length;
            ctx.globalAlpha = 0.3;
            ctx.strokeStyle = '#0fa';
            ctx.lineWidth = this.width * 3;
            ctx.beginPath(); ctx.moveTo(ox, oy); ctx.lineTo(endX, endY); ctx.stroke();
            ctx.globalAlpha = 0.7;
            ctx.strokeStyle = '#6fffaa';
            ctx.lineWidth = this.width;
            ctx.beginPath(); ctx.moveTo(ox, oy); ctx.lineTo(endX, endY); ctx.stroke();
            ctx.globalAlpha = 0.9;
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = this.width * 0.4;
            ctx.beginPath(); ctx.moveTo(ox, oy); ctx.lineTo(endX, endY); ctx.stroke();
            ctx.globalAlpha = 1;
        }
    }
}

class PixelWall {
    constructor(x, gapY, gapHeight, speed, arenaHeight) {
        this.x = x;
        this.gapY = gapY;
        this.gapHeight = gapHeight;
        this.speed = speed;
        this.width = 32;
        this.arenaHeight = arenaHeight;
        this.active = true;
        this.damage = 25;
        this.pixels = [];
        for (let y = 0; y < this.arenaHeight; y += 8) {
            if (y < this.gapY || y > this.gapY + this.gapHeight) {
                this.pixels.push({
                    x: (Math.random() - 0.5) * 8, y: y,
                    size: 6 + Math.random() * 4, hue: 270 + Math.random() * 30,
                    flicker: Math.random() * Math.PI * 2
                });
            }
        }
    }

    update() {
        this.x += this.speed;
        if (this.x < -50 || this.x > 2000) this.active = false;
    }

    collidesWithPlayer(player) {
        if (!this.active) return false;
        const inX = player.x + player.width > this.x && player.x < this.x + this.width;
        const inGap = player.y >= this.gapY && player.y + player.height <= this.gapY + this.gapHeight;
        return inX && !inGap;
    }

    draw(ctx, camera) {
        if (!this.active) return;
        const sx = this.x - camera.x;
        this.pixels.forEach(p => {
            const flicker = Math.sin(Date.now() * 0.005 + p.flicker) * 0.2 + 0.8;
            ctx.globalAlpha = flicker;
            ctx.fillStyle = `hsl(${p.hue}, 80%, 50%)`;
            ctx.fillRect(sx + p.x, p.y - camera.y, p.size, p.size);
        });
        ctx.globalAlpha = 0.4 + Math.sin(Date.now() * 0.01) * 0.2;
        ctx.strokeStyle = '#0f0';
        ctx.lineWidth = 2;
        ctx.setLineDash([4, 4]);
        ctx.strokeRect(sx - 4, this.gapY - camera.y - 4, this.width + 8, this.gapHeight + 8);
        ctx.setLineDash([]);
        ctx.globalAlpha = 1;
    }
}

class GravityVortex {
    constructor(x, y, duration, pullStrength) {
        this.x = x; this.y = y;
        this.duration = duration;
        this.pullStrength = pullStrength;
        this.age = 0; this.active = true;
        this.radius = 40; this.maxRadius = 200;
        this.damage = 10; this.damageInterval = 30;
        this.orbitingPixels = [];
        for (let i = 0; i < 30; i++) {
            this.orbitingPixels.push({
                angle: Math.random() * Math.PI * 2,
                dist: 20 + Math.random() * 80,
                speed: 0.02 + Math.random() * 0.04,
                size: 3 + Math.random() * 5,
                hue: 260 + Math.random() * 60
            });
        }
    }

    update() {
        this.age++;
        if (this.age > this.duration) { this.active = false; return; }
        const progress = this.age / this.duration;
        this.radius = this.maxRadius * Math.min(1, progress * 3);
        this.orbitingPixels.forEach(p => {
            p.angle += p.speed * (1 + progress * 2);
            p.dist = Math.max(10, p.dist - 0.3);
        });
    }

    applyPull(player) {
        if (!this.active) return;
        const dx = this.x - (player.x + player.width / 2);
        const dy = this.y - (player.y + player.height / 2);
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < this.maxRadius && dist > 0) {
            const force = this.pullStrength * (1 - dist / this.maxRadius);
            player.vx += (dx / dist) * force;
            player.vy += (dy / dist) * force * 0.5;
        }
    }

    collidesWithPlayer(player) {
        if (!this.active) return false;
        const dx = this.x - (player.x + player.width / 2);
        const dy = this.y - (player.y + player.height / 2);
        return Math.sqrt(dx * dx + dy * dy) < 30 && this.age % this.damageInterval === 0;
    }

    draw(ctx, camera) {
        if (!this.active) return;
        const sx = this.x - camera.x;
        const sy = this.y - camera.y;
        ctx.globalAlpha = 0.2;
        const grad = ctx.createRadialGradient(sx, sy, 0, sx, sy, this.radius);
        grad.addColorStop(0, 'rgba(100, 0, 200, 0.6)');
        grad.addColorStop(0.5, 'rgba(60, 0, 120, 0.3)');
        grad.addColorStop(1, 'rgba(30, 0, 60, 0)');
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.arc(sx, sy, this.radius, 0, Math.PI * 2); ctx.fill();
        this.orbitingPixels.forEach(p => {
            const px = sx + Math.cos(p.angle) * p.dist;
            const py = sy + Math.sin(p.angle) * p.dist;
            ctx.globalAlpha = 0.7;
            ctx.fillStyle = `hsl(${p.hue}, 80%, 60%)`;
            ctx.fillRect(px - p.size / 2, py - p.size / 2, p.size, p.size);
        });
        ctx.globalAlpha = 0.8;
        const coreSize = 12 + Math.sin(this.age * 0.1) * 4;
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(sx, sy, coreSize, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1;
    }
}

class ProjectileRing {
    constructor(x, y, count, speed, damage) {
        this.projectiles = [];
        for (let i = 0; i < count; i++) {
            const angle = (Math.PI * 2 / count) * i;
            const p = new BossProjectile(x, y, Math.cos(angle) * speed, Math.sin(angle) * speed, damage, 'ring', 180);
            p.color = '#ff2244';
            p.width = 10;
            p.height = 10;
            this.projectiles.push(p);
        }
        this.active = true;
    }
    update() {
        this.projectiles.forEach(p => p.update());
        this.projectiles = this.projectiles.filter(p => p.active);
        if (this.projectiles.length === 0) this.active = false;
    }
    draw(ctx, camera) { this.projectiles.forEach(p => p.draw(ctx, camera)); }
}

class BossMinion {
    constructor(x, y, type) {
        this.x = x; this.y = y;
        this.width = 20; this.height = 20;
        this.hp = 20; this.maxHp = 20;
        this.damage = 8;
        this.type = type || 'crawler';
        this.vx = 0; this.vy = 0;
        this.active = true;
        this.direction = Math.random() > 0.5 ? 1 : -1;
        this.animTimer = 0;
        this.glowAlpha = 0;
        this.hurtTimer = 0;
        if (this.type === 'flyer') {
            this.width = 16; this.height = 16;
            this.flyAngle = Math.random() * Math.PI * 2;
            this.flyRadius = 30 + Math.random() * 20;
            this.baseY = y;
            this.speed = 1.5 + Math.random();
        } else {
            this.speed = 1 + Math.random() * 0.5;
            this.gravity = 0.5;
            this.onGround = false;
        }
    }

    update(player, platforms, tileSize) {
        this.animTimer++;
        this.glowAlpha = 0.3 + Math.sin(this.animTimer * 0.1) * 0.2;
        if (this.hurtTimer > 0) this.hurtTimer--;
        if (this.type === 'flyer') {
            const dx = player.x - this.x;
            const dy = player.y - this.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist > 0) {
                this.vx = (dx / dist) * this.speed;
                this.vy = (dy / dist) * this.speed;
            }
            this.flyAngle += 0.05;
            this.x += this.vx + Math.sin(this.flyAngle) * 1.5;
            this.y += this.vy + Math.cos(this.flyAngle) * 1;
        } else {
            if (player.x > this.x + this.width) this.direction = 1;
            else if (player.x + player.width < this.x) this.direction = -1;
            this.vx = this.direction * this.speed;
            this.vy += this.gravity;
            this.x += this.vx;
            this.y += this.vy;
            this.onGround = false;
            if (platforms) {
                platforms.forEach(p => {
                    const px = p.x * (tileSize || 16);
                    const py = p.y * (tileSize || 16);
                    const pw = p.w * (tileSize || 16);
                    const ph = p.h * (tileSize || 16);
                    if (this.x + this.width > px && this.x < px + pw &&
                        this.y + this.height > py && this.y + this.height < py + ph + 10 && this.vy >= 0) {
                        this.y = py - this.height;
                        this.vy = 0;
                        this.onGround = true;
                    }
                });
            }
        }
        if (this.hp <= 0) this.active = false;
    }

    takeDamage(amount) {
        this.hp -= amount;
        this.hurtTimer = 10;
        if (this.hp <= 0) this.active = false;
    }

    collidesWithPlayer(player) {
        return this.active &&
            this.x < player.x + player.width && this.x + this.width > player.x &&
            this.y < player.y + player.height && this.y + this.height > player.y;
    }

    draw(ctx, camera) {
        if (!this.active) return;
        const sx = this.x - camera.x;
        const sy = this.y - camera.y;
        ctx.globalAlpha = this.glowAlpha;
        ctx.fillStyle = '#a020f0';
        ctx.beginPath();
        ctx.arc(sx + this.width / 2, sy + this.height / 2, this.width, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = this.hurtTimer > 0 ? 0.5 + Math.sin(this.hurtTimer * 2) * 0.5 : 1;
        if (this.type === 'flyer') {
            ctx.fillStyle = '#8844aa';
            ctx.fillRect(sx + 2, sy + 4, 12, 8);
            const wingOff = Math.sin(this.animTimer * 0.3) * 4;
            ctx.fillRect(sx - 4, sy + 2 + wingOff, 6, 6);
            ctx.fillRect(sx + 14, sy + 2 - wingOff, 6, 6);
            ctx.fillStyle = '#ff0044';
            ctx.fillRect(sx + 4, sy + 6, 3, 3);
            ctx.fillRect(sx + 10, sy + 6, 3, 3);
        } else {
            ctx.fillStyle = '#6622aa';
            ctx.fillRect(sx + 2, sy + 6, 16, 14);
            ctx.fillRect(sx + 4, sy + 2, 12, 6);
            const legOff = Math.sin(this.animTimer * 0.2) * 2;
            ctx.fillRect(sx, sy + 16 + legOff, 5, 4);
            ctx.fillRect(sx + 15, sy + 16 - legOff, 5, 4);
            ctx.fillStyle = '#ff0044';
            ctx.fillRect(sx + 5, sy + 4, 3, 3);
            ctx.fillRect(sx + 12, sy + 4, 3, 3);
        }
        if (this.hp < this.maxHp) {
            ctx.globalAlpha = 0.8;
            ctx.fillStyle = '#333';
            ctx.fillRect(sx, sy - 6, this.width, 3);
            ctx.fillStyle = '#ff44ff';
            ctx.fillRect(sx, sy - 6, this.width * (this.hp / this.maxHp), 3);
        }
        ctx.globalAlpha = 1;
    }
}

class GlitchEffect {
    constructor() {
        this.active = false;
        this.intensity = 0;
        this.slices = [];
    }
    activate(intensity) {
        this.active = true;
        this.intensity = intensity;
        this.generateSlices();
    }
    deactivate() { this.active = false; this.intensity = 0; }
    generateSlices() {
        this.slices = [];
        const count = Math.floor(5 + this.intensity * 10);
        for (let i = 0; i < count; i++) {
            this.slices.push({
                y: Math.random(), height: 0.02 + Math.random() * 0.08,
                offset: (Math.random() - 0.5) * this.intensity * 50,
                colorShift: Math.random() > 0.7
            });
        }
    }
    update() { if (this.active && Math.random() < 0.3) this.generateSlices(); }
    apply(ctx, canvas) {
        if (!this.active || this.intensity <= 0) return;
        try {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.putImageData(imageData, 0, 0);
            this.slices.forEach(slice => {
                const sy = Math.floor(slice.y * canvas.height);
                const sh = Math.floor(slice.height * canvas.height);
                const offset = slice.offset * this.intensity;
                ctx.drawImage(tempCanvas, 0, sy, canvas.width, sh, offset, sy, canvas.width, sh);
                if (slice.colorShift) {
                    ctx.globalAlpha = 0.1 * this.intensity;
                    ctx.fillStyle = Math.random() > 0.5 ? '#ff0000' : '#0000ff';
                    ctx.fillRect(0, sy, canvas.width, sh);
                    ctx.globalAlpha = 1;
                }
            });
        } catch (e) { }
    }
}

// NEXUS BOSS CLASS

class NexusBoss {
    constructor(x, y) {
        this.x = x; this.y = y;
        this.width = 80; this.height = 96;
        this.hp = 500; this.maxHp = 500;
        this.phase = 1; this.active = true; this.alive = true;
        this.vx = 0; this.vy = 0;
        this.gravity = 0.4; this.speed = 1.2; this.direction = -1;
        this.targetX = null; this.onGround = false;
        this.state = 'idle'; this.stateTimer = 0;
        this.attackCooldown = 0; this.globalCooldown = 60;
        this.invulnerable = false; this.invulTimer = 0;
        this.hurtTimer = 0; this.shieldActive = false;
        this.phaseTransitioning = false; this.phaseTransitionTimer = 0;
        this.currentAttack = null; this.attackData = {};
        this.projectiles = []; this.beams = []; this.walls = [];
        this.vortices = []; this.rings = []; this.minions = [];
        this.animTimer = 0; this.coreGlow = 0; this.coreVisible = false;
        this.bodyPixels = this.generateBodyPixels();
        this.disintegrationParticles = [];
        this.screenShake = 0; this.deathTimer = 0; this.deathParticles = [];
        this.flashTimer = 0;
        this.arenaLeft = 16; this.arenaRight = 49 * 16 - this.width;
        this.arenaTop = 16; this.arenaBottom = 28 * 16 - this.height;
        this.collapsedTiles = []; this.collapseTimer = 0;
        this.glitchIntensity = 0; this.glitchTimer = 0;
        this.deathCryUsed = false;
        this.platformsHidden = false;
        this.platformsHiddenTimer = 0;
        this.attackCooldowns = {
            fistSlam: 0, pixelStorm: 0, charge: 0, summon: 0,
            beam: 0, vortex: 0, glitchStrike: 0, pixelWall: 0,
            scatterShot: 0, deathCry: 0
        };
        this.introPlaying = true; this.introTimer = 0; this.introDuration = 120;
    }

    generateBodyPixels() {
        const pixels = [];
        const addBlock = (x1, y1, x2, y2, chance, hBase, lBase) => {
            for (let bx = x1; bx < x2; bx += 6) {
                for (let by = y1; by < y2; by += 6) {
                    if (Math.random() > (1 - chance)) {
                        pixels.push({
                            ox: bx, oy: by, x: bx, y: by,
                            size: 4 + Math.random() * 3,
                            hue: hBase + Math.random() * 30,
                            lightness: lBase + Math.random() * 20,
                            offsetX: 0, offsetY: 0,
                            drift: Math.random() * Math.PI * 2,
                            active: true
                        });
                    }
                }
            }
        };
        addBlock(10, 20, 70, 80, 0.85, 270, 15);
        addBlock(20, 0, 60, 24, 0.8, 270, 15);
        addBlock(-10, 25, 10, 70, 1, 275, 12);
        addBlock(70, 25, 90, 70, 1, 275, 12);
        return pixels;
    }

    update(player, platforms, tileSize) {
        this.animTimer++;
        if (this.introPlaying) {
            this.introTimer++;
            this.screenShake = Math.max(0, 3 - this.introTimer * 0.02);
            if (this.introTimer >= this.introDuration) {
                this.introPlaying = false;
                this.state = 'idle';
            }
            return;
        }
        if (!this.alive) { this.updateDeath(); return; }
        this.checkPhaseTransition();
        if (this.phaseTransitioning) { this.updatePhaseTransition(); return; }

        Object.keys(this.attackCooldowns).forEach(k => {
            if (this.attackCooldowns[k] > 0) this.attackCooldowns[k]--;
        });
        if (this.attackCooldown > 0) this.attackCooldown--;
        if (this.hurtTimer > 0) this.hurtTimer--;
        if (this.invulTimer > 0) { this.invulTimer--; if (this.invulTimer === 0) this.invulnerable = false; }
        if (this.screenShake > 0) this.screenShake -= 0.2;
        if (this.glitchTimer > 0) this.glitchTimer--;

        if (this.platformsHidden) {
            this.platformsHiddenTimer++;
            if (this.platformsHiddenTimer > 180) {
                this.platformsHidden = false;
                this.platformsHiddenTimer = 0;
            }
        }

        this.shieldActive = this.phase >= 2 && this.minions.some(m => m.active);
        if (this.coreVisible) this.coreGlow = 0.5 + Math.sin(this.animTimer * 0.08) * 0.3;

        if (this.phase === 3) {
            this.collapseTimer++;
            if (this.collapseTimer % 300 === 0 && this.collapsedTiles.length < 10) {
                this.collapseArenaTile(platforms, tileSize);
            }
            if (this.animTimer % 5 === 0) {
                const rp = this.bodyPixels[Math.floor(Math.random() * this.bodyPixels.length)];
                if (rp && rp.active) {
                    this.disintegrationParticles.push({
                        x: this.x + rp.x, y: this.y + rp.y,
                        vx: (Math.random() - 0.5) * 3, vy: -(Math.random() * 2 + 1),
                        life: 40, maxLife: 40, size: rp.size * 0.6, hue: rp.hue
                    });
                }
            }
        }

        this.disintegrationParticles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life--; });
        this.disintegrationParticles = this.disintegrationParticles.filter(p => p.life > 0);

        this.vy += this.gravity;
        this.x += this.vx;
        this.y += this.vy;

        this.onGround = false;
        if (platforms) {
            platforms.forEach(p => {
                if (p.type === 'solid') {
                    const px = p.x * tileSize;
                    const py = p.y * tileSize;
                    const pw = p.w * tileSize;
                    const ph = p.h * tileSize;
                    if (this.x + this.width > px && this.x < px + pw &&
                        this.y + this.height > py && this.y + this.height < py + ph + 10 && this.vy >= 0) {
                        this.y = py - this.height;
                        this.vy = 0;
                        this.onGround = true;
                    }
                    if (this.y + this.height > py && this.y < py + ph) {
                        if (this.x < px + pw && this.x + this.width > px) {
                            if (this.vx > 0) this.x = px - this.width;
                            else if (this.vx < 0) this.x = px + pw;
                            this.vx = 0;
                        }
                    }
                }
            });
        }

        this.x = Math.max(this.arenaLeft, Math.min(this.arenaRight, this.x));
        this.updateStateMachine(player, platforms, tileSize);

        this.projectiles.forEach(p => p.update());
        this.projectiles = this.projectiles.filter(p => p.active);
        this.beams.forEach(b => b.update());
        this.beams = this.beams.filter(b => b.active);
        this.walls.forEach(w => w.update());
        this.walls = this.walls.filter(w => w.active);
        this.vortices.forEach(v => v.update());
        this.vortices = this.vortices.filter(v => v.active);
        this.rings.forEach(r => r.update());
        this.rings = this.rings.filter(r => r.active);
        this.minions.forEach(m => m.update(player, platforms, tileSize));
        this.minions = this.minions.filter(m => m.active);

        this.bodyPixels.forEach(p => {
            if (p.active) {
                p.offsetX = Math.sin(this.animTimer * 0.02 + p.drift) * (this.phase === 3 ? 3 : 1);
                p.offsetY = Math.cos(this.animTimer * 0.015 + p.drift) * (this.phase === 3 ? 2 : 0.5);
                p.x = p.ox + p.offsetX;
                p.y = p.oy + p.offsetY;
            }
        });
    }

    checkPhaseTransition() {
        const hpPercent = this.hp / this.maxHp;
        if (this.phase === 1 && hpPercent <= 0.66) this.startPhaseTransition(2);
        else if (this.phase === 2 && hpPercent <= 0.33) this.startPhaseTransition(3);
    }

    startPhaseTransition(newPhase) {
        this.phaseTransitioning = true;
        this.phaseTransitionTimer = 0;
        this.phase = newPhase;
        this.invulnerable = true;
        this.state = 'idle';
        this.currentAttack = null;
        this.vx = 0;
        this.screenShake = 8;
        this.flashTimer = 30;
        if (newPhase === 2) { this.coreVisible = true; this.speed = 1.5; }
        if (newPhase === 3) { this.speed = 2; }
        this.projectiles = []; this.beams = []; this.walls = [];
        this.vortices = []; this.rings = [];
    }

    updatePhaseTransition() {
        this.phaseTransitionTimer++;
        this.screenShake = Math.max(0, 8 - this.phaseTransitionTimer * 0.05);
        this.bodyPixels.forEach(p => {
            p.offsetX = (Math.random() - 0.5) * 10;
            p.offsetY = (Math.random() - 0.5) * 10;
            p.x = p.ox + p.offsetX;
            p.y = p.oy + p.offsetY;
        });
        if (this.phaseTransitionTimer >= 120) {
            this.phaseTransitioning = false;
            this.invulnerable = false;
            this.attackCooldown = 60;
        }
    }

    updateStateMachine(player, platforms, tileSize) {
        this.stateTimer++;
        switch (this.state) {
            case 'idle':
                this.vx = 0;
                if (this.attackCooldown <= 0) {
                    this.chooseAttack(player);
                } else {
                    if (Math.abs(player.x - this.x) > 100) {
                        this.direction = player.x > this.x ? 1 : -1;
                        this.vx = this.direction * this.speed * 0.5;
                    }
                }
                break;
            case 'fist_slam_windup':
                this.vx = 0;
                if (this.stateTimer >= 60) { this.executeFistSlam(); this.setState('fist_slam_recovery', 0); }
                break;
            case 'fist_slam_recovery':
                this.vx = 0;
                if (this.stateTimer >= 45) this.finishAttack(90);
                break;
            case 'pixel_storm_cast':
                this.vx = 0;
                if (this.stateTimer === 30) this.executePixelStorm(player);
                if (this.stateTimer >= 90) this.finishAttack(120);
                break;
            case 'charge_windup':
                this.vx = 0;
                if (this.stateTimer >= 30) {
                    this.direction = player.x > this.x ? 1 : -1;
                    this.setState('charging');
                    this.vx = this.direction * 8;
                }
                break;
            case 'charging':
                if (this.stateTimer % 4 === 0) {
                    const p = new BossProjectile(
                        this.x + (this.direction < 0 ? this.width : 0),
                        this.y + this.height - 16, 0, 0, 10, 'debris', 180
                    );
                    p.width = 16; p.height = 16; p.color = '#442266';
                    this.projectiles.push(p);
                }
                if (this.x <= this.arenaLeft + 5 || this.x >= this.arenaRight - 5) {
                    this.vx = 0; this.screenShake = 5;
                    this.setState('charge_recovery', 0);
                }
                if (this.stateTimer >= 60) { this.vx = 0; this.setState('charge_recovery', 0); }
                break;
            case 'charge_recovery':
                this.vx = 0;
                if (this.stateTimer >= 40) this.finishAttack(100);
                break;
            case 'summon_cast':
                this.vx = 0;
                if (this.stateTimer === 40) this.executeSummon();
                if (this.stateTimer >= 60) this.finishAttack(300);
                break;
            case 'beam_cast':
                this.vx = 0;
                if (this.stateTimer === 1) this.executeBeam(player);
                if (this.stateTimer >= 240) this.finishAttack(180);
                break;
            case 'vortex_cast':
                this.vx = 0;
                if (this.stateTimer === 30) this.executeVortex();
                if (this.stateTimer >= 280) this.setState('stunned');
                break;
            case 'stunned':
                this.vx = 0;
                if (this.stateTimer >= 120) this.finishAttack(60);
                break;
            case 'glitch_strike_disappear':
                this.vx = 0;
                if (this.stateTimer >= 42) {
                    this.x = player.x + player.width / 2 - this.width / 2;
                    this.y = player.y - 200;
                    this.vy = 12;
                    this.setState('glitch_strike_fall');
                }
                break;
            case 'glitch_strike_fall':
                if (this.onGround) {
                    this.screenShake = 6;
                    for (let i = -2; i <= 2; i++) {
                        const proj = new BossProjectile(
                            this.x + this.width / 2 + i * 40,
                            this.y + this.height, i * 2, -4, 15, 'aoe', 40
                        );
                        proj.color = '#ff44ff';
                        this.projectiles.push(proj);
                    }
                    this.setState('glitch_strike_recovery');
                }
                if (this.stateTimer >= 60) this.setState('glitch_strike_recovery');
                break;
            case 'glitch_strike_recovery':
                this.vx = 0;
                if (this.stateTimer >= 50) this.finishAttack(120);
                break;
            case 'pixel_wall_cast':
                this.vx = 0;
                if (this.stateTimer === 30) this.executePixelWall(player);
                if (this.stateTimer >= 120) this.finishAttack(150);
                break;
            case 'scatter_shot':
                this.vx = 0;
                if (this.stateTimer === 10 || this.stateTimer === 28 || this.stateTimer === 46) {
                    this.executeScatterShot(player);
                }
                if (this.stateTimer >= 70) this.finishAttack(100);
                break;
            case 'death_cry_windup':
                this.vx = 0;
                this.glitchIntensity = this.stateTimer / 60;
                if (this.stateTimer >= 60) {
                    this.executeDeathCry();
                    this.setState('death_cry_active');
                }
                break;
            case 'death_cry_active':
                this.glitchIntensity = Math.max(0, 1 - this.stateTimer / 90);
                if (this.stateTimer >= 90) {
                    this.glitchIntensity = 0;
                    this.setState('stunned');
                    this.stateTimer = 0;
                }
                break;
        }
    }

    chooseAttack(player) {
        const availableAttacks = [];
        const dist = Math.abs(player.x - this.x);
        if (this.phase >= 1) {
            if (this.attackCooldowns.fistSlam <= 0 && dist < 150) availableAttacks.push({ name: 'fistSlam', weight: 3 });
            if (this.attackCooldowns.pixelStorm <= 0) availableAttacks.push({ name: 'pixelStorm', weight: 2 });
            if (this.attackCooldowns.charge <= 0 && dist > 200) availableAttacks.push({ name: 'charge', weight: 2 });
        }
        if (this.phase >= 2) {
            if (this.attackCooldowns.summon <= 0 && this.minions.filter(m => m.active).length < 3) availableAttacks.push({ name: 'summon', weight: 2 });
            if (this.attackCooldowns.beam <= 0) availableAttacks.push({ name: 'beam', weight: 2 });
            if (this.attackCooldowns.vortex <= 0) availableAttacks.push({ name: 'vortex', weight: 1 });
            if (this.attackCooldowns.glitchStrike <= 0) availableAttacks.push({ name: 'glitchStrike', weight: 2 });
        }
        if (this.phase >= 3) {
            if (this.attackCooldowns.pixelWall <= 0) availableAttacks.push({ name: 'pixelWall', weight: 2 });
            if (this.attackCooldowns.scatterShot <= 0) availableAttacks.push({ name: 'scatterShot', weight: 3 });
            if (!this.deathCryUsed && this.hp / this.maxHp <= 0.15) availableAttacks.push({ name: 'deathCry', weight: 10 });
        }
        if (availableAttacks.length === 0) { this.attackCooldown = 30; return; }
        const totalWeight = availableAttacks.reduce((s, a) => s + a.weight, 0);
        let roll = Math.random() * totalWeight;
        let chosen = availableAttacks[0].name;
        for (const attack of availableAttacks) {
            roll -= attack.weight;
            if (roll <= 0) { chosen = attack.name; break; }
        }
        this.startAttack(chosen, player);
    }

    startAttack(name) {
        this.currentAttack = name;
        const map = {
            fistSlam: ['fist_slam_windup', 120],
            pixelStorm: ['pixel_storm_cast', 180],
            charge: ['charge_windup', 200],
            summon: ['summon_cast', 600],
            beam: ['beam_cast', 300],
            vortex: ['vortex_cast', 400],
            glitchStrike: ['glitch_strike_disappear', 200],
            pixelWall: ['pixel_wall_cast', 200],
            scatterShot: ['scatter_shot', 120],
            deathCry: ['death_cry_windup', 999]
        };
        const [state, cd] = map[name];
        this.setState(state);
        this.attackCooldowns[name] = cd;
        if (name === 'glitchStrike') this.glitchTimer = 42;
        if (name === 'deathCry') this.deathCryUsed = true;
    }

    setState(state, timer) { this.state = state; this.stateTimer = timer || 0; }
    finishAttack(cooldown) { this.state = 'idle'; this.stateTimer = 0; this.currentAttack = null; this.attackCooldown = cooldown || 60; }

    executeFistSlam() {
        this.screenShake = 6;
        this.projectiles.push(new ShockwaveProjectile(this.x + this.width / 2, this.y + this.height, 1));
        this.projectiles.push(new ShockwaveProjectile(this.x + this.width / 2, this.y + this.height, -1));
    }

    executePixelStorm(player) {
        const count = 5 + this.phase * 2;
        for (let i = 0; i < count; i++) {
            const targetX = player.x + (Math.random() - 0.5) * 300;
            const startX = targetX + (Math.random() - 0.5) * 40;
            const proj = new BossProjectile(startX, this.arenaTop, (targetX - startX) * 0.02, 3 + Math.random() * 2, 12, 'storm', 180);
            proj.color = '#aa33ff';
            proj.width = 10 + Math.random() * 6;
            proj.height = proj.width;
            proj.delay = i * 8;
            proj.originalUpdate = proj.update;
            proj.update = function () { if (this.delay > 0) { this.delay--; return; } this.originalUpdate(); };
            this.projectiles.push(proj);
        }
    }

    executeSummon() {
        this.screenShake = 3;
        const types = ['crawler', 'flyer', 'crawler', 'flyer'];
        const count = 3 + (this.phase === 3 ? 1 : 0);
        for (let i = 0; i < count; i++) {
            const spawnX = this.x + this.width / 2 + (Math.random() - 0.5) * 200;
            const spawnY = this.y - 30 - Math.random() * 60;
            this.minions.push(new BossMinion(spawnX, spawnY, types[i % types.length]));
        }
    }

    executeBeam(player) {
        const cx = this.x + this.width / 2;
        const cy = this.y + this.height / 2;
        const angleToPlayer = Math.atan2(player.y + player.height / 2 - cy, player.x + player.width / 2 - cx);
        this.beams.push(new CorruptionBeam(this, angleToPlayer - Math.PI / 4, angleToPlayer + Math.PI / 4, 180));
    }

    executeVortex() {
        const cx = this.arenaLeft + (this.arenaRight - this.arenaLeft) / 2;
        const cy = this.arenaTop + (this.arenaBottom - this.arenaTop) / 2;
        this.vortices.push(new GravityVortex(cx, cy, 240, 0.8));
        this.invulnerable = true;
        this.invulTimer = 240;
    }

    executePixelWall(player) {
        const fromLeft = player.x > this.x;
        const wallX = fromLeft ? this.arenaLeft : this.arenaRight;
        const speed = fromLeft ? 3 : -3;
        const gapY = (this.arenaTop + 50) + Math.random() * (this.arenaBottom - this.arenaTop - 150);
        this.walls.push(new PixelWall(wallX, gapY, 64, speed, this.arenaBottom + 96));
    }

    executeScatterShot(player) {
        const cx = this.x + this.width / 2;
        const cy = this.y + this.height / 2;
        const baseAngle = Math.atan2(player.y + player.height / 2 - cy, player.x + player.width / 2 - cx);
        const count = 12;
        const spread = Math.PI / 3;
        for (let i = 0; i < count; i++) {
            const angle = baseAngle - spread / 2 + (spread / (count - 1)) * i;
            const speed = 4 + Math.random() * 2;
            const proj = new BossProjectile(cx, cy, Math.cos(angle) * speed, Math.sin(angle) * speed, 8, 'scatter', 120);
            proj.color = '#ff6644';
            proj.width = 6;
            proj.height = 6;
            this.projectiles.push(proj);
        }
    }

    executeDeathCry() {
        this.screenShake = 10;
        this.glitchIntensity = 1;
        const cx = this.x + this.width / 2;
        const cy = this.y + this.height / 2;
        this.rings.push(new ProjectileRing(cx, cy, 24, 3, 20));
        this.platformsHidden = true;
        this.platformsHiddenTimer = 0;
    }

    collapseArenaTile(platforms, tileSize) {
        const floorPlatform = platforms.find(p => p.y === 28 && p.type === 'solid');
        if (floorPlatform && floorPlatform.w > 20) {
            if (Math.random() > 0.5) {
                floorPlatform.x += 2;
                floorPlatform.w -= 2;
                this.arenaLeft += 32;
            } else {
                floorPlatform.w -= 2;
                this.arenaRight -= 32;
            }
            this.screenShake = 4;
        }
    }

    takeDamage(amount) {
        if (this.invulnerable || this.phaseTransitioning || this.introPlaying) return;
        const actualDamage = this.shieldActive ? amount * 0.5 : amount;
        this.hp -= actualDamage;
        this.hurtTimer = 8;
        this.screenShake = Math.max(this.screenShake, 2);
        if (this.hp <= 0) {
            this.hp = 0;
            this.alive = false;
            this.deathTimer = 0;
            this.state = 'dying';
            this.vx = 0;
            this.screenShake = 8;
            this.bodyPixels.forEach(p => {
                if (p.active) {
                    this.deathParticles.push({
                        x: this.x + p.x, y: this.y + p.y,
                        vx: (Math.random() - 0.5) * 6, vy: -(Math.random() * 5 + 2),
                        size: p.size, hue: p.hue,
                        life: 120 + Math.random() * 120, maxLife: 240, gravity: 0.1
                    });
                }
            });
        }
    }

    updateDeath() {
        this.deathTimer++;
        this.screenShake = Math.max(0, 8 - this.deathTimer * 0.03);
        this.deathParticles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += p.gravity; p.vx *= 0.99; p.life--; });
        this.deathParticles = this.deathParticles.filter(p => p.life > 0);
        this.projectiles = []; this.beams = []; this.walls = [];
        this.vortices = []; this.rings = []; this.minions = [];
    }

    isDead() { return !this.alive && this.deathTimer > 180; }

    checkCollisions(player) {
        if (!this.alive || this.introPlaying) return { hit: false, damage: 0 };
        let totalDamage = 0;
        let wasHit = false;
        if (this.state !== 'glitch_strike_disappear' &&
            player.x + player.width > this.x && player.x < this.x + this.width &&
            player.y + player.height > this.y && player.y < this.y + this.height) {
            totalDamage += 10; wasHit = true;
        }
        this.projectiles.forEach(p => { if (p.collidesWith(player)) { totalDamage += p.damage; p.active = false; wasHit = true; } });
        this.beams.forEach(b => { if (b.collidesWithPlayer(player)) { totalDamage += b.damage; wasHit = true; } });
        this.walls.forEach(w => { if (w.collidesWithPlayer(player)) { totalDamage += w.damage; wasHit = true; } });
        this.vortices.forEach(v => { v.applyPull(player); if (v.collidesWithPlayer(player)) { totalDamage += v.damage; wasHit = true; } });
        this.rings.forEach(r => { r.projectiles.forEach(p => { if (p.collidesWith(player)) { totalDamage += p.damage; p.active = false; wasHit = true; } }); });
        this.minions.forEach(m => { if (m.collidesWithPlayer(player)) { totalDamage += m.damage; wasHit = true; } });
        return { hit: wasHit, damage: totalDamage };
    }

    checkHitByPlayer(attackBox) {
        if (!this.alive || this.invulnerable || this.introPlaying || this.phaseTransitioning) return false;
        if (this.state === 'glitch_strike_disappear') return false;
        return attackBox.x + attackBox.width > this.x && attackBox.x < this.x + this.width &&
            attackBox.y + attackBox.height > this.y && attackBox.y < this.y + this.height;
    }

    checkMinionHit(attackBox, damage) {
        this.minions.forEach(m => {
            if (m.active && attackBox.x + attackBox.width > m.x && attackBox.x < m.x + m.width &&
                attackBox.y + attackBox.height > m.y && attackBox.y < m.y + m.height) {
                m.takeDamage(damage);
            }
        });
    }

    draw(ctx, camera) {
        if (this.introPlaying) { this.drawIntro(ctx, camera); return; }
        if (!this.alive) { this.drawDeath(ctx, camera); return; }
        const shk = this.screenShake > 0 ? this.screenShake : 0;
        const sx = this.x - camera.x + (shk > 0 ? (Math.random() - 0.5) * shk : 0);
        const sy = this.y - camera.y + (shk > 0 ? (Math.random() - 0.5) * shk : 0);

        if (this.glitchTimer > 0 || this.state === 'glitch_strike_disappear') {
            ctx.globalAlpha = 0.3;
            for (let i = 0; i < 3; i++) this.drawBody(ctx, sx + (Math.random() - 0.5) * 40, sy + (Math.random() - 0.5) * 20, true);
            ctx.globalAlpha = 1;
            if (this.state === 'glitch_strike_disappear') return;
        }

        ctx.globalAlpha = 0.3;
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.ellipse(sx + this.width / 2, this.y + this.height - camera.y + 4, this.width / 2, 8, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;

        if (this.shieldActive) {
            ctx.globalAlpha = 0.2 + Math.sin(this.animTimer * 0.1) * 0.1;
            ctx.strokeStyle = '#aa44ff';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.ellipse(sx + this.width / 2, sy + this.height / 2, this.width / 2 + 10, this.height / 2 + 10, 0, 0, Math.PI * 2);
            ctx.stroke();
            ctx.globalAlpha = 1;
        }

        if (this.hurtTimer > 0) ctx.globalAlpha = 0.6 + Math.sin(this.hurtTimer * 3) * 0.4;
        this.drawBody(ctx, sx, sy, false);
        ctx.globalAlpha = 1;

        if (this.phaseTransitioning) {
            ctx.globalAlpha = 0.5;
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(sx + this.width / 2, sy + this.height / 2, this.phaseTransitionTimer * 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
        }

        if (this.state === 'stunned') {
            for (let i = 0; i < 5; i++) {
                const angle = (this.animTimer * 0.05) + (Math.PI * 2 / 5) * i;
                ctx.fillStyle = '#ffff00';
                ctx.font = '12px Arial';
                ctx.fillText('★', sx + this.width / 2 + Math.cos(angle) * 40, sy - 10 + Math.sin(angle) * 10);
            }
        }

        this.disintegrationParticles.forEach(p => {
            ctx.globalAlpha = p.life / p.maxLife;
            ctx.fillStyle = `hsl(${p.hue}, 70%, 50%)`;
            ctx.fillRect(p.x - camera.x, p.y - camera.y, p.size, p.size);
        });
        ctx.globalAlpha = 1;

        this.projectiles.forEach(p => p.draw(ctx, camera));
        this.beams.forEach(b => b.draw(ctx, camera));
        this.walls.forEach(w => w.draw(ctx, camera));
        this.vortices.forEach(v => v.draw(ctx, camera));
        this.rings.forEach(r => r.draw(ctx, camera));
        this.minions.forEach(m => m.draw(ctx, camera));
    }

    drawBody(ctx, sx, sy, glitched) {
        this.bodyPixels.forEach(p => {
            if (!p.active) return;
            const px = sx + p.x + (glitched ? (Math.random() - 0.5) * 15 : 0);
            const py = sy + p.y + (glitched ? (Math.random() - 0.5) * 15 : 0);
            ctx.fillStyle = `hsl(${p.hue}, 70%, ${p.lightness}%)`;
            ctx.fillRect(px, py, p.size, p.size);
        });
        const eyeFlicker = Math.sin(this.animTimer * 0.15) > 0 ? 1 : 0.7;
        const savedAlpha = ctx.globalAlpha;
        ctx.globalAlpha = Math.min(savedAlpha, eyeFlicker);
        ctx.fillStyle = '#ff2244';
        ctx.shadowColor = '#ff0022';
        ctx.shadowBlur = 8;
        ctx.fillRect(sx + 28, sy + 8, 8, 8);
        ctx.fillRect(sx + 44, sy + 8, 8, 8);
        ctx.shadowBlur = 0;
        if (this.coreVisible) {
            ctx.globalAlpha = Math.min(savedAlpha, this.coreGlow);
            ctx.fillStyle = '#0fa';
            ctx.shadowColor = '#0fa';
            ctx.shadowBlur = 15;
            ctx.fillRect(sx + 30, sy + 40, 20, 20);
            ctx.fillStyle = '#fff';
            ctx.fillRect(sx + 35, sy + 45, 10, 10);
            ctx.shadowBlur = 0;
        }
        if (this.state === 'fist_slam_windup') {
            const progress = this.stateTimer / 60;
            ctx.fillStyle = `rgba(255, 68, 102, ${progress})`;
            ctx.shadowColor = '#ff4466';
            ctx.shadowBlur = 10 * progress;
            ctx.fillRect(sx - 10, sy + 20 - progress * 20, 15, 25);
            ctx.fillRect(sx + this.width - 5, sy + 20 - progress * 20, 15, 25);
            ctx.shadowBlur = 0;
        }
        if (this.state === 'charge_windup') {
            const vibrate = (Math.random() - 0.5) * this.stateTimer * 0.3;
            ctx.fillStyle = 'rgba(255,100,0,0.3)';
            ctx.fillRect(sx + vibrate - 5, sy - 5, this.width + 10, this.height + 10);
        }
        ctx.globalAlpha = savedAlpha;
    }

    drawIntro(ctx, camera) {
        const sx = this.x - camera.x;
        const sy = this.y - camera.y;
        const progress = this.introTimer / this.introDuration;
        ctx.globalAlpha = progress;
        const riseOffset = (1 - progress) * 60;
        this.drawBody(ctx, sx, sy + riseOffset, false);
        ctx.globalAlpha = (1 - progress) * 0.5;
        const grad = ctx.createRadialGradient(sx + this.width / 2, sy + this.height / 2 + riseOffset, 0, sx + this.width / 2, sy + this.height / 2 + riseOffset, 100);
        grad.addColorStop(0, 'rgba(100,0,200,0.5)');
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grad;
        ctx.fillRect(sx - 100, sy - 100 + riseOffset, this.width + 200, this.height + 200);
        ctx.globalAlpha = 1;
    }

    drawDeath(ctx, camera) {
        this.deathParticles.forEach(p => {
            ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
            ctx.fillStyle = `hsl(${p.hue}, 80%, 50%)`;
            ctx.fillRect(p.x - camera.x, p.y - camera.y, p.size, p.size);
        });
        if (this.deathTimer < 30) {
            ctx.globalAlpha = 1 - this.deathTimer / 30;
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(this.x + this.width / 2 - camera.x, this.y + this.height / 2 - camera.y, this.deathTimer * 3, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;
    }

    drawHPBar(ctx, canvasWidth) {
        if (!this.active || this.isDead()) return;
        const barWidth = 400;
        const barHeight = 20;
        const barX = (canvasWidth - barWidth) / 2;
        const barY = 20;
        const hpPercent = this.hp / this.maxHp;

        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(barX - 4, barY - 4, barWidth + 8, barHeight + 20);

        ctx.fillStyle = '#c44fff';
        ctx.font = 'bold 11px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('NEXUS — Keeper of Dead Pixels', canvasWidth / 2, barY + 8);

        ctx.fillStyle = '#222';
        ctx.fillRect(barX, barY + 12, barWidth, barHeight);

        ctx.strokeStyle = '#444';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(barX + barWidth * 0.33, barY + 12);
        ctx.lineTo(barX + barWidth * 0.33, barY + 12 + barHeight);
        ctx.moveTo(barX + barWidth * 0.66, barY + 12);
        ctx.lineTo(barX + barWidth * 0.66, barY + 12 + barHeight);
        ctx.stroke();

        const hpWidth = barWidth * hpPercent;
        let hpColor;
        if (this.phase === 1) {
            hpColor = ctx.createLinearGradient(barX, 0, barX + hpWidth, 0);
            hpColor.addColorStop(0, '#6622aa'); hpColor.addColorStop(1, '#aa44ff');
        } else if (this.phase === 2) {
            hpColor = ctx.createLinearGradient(barX, 0, barX + hpWidth, 0);
            hpColor.addColorStop(0, '#004422'); hpColor.addColorStop(1, '#0fa');
        } else {
            hpColor = ctx.createLinearGradient(barX, 0, barX + hpWidth, 0);
            hpColor.addColorStop(0, '#660000'); hpColor.addColorStop(1, '#ff2244');
        }
        ctx.fillStyle = hpColor;
        ctx.fillRect(barX, barY + 12, hpWidth, barHeight);

        if (this.shieldActive) {
            ctx.strokeStyle = '#aa44ff'; ctx.lineWidth = 2; ctx.setLineDash([4, 4]);
            ctx.strokeRect(barX - 1, barY + 11, barWidth + 2, barHeight + 2);
            ctx.setLineDash([]);
            ctx.fillStyle = '#aa44ff'; ctx.font = '9px monospace';
            ctx.fillText('[ SHIELD — Kill minions! ]', canvasWidth / 2, barY + barHeight + 24);
        }
        if (this.invulnerable && !this.shieldActive) {
            ctx.fillStyle = '#ffaa00'; ctx.font = '9px monospace';
            ctx.fillText('[ INVULNERABLE ]', canvasWidth / 2, barY + barHeight + 24);
        }
        if (this.state === 'stunned') {
            ctx.fillStyle = '#ffff00'; ctx.font = '9px monospace';
            ctx.fillText('★ STUNNED — Attack now! ★', canvasWidth / 2, barY + barHeight + 24);
        }

        ctx.fillStyle = '#fff'; ctx.font = '9px monospace'; ctx.textAlign = 'right';
        ctx.fillText(`Phase ${this.phase}/3`, barX + barWidth, barY + 8);
        ctx.textAlign = 'left';
        ctx.strokeStyle = '#c44fff'; ctx.lineWidth = 2;
        ctx.strokeRect(barX, barY + 12, barWidth, barHeight);
    }
}

// ============================================================
// Boss Portal
// ============================================================

class BossPortal {
    constructor(x, y) {
        this.x = x; this.y = y;
        this.width = 32; this.height = 48;
        this.active = true;
        this.animTimer = 0;
        this.particles = [];
    }

    update() {
        this.animTimer++;
        if (this.animTimer % 5 === 0) {
            this.particles.push({
                x: this.x + this.width / 2 + (Math.random() - 0.5) * 20,
                y: this.y + this.height,
                vy: -(Math.random() * 2 + 1),
                life: 30, maxLife: 30,
                size: 2 + Math.random() * 3,
                hue: 270 + Math.random() * 40
            });
        }
        this.particles.forEach(p => { p.y += p.vy; p.x += (Math.random() - 0.5) * 0.5; p.life--; });
        this.particles = this.particles.filter(p => p.life > 0);
    }

    canInteract(player) {
        if (!this.active) return false;
        const dx = (this.x + this.width / 2) - (player.x + player.width / 2);
        const dy = (this.y + this.height / 2) - (player.y + player.height / 2);
        return Math.sqrt(dx * dx + dy * dy) < 60;
    }

    draw(ctx, camera) {
        if (!this.active) return;
        const sx = this.x - camera.x;
        const sy = this.y - camera.y;
        const glowSize = 30 + Math.sin(this.animTimer * 0.05) * 5;
        ctx.globalAlpha = 0.3;
        const grad = ctx.createRadialGradient(sx + this.width / 2, sy + this.height / 2, 0, sx + this.width / 2, sy + this.height / 2, glowSize);
        grad.addColorStop(0, 'rgba(160, 32, 240, 0.5)');
        grad.addColorStop(1, 'rgba(160, 32, 240, 0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(sx + this.width / 2, sy + this.height / 2, glowSize, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.strokeStyle = '#8844cc'; ctx.lineWidth = 3;
        ctx.strokeRect(sx, sy, this.width, this.height);
        ctx.fillStyle = '#2a0a3e';
        ctx.fillRect(sx + 3, sy + 3, this.width - 6, this.height - 6);
        const swirl = this.animTimer * 0.03;
        for (let i = 0; i < 4; i++) {
            const angle = swirl + (Math.PI / 2) * i;
            const radius = 8 + Math.sin(this.animTimer * 0.05 + i) * 3;
            ctx.fillStyle = '#c44fff';
            ctx.fillRect(sx + this.width / 2 + Math.cos(angle) * radius - 2, sy + this.height / 2 + Math.sin(angle) * radius - 2, 4, 4);
        }
        this.particles.forEach(p => {
            ctx.globalAlpha = p.life / p.maxLife;
            ctx.fillStyle = `hsl(${p.hue}, 70%, 60%)`;
            ctx.fillRect(p.x - camera.x, p.y - camera.y, p.size, p.size);
        });
        ctx.globalAlpha = 0.6 + Math.sin(this.animTimer * 0.08) * 0.3;
        ctx.fillStyle = '#c44fff'; ctx.font = '10px monospace'; ctx.textAlign = 'center';
        ctx.fillText('Press E', sx + this.width / 2, sy - 10);
        ctx.fillText('⚔ BOSS ⚔', sx + this.width / 2, sy - 22);
        ctx.textAlign = 'left';
        ctx.globalAlpha = 1;
    }
}
