<!DOCTYPE html>
<html lang=en>
<head>
<meta charset=UTF-8>
<meta name=viewport content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Dead Pixels — Rebirth</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Courier New',monospace;touch-action:none;position:fixed}
#C{display:block;width:100%;height:100%;image-rendering:pixelated}
#LS{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(180deg,#0a0a1a,#1a0a2e 50%,#0a0a1a);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;transition:opacity .8s}
#LS.h{opacity:0;pointer-events:none}
.lt{font-size:42px;color:#0fa;text-shadow:0 0 20px #0fa,0 0 40px #0f8,0 0 60px #0f6;margin-bottom:8px;letter-spacing:8px;animation:titlePulse 3s ease-in-out infinite}
@keyframes titlePulse{0%,100%{text-shadow:0 0 20px #0fa,0 0 40px #0f8}50%{text-shadow:0 0 30px #0fa,0 0 60px #0f8,0 0 80px #0f6}}
.ls2{font-size:12px;color:#86a;letter-spacing:4px;margin-bottom:30px}
.lbc{width:260px;height:5px;background:#1a1a3a;border-radius:3px;overflow:hidden}
.lb{width:0;height:100%;background:linear-gradient(90deg,#0fa,#0af);border-radius:3px;transition:width .3s}
.ts{font-size:15px;color:#0fa;margin-top:30px;animation:bk 1.5s infinite;display:none}
@keyframes bk{0%,100%{opacity:1}50%{opacity:.3}}
.menu-btn{padding:14px 50px;margin:8px;background:rgba(0,255,170,.06);border:1px solid #0fa;color:#0fa;font-family:inherit;font-size:16px;border-radius:6px;cursor:pointer;pointer-events:auto;letter-spacing:3px;transition:all .2s;text-transform:uppercase}
.menu-btn:hover,.menu-btn:active{background:rgba(0,255,170,.2);transform:scale(1.05);box-shadow:0 0 20px rgba(0,255,170,.3)}
.menu-btn.red{border-color:#f44;color:#f44;background:rgba(255,68,68,.06)}
.menu-btn.red:hover,.menu-btn.red:active{background:rgba(255,68,68,.2);box-shadow:0 0 20px rgba(255,68,68,.3)}
.menu-btn.gold{border-color:#fd0;color:#fd0;background:rgba(255,221,0,.06)}
.menu-btn.gold:hover,.menu-btn.gold:active{background:rgba(255,221,0,.2);box-shadow:0 0 20px rgba(255,221,0,.3)}
.menu-particles{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden}
.menu-particle{position:absolute;width:2px;height:2px;background:#0fa;border-radius:50%;animation:floatUp linear infinite}
@keyframes floatUp{0%{transform:translateY(100vh) scale(1);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-10vh) scale(0);opacity:0}}
#MainMenu{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(180deg,#050510,#0a0a2a 30%,#15082e 60%,#050510);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:900}
#MainMenu.active{display:flex}
.menu-stats{color:#556;font-size:10px;margin-top:15px;text-align:center;line-height:1.6}
.menu-ver{position:absolute;bottom:10px;right:15px;color:#223;font-size:9px}
#SaveMenu{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(5,5,20,.97);display:none;flex-direction:column;align-items:center;justify-content:flex-start;z-index:950;overflow-y:auto;padding:20px}
#SaveMenu.active{display:flex}
.save-slot{width:90%;max-width:400px;background:rgba(0,255,170,.03);border:1px solid #224;padding:14px 18px;border-radius:8px;margin:6px 0;cursor:pointer;transition:all .15s;pointer-events:auto}
.save-slot:active{background:rgba(0,255,170,.12);transform:scale(.98)}
.save-slot.empty{border-style:dashed;opacity:.5}
.save-slot .sl-name{color:#0fa;font-size:14px;margin-bottom:4px}
.save-slot .sl-info{color:#667;font-size:10px}
.save-slot .sl-actions{display:flex;gap:8px;margin-top:6px}
.save-slot .sl-btn{padding:4px 12px;font-size:10px;border:1px solid #334;color:#aaa;background:rgba(0,0,0,.3);border-radius:3px;cursor:pointer;font-family:inherit}
.save-slot .sl-btn.del{border-color:#622;color:#f44}
.save-slot .sl-btn:active{transform:scale(.95)}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(5,5,20,.95);display:none;flex-direction:column;align-items:center;justify-content:flex-start;z-index:200;overflow-y:auto;padding:15px 10px}
.overlay.active{display:flex}
.ov-title{font-size:22px;color:#0fa;letter-spacing:5px;margin-bottom:4px;margin-top:10px;text-shadow:0 0 12px #0fa}
.ov-sub{font-size:10px;color:#556;margin-bottom:10px}
.ov-currency{font-size:13px;margin-bottom:8px}
.ov-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:7px;max-width:650px}
.ov-item{background:rgba(0,255,170,.04);border:1px solid #224;padding:8px 12px;border-radius:5px;min-width:120px;max-width:150px;cursor:pointer;transition:all .15s;text-align:center;pointer-events:auto}
.ov-item:active{background:rgba(0,255,170,.15);transform:scale(.96)}
.ov-item.dis{border-color:#1a1a1a;opacity:.25;pointer-events:none}
.ov-item.bought{border-color:#333;opacity:.3;pointer-events:none}
.ov-item .nm{color:#adf;font-size:11px;margin-bottom:2px}
.ov-item .ds{color:#667;font-size:9px;margin-bottom:4px;min-height:18px}
.ov-item .co{font-size:10px}
.ov-item .tag{font-size:8px;color:#555;margin-top:2px}
.ov-skip{margin-top:12px;margin-bottom:20px;padding:8px 32px;background:rgba(0,255,170,.07);border:1px solid #0fa;color:#0fa;font-family:inherit;font-size:12px;border-radius:4px;cursor:pointer;pointer-events:auto}
.ov-skip:active{background:rgba(0,255,170,.25)}
#PM{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:300}
#PM.active{display:flex}
.mb{padding:12px 44px;margin:6px;background:rgba(0,255,170,.08);border:1px solid #0fa;color:#0fa;font-family:inherit;font-size:16px;border-radius:4px;cursor:pointer;pointer-events:auto}
.mb:active{background:rgba(0,255,170,.25);transform:scale(.96)}
#DS{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:300;transition:background 1s}
#DS.active{display:flex;background:rgba(20,0,0,.92)}
.dt{font-size:48px;color:#f24;text-shadow:0 0 30px #f00;letter-spacing:12px;margin-bottom:12px}
.ds{color:#a66;font-size:12px;margin:2px}
#PB{position:fixed;top:6px;left:50%;transform:translateX(-50%);width:34px;height:34px;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.2);border-radius:6px;color:#fff;font-size:15px;display:flex;align-items:center;justify-content:center;z-index:50;pointer-events:auto;cursor:pointer}
#Settings{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(5,5,20,.97);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:960}
#Settings.active{display:flex}
.settings-box{background:rgba(0,255,170,.03);border:1px solid #224;border-radius:10px;padding:30px 40px;max-width:400px;width:90%}
.settings-row{margin:16px 0;display:flex;flex-direction:column;gap:6px}
.settings-label{color:#0fa;font-size:13px;letter-spacing:2px;display:flex;justify-content:space-between;align-items:center}
.settings-val{color:#667;font-size:11px}
.vol-slider{-webkit-appearance:none;appearance:none;width:100%;height:6px;background:#1a1a3a;border-radius:3px;outline:none;cursor:pointer}
.vol-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:18px;height:18px;background:#0fa;border-radius:50%;cursor:pointer;box-shadow:0 0 8px #0fa}
.vol-slider::-moz-range-thumb{width:18px;height:18px;background:#0fa;border-radius:50%;cursor:pointer;border:none}
/* ===== UI/UX POLISH ===== */
#MainMenu::after,#LS::after,#SaveMenu::after{content:"";position:absolute;inset:0;pointer-events:none;box-shadow:inset 0 0 180px rgba(0,0,0,.85);background:repeating-linear-gradient(0deg,rgba(0,0,0,0) 0,rgba(0,0,0,0) 2px,rgba(0,0,0,.06) 3px,rgba(0,0,0,0) 4px)}
.lt{position:relative;z-index:1}
.lbc{width:280px;height:6px;background:#0e0e22;border:1px solid rgba(0,255,170,.15);box-shadow:0 0 10px rgba(0,255,170,.1)}
.lb{background:linear-gradient(90deg,#0af,#0fa,#8f8);box-shadow:0 0 12px #0fa}
.menu-btn{position:relative;z-index:1;backdrop-filter:blur(2px);overflow:hidden}
.menu-btn::before{content:"";position:absolute;top:0;left:-60%;width:40%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.18),transparent);transform:skewX(-20deg);transition:left .5s}
.menu-btn:hover::before{left:130%}
.ov-title{text-shadow:0 0 14px currentColor,0 0 30px rgba(0,255,170,.3)}
.ov-item{background:linear-gradient(160deg,rgba(0,255,170,.06),rgba(0,40,60,.04));border-radius:7px;position:relative;transition:transform .12s,box-shadow .12s,border-color .12s}
.ov-item:not(.dis):not(.bought):hover{border-color:#0fa;box-shadow:0 0 16px rgba(0,255,170,.25);transform:translateY(-2px)}
.ov-item .nm{font-weight:bold;letter-spacing:.5px}
.ov-item .co{font-weight:bold}
.dt{text-shadow:0 0 30px #f00,0 0 60px #900;animation:deadPulse 2s ease-in-out infinite}
@keyframes deadPulse{0%,100%{text-shadow:0 0 30px #f00,0 0 60px #900}50%{text-shadow:0 0 45px #f00,0 0 90px #b00,0 0 120px #700}}
.mb{position:relative;overflow:hidden;transition:all .15s}
.mb:hover{background:rgba(0,255,170,.18);box-shadow:0 0 18px rgba(0,255,170,.25)}
.save-slot{transition:all .15s;border-radius:8px}
.save-slot:not(.empty):hover{border-color:#0fa;box-shadow:0 0 14px rgba(0,255,170,.18)}
.sl-btn{transition:all .12s}
.sl-btn:hover{background:rgba(0,255,170,.15);color:#0fa}
.sl-btn.del:hover{background:rgba(255,68,68,.15);color:#f66}
#PB{transition:all .15s;backdrop-filter:blur(3px)}
#PB:hover{background:rgba(0,255,170,.2);border-color:#0fa;color:#0fa}
/* ===== SHOP / UPGRADE REDESIGN ===== */
#CellShop,#Merchant{padding:0;align-items:center;justify-content:flex-start}
.shop-panel{width:100%;max-width:760px;margin:0 auto;padding:18px 16px 30px;display:flex;flex-direction:column;align-items:center}
.shop-head{text-align:center;margin-bottom:14px;width:100%}
.shop-currency{margin-top:8px;font-size:14px;letter-spacing:2px;color:#0fa;display:inline-block;padding:5px 16px;border:1px solid rgba(0,255,170,.25);border-radius:20px;background:rgba(0,255,170,.05)}
.shop-currency b{font-size:17px}
.gold-cur{color:#fd0;border-color:rgba(255,210,0,.3);background:rgba(255,210,0,.05)}
.hp-cur{color:#f77;margin-left:10px;padding-left:10px;border-left:1px solid rgba(255,120,120,.3)}
.scroll-label{color:#7d8;font-size:10px;letter-spacing:3px;margin:14px 0 8px;text-transform:uppercase;opacity:.8}
.scroll-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;width:100%}
.scroll-card{position:relative;width:150px;min-height:150px;padding:14px 10px;border-radius:12px;cursor:pointer;pointer-events:auto;text-align:center;background:linear-gradient(165deg,rgba(20,26,34,.9),rgba(8,10,16,.9));border:1.5px solid #333;transition:transform .14s,box-shadow .14s,border-color .14s;overflow:hidden}
.scroll-card::before{content:"";position:absolute;inset:0;opacity:.12;background:radial-gradient(circle at 50% 0%,var(--sc),transparent 70%)}
.scroll-card:hover{transform:translateY(-4px) scale(1.03)}
.sc-brutality{--sc:#f24;border-color:#7a2028}.sc-brutality:hover{border-color:#f24;box-shadow:0 0 22px rgba(255,40,60,.4)}
.sc-tactics{--sc:#a5f;border-color:#5a3a8a}.sc-tactics:hover{border-color:#a5f;box-shadow:0 0 22px rgba(170,90,255,.4)}
.sc-survival{--sc:#4d6;border-color:#2a6a3a}.sc-survival:hover{border-color:#4d6;box-shadow:0 0 22px rgba(70,220,110,.4)}
.scroll-card.poor{opacity:.45;filter:grayscale(.4)}
.sc-icon{font-size:34px;line-height:1;margin-bottom:6px;color:var(--sc);text-shadow:0 0 14px var(--sc)}
.sc-name{font-size:14px;font-weight:bold;letter-spacing:2px;color:#fff}
.sc-lv{font-size:9px;color:#889;letter-spacing:2px;margin:3px 0 8px}
.sc-desc{font-size:11px;color:#bcd;line-height:1.5;min-height:34px}
.sc-cost{margin-top:8px;font-size:14px;font-weight:bold;color:#0fa}
.ov-item.talent{position:relative;padding-top:26px;min-width:130px}
.ti-icon{font-size:20px;line-height:1;margin-bottom:3px}
.ov-item.talent .ti-icon{position:absolute;top:7px;left:0;right:0;text-align:center}
.merch-grid{gap:10px;max-width:720px}
.shop-card{position:relative;width:150px;max-width:160px;min-height:118px;padding:22px 10px 10px;border-radius:9px;text-align:center;background:linear-gradient(165deg,rgba(18,22,30,.92),rgba(8,10,14,.92));border-width:1.5px}
.shop-card .ti-icon{font-size:22px;margin-bottom:4px}
.shop-card .nm{font-size:12px}
.rar-tag{position:absolute;top:0;left:0;right:0;font-size:8px;letter-spacing:2px;text-transform:uppercase;padding:2px;border-radius:9px 9px 0 0;font-weight:bold}
.rar-common{border-color:#556}.rar-common .rar-tag{background:rgba(90,100,110,.4);color:#aab}
.rar-common:not(.dis):not(.bought):hover{border-color:#8a9;box-shadow:0 0 14px rgba(140,160,170,.3)}
.rar-rare{border-color:#2a6ab0}.rar-rare .rar-tag{background:rgba(40,110,200,.35);color:#7bf}
.rar-rare:not(.dis):not(.bought):hover{border-color:#4af;box-shadow:0 0 16px rgba(74,170,255,.4)}
.rar-epic{border-color:#7a3ac0}.rar-epic .rar-tag{background:rgba(140,60,220,.35);color:#c8f}
.rar-epic:not(.dis):not(.bought):hover{border-color:#a5f;box-shadow:0 0 18px rgba(170,90,255,.45)}
.rar-legendary{border-color:#c89020}.rar-legendary .rar-tag{background:rgba(220,160,30,.35);color:#fd8}
.rar-legendary:not(.dis):not(.bought):hover{border-color:#fd0;box-shadow:0 0 20px rgba(255,210,0,.45)}
.rar-legendary{animation:legendGlow 2.5s ease-in-out infinite}
@keyframes legendGlow{0%,100%{box-shadow:0 0 8px rgba(255,210,0,.15)}50%{box-shadow:0 0 18px rgba(255,210,0,.35)}}
.tag.owned{color:#4d8;border-top:1px solid rgba(80,220,140,.2)}
.ov-item.bought{opacity:.4}
.ov-skip{background:linear-gradient(90deg,rgba(0,255,170,.08),rgba(0,255,170,.14),rgba(0,255,170,.08));border-radius:6px;font-weight:bold;letter-spacing:2px;transition:all .15s}
.ov-skip:hover{background:rgba(0,255,170,.25);box-shadow:0 0 18px rgba(0,255,170,.3)}
</style></head>

<div id=LS>
<div class=lt>DEAD PIXELS</div>
<div class=ls2>REBIRTH PROTOCOL</div>
<div class=lbc><div class=lb id=LB></div></div>

</div>
<div id=MainMenu>
<div class=menu-particles id=MenuParticles></div>
<div class=lt style="margin-bottom:4px">DEAD PIXELS</div>
<div class=ls2 style="margin-bottom:40px">REBIRTH PROTOCOL</div>
<div class=menu-btn onclick="G.menuNewGame()">NEW GAME</div>
<div class="menu-btn gold" onclick="G.menuLoadGame()">LOAD GAME</div>
<div class="menu-btn" onclick="G.showSettings()" style="border-color:#88f;color:#88f;font-size:13px;padding:10px 30px">♫ SETTINGS</div>
<div class="menu-btn" onclick="G.goFullscreen()" style="border-color:#a0f;color:#a0f;font-size:13px;padding:10px 30px">⛶ FULLSCREEN</div>

</div>

<script type="module" src="my_custom_level.js"></script>
<script>
window.GAME_LEVELS=window.GAME_LEVELS||[];
const canvas=document.getElementById('C'),ctx=canvas.getContext('2d');
const lightC=document.createElement('canvas'),lctx=lightC.getContext('2d');
const bloomC=document.createElement('canvas'),bctx=bloomC.getContext('2d');
try{screen.orientation.lock('landscape').catch(()=>{})}catch(e){}
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}
resize();window.addEventListener('resize',resize);

// ===== AUDIO SYSTEM =====
const SFX={
ctx:null,
masterGain:null,
musicGain:null,
sfxGain:null,
initialized:false,
musicPlaying:false,
heartbeatInterval:null,
_musicTimeout:null,
_ambTimeout:null,
volumes:{master:0.5,music:0.4,sfx:0.7},
_settingsFrom:null,

init(){
if(this.initialized)return;
try{
this.ctx=new(window.AudioContext||window.webkitAudioContext)();
this.masterGain=this.ctx.createGain();
this.masterGain.gain.value=this.volumes.master;
this.masterGain.connect(this.ctx.destination);
this.musicGain=this.ctx.createGain();
this.musicGain.gain.value=this.volumes.music;
this.musicGain.connect(this.masterGain);
this.sfxGain=this.ctx.createGain();
this.sfxGain.gain.value=this.volumes.sfx;
this.sfxGain.connect(this.masterGain);
this.initialized=true;
// Load saved volumes
try{const sv=JSON.parse(localStorage.getItem('dp_vol'));if(sv){this.setMaster(sv.master);this.setMusic(sv.music);this.setSfx(sv.sfx);}}catch(e){}
}catch(e){}
},

resume(){if(this.ctx&&this.ctx.state==='suspended')this.ctx.resume();},

setMaster(v){this.volumes.master=v;if(this.masterGain)this.masterGain.gain.value=v;this._saveVol();},
setMusic(v){this.volumes.music=v;if(this.musicGain)this.musicGain.gain.value=v;this._saveVol();},
setSfx(v){this.volumes.sfx=v;if(this.sfxGain)this.sfxGain.gain.value=v;this._saveVol();},
_saveVol(){try{localStorage.setItem('dp_vol',JSON.stringify(this.volumes));}catch(e){}},

// ---- spatial audio: sounds fade with distance from the player and are muffled by walls ----
_posGain:1,lx:0,ly:0,world:null,
setListener(x,y,world){this.lx=x;this.ly=y;this.world=world;},
spatialGain(wx,wy){if(!this.world)return 1;const dx=wx-this.lx,dy=wy-this.ly,dist=Math.hypot(dx,dy);const MAX=580;let g=Math.max(0,1-dist/MAX);g=g*g*1.25;if(g>0.05&&typeof hasLOS==='function'&&!hasLOS(this.world,this.lx,this.ly,wx,wy))g*=0.3;return Math.min(1,g);},
at(wx,wy,fn){const g=this.spatialGain(wx,wy);if(g<=0.02)return;this._posGain=g;try{fn();}finally{this._posGain=1;}},

playTone(freq,dur,type='square',vol=0.2,detune=0){
if(!this.initialized)return;vol*=(this._posGain||1);if(vol<0.0008)return;
const o=this.ctx.createOscillator();
const g=this.ctx.createGain();

_playMusicLoop(){
if(!this.musicPlaying||!this.initialized)return;
// Melodic pentatonic arpeggio pattern
const scale=[130.81,146.83,164.81,196.00,220.00,261.63,293.66,329.63,392.00,440.00];
const patterns=[
[0,2,4,7,9,7,4,2],
[1,3,5,8,9,8,5,3],
[0,4,7,9,7,4,2,0],
[2,5,7,9,8,5,3,1],
];
const pattern=patterns[Math.floor(Math.random()*patterns.length)];
const noteDur=0.55;
const t=this.ctx.currentTime;

pattern.forEach((ni,i)=>{
const freq=scale[ni];
const nt=t+i*noteDur;

// Main melody - sine for clarity
const o1=this.ctx.createOscillator();
const g1=this.ctx.createGain();
o1.type='sine';o1.frequency.value=freq;
g1.gain.setValueAtTime(0,nt);
g1.gain.linearRampToValueAtTime(0.07,nt+0.05);
g1.gain.setValueAtTime(0.07,nt+noteDur*0.5);
g1.gain.exponentialRampToValueAtTime(0.001,nt+noteDur*0.95);
o1.connect(g1);g1.connect(this.musicGain);
o1.start(nt);o1.stop(nt+noteDur);

// Harmony - triangle octave below
const o2=this.ctx.createOscillator();
const g2=this.ctx.createGain();
o2.type='triangle';o2.frequency.value=freq*0.5;
g2.gain.setValueAtTime(0,nt);
g2.gain.linearRampToValueAtTime(0.03,nt+0.08);
g2.gain.exponentialRampToValueAtTime(0.001,nt+noteDur*0.9);
o2.connect(g2);g2.connect(this.musicGain);
o2.start(nt);o2.stop(nt+noteDur);

// Soft pad - sine fifth
if(i%2===0){
const o3=this.ctx.createOscillator();
const g3=this.ctx.createGain();
o3.type='sine';o3.frequency.value=freq*1.5;
g3.gain.setValueAtTime(0,nt);
g3.gain.linearRampToValueAtTime(0.015,nt+0.1);
g3.gain.exponentialRampToValueAtTime(0.001,nt+noteDur*2*0.9);
o3.connect(g3);g3.connect(this.musicGain);
o3.start(nt);o3.stop(nt+noteDur*2);
}
});

// Bass drone
const ob=this.ctx.createOscillator();
const gb=this.ctx.createGain();
ob.type='sine';ob.frequency.value=scale[pattern[0]]*0.25;
const totalDur=pattern.length*noteDur;
gb.gain.setValueAtTime(0,t);
gb.gain.linearRampToValueAtTime(0.04,t+0.3);
gb.gain.setValueAtTime(0.04,t+totalDur-0.5);
gb.gain.exponentialRampToValueAtTime(0.001,t+totalDur);
ob.connect(gb);gb.connect(this.musicGain);
ob.start(t);ob.stop(t+totalDur);

// Schedule next phrase with a small gap
this._musicTimeout=setTimeout(()=>this._playMusicLoop(),(totalDur+0.8)*1000);
},
};

const U={
lerp(a,b,t){return a+(b-a)*t},
clamp(v,a,b){return Math.max(a,Math.min(b,v))},
dist(x1,y1,x2,y2){return Math.sqrt((x2-x1)**2+(y2-y1)**2)},
rand(a,b){return Math.random()*(b-a)+a},
ri(a,b){return Math.floor(U.rand(a,b+1))},
ch(p){return Math.random()<p},
rc(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}
};

function hasLOS(w,x1,y1,x2,y2){
const dx=x2-x1,dy=y2-y1,d=Math.sqrt(dx*dx+dy*dy),s=Math.ceil(d/10);
for(let i=0;i<=s;i++){const t=i/s;const tx=Math.floor((x1+dx*t)/w.ts),ty=Math.floor((y1+dy*t)/w.ts);
if(ty>=0&&ty<w.th&&tx>=0&&tx<w.tw&&w.tiles[ty][tx]===1)return false;}
return true;
}

class SlashArc{
constructor(x,y,facing,range,color,step){this.x=x;this.y=y;this.facing=facing;this.range=range;this.color=color||'#adf';this.step=step||0;this.life=step===2?11:8;this.ml=this.life;

const g=[[0,1.15,-0.5,1],[0,1.15,0.5,1],[0,1.5,0,1.55]][this.step|0]||[0,1.15,0,1];
this.ca=g[0];this.span=g[1];this.tilt=g[2];this.girth=g[3];}
update(){this.life--;return this.life>0;}
draw(c,cam){
const sx=this.x-cam.x,sy=this.y-cam.y,a=this.life/this.ml,ease=Math.sin(a*Math.PI*0.5);

c.beginPath();c.arc(0,0,r*(0.6+ease*0.5),a0,a1);c.stroke();
c.lineWidth=1.6*a*this.girth;c.strokeStyle='#fff';c.globalAlpha=a*0.6;

c.shadowBlur=0;c.globalCompositeOperation='source-over';c.restore();
}
}

class Arrow{
constructor(x,y,vx,vy,dmg,owner,opts={}){this.x=x;this.y=y;this.vx=vx;this.vy=vy;this.dmg=dmg;this.owner=owner;this.w=12;this.h=3;this.life=600;this.stuck=false;this.stuckTimer=1200;this.angle=Math.atan2(vy,vx);this.dead=false;

class ArrowTrap{
constructor(x,y,opts={}){
this.x=x*32;this.y=y*32;this.w=32;this.h=32;
this.rotate=opts.rotate||0;// 0=right,90=down,180=left,270=up
this.fireRate=opts.fireRate||120;
this.projectileSpeed=opts.projectileSpeed||7;
this.cooldown=Math.random()*this.fireRate;// stagger initial shots
this.damage=opts.damage||15;
}
getDir(){
const r=((this.rotate%360)+360)%360;
if(r===0)return{vx:1,vy:0};
if(r===90)return{vx:0,vy:1};
if(r===180)return{vx:-1,vy:0};
if(r===270)return{vx:0,vy:-1};
const rad=r*Math.PI/180;return{vx:Math.cos(rad),vy:Math.sin(rad)};
}
update(game,dt){
this.cooldown-=dt;
if(this.cooldown<=0){
this.cooldown=this.fireRate;
const dir=this.getDir();
const spd=this.projectileSpeed;
// march the muzzle out of any wall the trap is mounted in, so the arrow clears the masonry
const ts=game.world.ts;let mx=this.x+this.w/2,my=this.y+this.h/2;
for(let step=0;step<5&&game.world.isSolid(Math.floor(mx/ts),Math.floor(my/ts));step++){mx+=dir.vx*ts;my+=dir.vy*ts;}
mx+=dir.vx*12;my+=dir.vy*12;this._mx=mx;this._my=my;
const ar=new Arrow(mx,my,dir.vx*spd,dir.vy*spd,this.damage,'enemy',{lowGravity:true});
game.arrows.push(ar);
// muzzle flash
game.particles.emit(mx,my,5,{color:'#ffe0a0',size:2,life:8,glow:true,gravity:0,friction:0.8,vxMin:dir.vx*1-0.5,vxMax:dir.vx*3+0.5,vyMin:dir.vy*1-0.5,vyMax:dir.vy*3+0.5});
// Only play sound if trap is visible on screen
const sx=this.x-game.cam.x,sy=this.y-game.cam.y;
if(sx>-this.w&&sx<canvas.width+this.w&&sy>-this.h&&sy<canvas.height+this.h)SFX.bowShoot();
}
}
draw(c,cam){
const sx=this.x-cam.x,sy=this.y-cam.y;
if(sx<-64||sx>canvas.width+64)return;
const pct=U.clamp(1-this.cooldown/this.fireRate,0,1);const charge=Math.max(0,(pct-0.68)/0.32);// 0..1 in the last third
c.save();c.translate(sx+this.w/2,sy+this.h/2);
c.rotate(this.rotate*Math.PI/180);
// ---- carved-stone housing (bevelled block) ----
const bg=c.createLinearGradient(0,-15,0,15);bg.addColorStop(0,'#4a4652');bg.addColorStop(.5,'#33303c');bg.addColorStop(1,'#211f28');c.fillStyle=bg;c.fillRect(-15,-15,30,30);
c.fillStyle='#565260';c.fillRect(-15,-15,30,2.5);c.fillStyle='#17151d';c.fillRect(-15,13,30,2);
// iron banding top & bottom with rivets
c.fillStyle='#26242c';c.fillRect(-15,-11,30,3);c.fillRect(-15,8,30,3);
c.fillStyle='#6a6676';for(const rx of [-11,-4,3,10]){c.beginPath();c.arc(rx,-9.5,1.3,0,Math.PI*2);c.fill();c.beginPath();c.arc(rx,9.5,1.3,0,Math.PI*2);c.fill();}
// weathering
c.strokeStyle='rgba(0,0,0,0.3)';c.lineWidth=1;c.beginPath();c.moveTo(-9,-7);c.lineTo(-7,7);c.moveTo(8,-6);c.lineTo(6,6);c.stroke();
// ---- the bore (dark tube the bolt fires from), pointing +x (right) before rotation ----
c.fillStyle='#0a090d';c.beginPath();c.ellipse(6,0,5.5,7,0,0,Math.PI*2);c.fill();
c.fillStyle='#000';c.beginPath();c.ellipse(6,0,3.4,5,0,0,Math.PI*2);c.fill();
// iron rim around the bore
c.strokeStyle='#565260';c.lineWidth=1.6;c.beginPath();c.ellipse(6,0,5.8,7.3,0,0,Math.PI*2);c.stroke();

getZones(){const cw=canvas.width,ch=canvas.height;const m=Math.max(12,Math.round(cw*0.012));const bw=Math.round(Math.min(cw*0.13,110)),bh=Math.round(Math.min(ch*0.2,96));

ts(e){e.preventDefault();SFX.init();SFX.resume();for(const t of e.changedTouches)this.assignT(t);}
tm(e){e.preventDefault();for(const t of e.changedTouches){const b=this.touches[t.identifier];if(b&&(b==='left'||b==='right'||b==='down')){const z=this.getZones(),nb=this.hitM(t.clientX,t.clientY,z);if(nb!==b){this.btns[b]=false;if(nb){this.btns[nb]=true;this.touches[t.identifier]=nb;}}}}}

getMoveX(){let x=0;if(this.btns.left||this.gp.left||this.keys['ArrowLeft']||this.keys['KeyA'])x=-1;if(this.btns.right||this.gp.right||this.keys['ArrowRight']||this.keys['KeyD'])x=1;return x;}

isJump(){return this.btns.jump||this.gp.jump||this.keys['Space']||this.keys['KeyW']||this.keys['ArrowUp'];}

}

init(theme,world){

const pal=this.themes[theme]||this.themes.dungeon;this.pal=pal;
this.rng=54321;
const rand=()=>{this.rng=(this.rng*1103515245+12345)&0x7fffffff;return this.rng/0x7fffffff;};
const n=Math.min(120,Math.floor((world.pw*world.ph)/78000)+55);

const mk=(count,minW,maxW,minH,maxH,winP)=>{const arr=[];for(let i=0;i<count;i++){const w=minW+rand()*(maxW-minW),h=minH+rand()*(maxH-minH);const cols=Math.max(1,Math.round(w/24)),rows=Math.max(1,Math.round(h/32));const wins=[];for(let r=0;r<rows-1;r++)for(let cc=0;cc<cols;cc++){if(rand()<0.72)wins.push({r,cc,lit:rand()<winP,fl:rand()*6});}arr.push({x:rand()*world.pw,w,h,cols,rows,wins,arch:rand()<0.45,tower:rand()<0.35,broken:(rand()*7)|0});}return arr;};
this.far=mk(16,90,190,150,320,0.14);
this.mid=mk(20,54,130,100,240,0.18);
this.near=mk(13,36,90,64,168,0.22);

_struct(c,x,baseY,s,body,winCol,litA,detail,t){
const y0=baseY-s.h;c.fillStyle=body;c.fillRect(x,y0,s.w,s.h);
// crenellated / broken top
const cols=s.tower?Math.max(2,s.cols):s.cols,mw=Math.max(5,s.w/(cols*1.7)),gap=(s.w-mw*cols)/(cols+1);

// a broken diagonal corner for ruin feel
if(s.broken%2===0){c.save();c.fillStyle='rgba(0,0,0,0.18)';c.beginPath();c.moveTo(x+s.w,y0);c.lineTo(x+s.w-s.w*0.35,y0);c.lineTo(x+s.w,y0+s.h*0.28);c.closePath();c.fill();c.restore();}

else if(this.theme==='castle'){c.beginPath();c.moveTo(cxx-s.w*0.14,y0);c.lineTo(cxx,y0-s.w*0.44);c.lineTo(cxx+s.w*0.14,y0);c.closePath();c.fill();c.save();c.globalAlpha=0.5;c.fillStyle='rgba(220,240,255,0.3)';c.beginPath();c.moveTo(cxx-2,y0-6);c.lineTo(cxx,y0-s.w*0.4);c.lineTo(cxx+1,y0-6);c.closePath();c.fill();c.restore();}
else if(this.theme==='ramparts'){c.fillRect(cxx-1,y0-26,2,26);c.fillStyle='rgba(150,45,40,0.45)';c.beginPath();c.moveTo(cxx+1,y0-26);c.lineTo(cxx+13,y0-22);c.lineTo(cxx+7,y0-18.5);c.lineTo(cxx+13,y0-15);c.lineTo(cxx+1,y0-14);c.closePath();c.fill();}}
if(this.theme==='sewers'){c.save();c.fillStyle='rgba(0,0,0,0.3)';const pr=Math.min(s.w*0.3,30);c.beginPath();c.arc(x+s.w*0.5,baseY,pr,Math.PI,0);c.fill();c.restore();}
if(detail>=1){
const cw2=(s.w-8)/s.cols,rh=(s.h-14)/Math.max(1,s.rows);
for(const wgn of s.wins){const wx=x+5+wgn.cc*cw2+cw2*0.22,wy=y0+7+wgn.r*rh,ww=cw2*0.5,wh=Math.min(rh*0.62,ww*1.7);
if(detail>=2){c.fillStyle='rgba(0,0,0,0.32)';c.fillRect(wx-1,wy-1,ww+2,wh+2);}
if(wgn.lit){c.save();c.globalCompositeOperation='lighter';const fl=0.75+Math.sin(t/380+wgn.fl)*0.25;c.fillStyle=winCol+(litA*fl).toFixed(2)+')';c.fillRect(wx,wy,ww,wh);c.restore();}
else if(detail>=2){c.fillStyle='rgba(0,0,0,0.22)';c.fillRect(wx,wy,ww,wh);}}}
// arched opening at the base
if(s.arch){const aw=s.w*0.42,ax=x+s.w*0.29,ah=Math.min(s.h*0.55,46);c.fillStyle='rgba(0,0,0,0.4)';c.beginPath();c.moveTo(ax,baseY);c.lineTo(ax,baseY-ah*0.55);c.quadraticCurveTo(ax+aw/2,baseY-ah,ax+aw,baseY-ah*0.55);c.lineTo(ax+aw,baseY);c.closePath();c.fill();}
},
_layer(c,list,cam,par,W,world,body,winCol,litA,detail,t){for(const s of list){const sx=s.x-cam.x*par;const dx=((sx%world.pw)+world.pw)%world.pw;for(const ox of [dx-world.pw,dx,dx+world.pw]){if(ox>W+200||ox+s.w<-200)continue;this._struct(c,ox,this._baseY,s,body,winCol,litA,detail,t);}}},

this._layer(c,this.far,cam,0.1,W,world,pal.far,pal.win,0,0,t);
c.fillStyle='rgba('+pal.haze+',0.5)';c.fillRect(0,0,W,H);

c.save();c.globalCompositeOperation='lighter';
for(let i=0;i<4;i++){const rx=(i*W/4+((t/70)%(W))*0.12+i*140)%(W+340)-170;const rw=70+i*36;const grd=c.createLinearGradient(rx,0,rx+rw*0.55,H);grd.addColorStop(0,pal.ray+(0.045+Math.sin(t/2100+i)*0.028).toFixed(3)+')');grd.addColorStop(1,pal.ray+'0)');c.fillStyle=grd;c.beginPath();c.moveTo(rx,0);c.lineTo(rx+rw,0);c.lineTo(rx+rw*0.35,H);c.lineTo(rx-rw*0.35,H);c.closePath();c.fill();}
c.restore();
// MID structures (lit windows) + light haze
this._layer(c,this.mid,cam,0.26,W,world,pal.mid,pal.win,0.34,1,t);
c.fillStyle='rgba('+pal.haze+',0.26)';c.fillRect(0,0,W,H);
// NEAR structures (full detail)
this._layer(c,this.near,cam,0.46,W,world,pal.near,pal.win,0.42,2,t);
// drifting fog banks
c.save();
for(let i=0;i<3;i++){const fy=H*0.4+i*H*0.2+Math.sin(t/3000+i*2)*20;const drift=(t/40*(0.3+i*0.2)+cam.x*0.05)%(W+400)-200;const fgd=c.createRadialGradient(drift,fy,10,drift,fy,280+i*70);fgd.addColorStop(0,pal.fog+(0.12-i*0.02).toFixed(3)+')');fgd.addColorStop(1,pal.fog+'0)');c.fillStyle=fgd;c.fillRect(0,fy-200,W,400);}

c.shadowBlur=0;c.restore();
},

if(head&&floorBelow&&tx-lastX>=8){const cw=2,cx=tx+Math.floor((gw-cw)/2);addCrumble(cx,ty,cw);placed++;lastX=tx;}

this.doors=ld.decos.filter(d=>d.type==='door').map(d=>{const dr=new Door(d.x,d.y);dr.y=_floorAt(d)*32-62;return dr;});const _ceil={chain:1,web:1,cage:1,vine:1,root:1,icicle:1},_floorSurf={bones:1,grass:1,fern:1,brazier:1,candle:1,skullpile:1,flag:1,cell:1,sarcophagus:1};this.decos=this.decos.map(d=>{let py=d.y*32;if(_ceil[d.type]){let cy=1;for(let y=d.y;y>=0;y--)if(this.world.tiles[y]&&this.world.tiles[y][d.x]===1){cy=y;break;}py=cy*32+32;}else if(_floorSurf[d.type]){let fy=this.world.th-2;for(let y=d.y;y<this.world.th;y++)if(this.world.tiles[y]&&(this.world.tiles[y][d.x]===1||this.world.tiles[y][d.x]===2)){fy=y;break;}py=fy*32;}else{let fy=this.world.th-2;for(let y=d.y;y<this.world.th;y++)if(this.world.tiles[y]&&(this.world.tiles[y][d.x]===1||this.world.tiles[y][d.x]===2)){fy=y;break;}py=fy*32-16;}return{x:d.x*32,y:py,type:d.type};});this.arrows=[];this.bombs=[];this.ft=[];this.slashArcs=[];this.orbs=[];this.shockwaves=[];this.globs=[];this.pools=[];this.particles=new PS();
this.vents=(ld.vents||[]).map(v=>new FlameVent(v.x,v.y,{cycle:v.cycle,offset:v.offset}));this.levelDmgTaken=0;this._flawlessGiven=false;

this.player.flasks=this.player.flaskMax;this.player.curse=0;this.player.comboStep=0;this.player.comboT=0;this.player.slam=false;
this.streak=0;this.streakT=0;this.fadeT=36;SFX.startAmbient();
// ArrowTraps from level data
this.arrowTraps=(ld.traps||[]).map(t=>new ArrowTrap(t.x,t.y,{rotate:t.rotate||0,fireRate:t.fireRate||120,projectileSpeed:t.projectileSpeed||7,damage:t.damage||15}));

// ---- Seed ice, moss & arrow traps into levels that lack them, adapting to the terrain ----
{const tiles=this.world.tiles,W2=this.world.tw,H2=this.world.th;const solidAt=(x,y)=>tiles[y]&&tiles[y][x]===1;const floorAt=(x,y)=>tiles[y]&&(tiles[y][x]===1||tiles[y][x]===2);const openAt=(x,y)=>tiles[y]&&tiles[y][x]===0;

updatePlayer(dt){const p=this.player,inp=this.input;const s=dt;SFX.setListener(p.x+p.w/2,p.y+p.h/2,this.world);if(p.hp<=0){this.die();return;}p.sqx=U.lerp(p.sqx,1,0.18*s);p.sqy=U.lerp(p.sqy,1,0.18*s);if(p.inv>0)p.inv-=s;if(p.acd>0)p.acd-=s;if(p.rlcd>0)p.rlcd-=s;if(p.scd>0)p.scd-=s;if(p.shieldTimer>0){p.shieldTimer-=s;if(p.shieldTimer<=0)p.shield=0;}const spT=this.world.getTilesAround(p.x,p.y,p.w,p.h);for(const t of spT)if(t.type===3&&U.rc({x:p.x,y:p.y,w:p.w,h:p.h},t)){if(p.inv<=0){this.playerTakeDmg(15,0);p.vy=-8;}}if(p.gr){p.cyt=10;p.dj=p.hdj;p.wjLeft=p.wjMax;}else if(p.cyt>0)p.cyt-=s;if(p.jbt>0)p.jbt-=s;

if(p.gr&&this.fr%2===0)this.particles.emit(p.x+p.w/2-p.facing*7,p.y+p.h-1,2,{color:'#a89878',size:2.6,life:15,gravity:0.03,friction:0.9,vxMin:-p.facing*2.2,vxMax:-p.facing*0.3,vyMin:-1.2,vyMax:0.2});
if(p.rollDamageTrail){this.particles.emit(p.x+p.w/2,p.y+p.h,2,{color:'#48f',size:4,life:15,glow:true,vxMin:-1,vxMax:1,vyMin:0,vyMax:1,gravity:0});for(const en of this.enemies){if(!en.alive||this.rollDamagedEnemies.has(en))continue;if(U.dist(p.x+p.w/2,p.y+p.h/2,en.x+en.w/2,en.y+en.h/2)<40){const rdmg=8;en.hit(rdmg,p.facing);this.rollDamagedEnemies.add(en);this.ft.push(new FT(en.x+en.w/2,en.y,rdmg+'','#48f'));if(!en.alive)this.onKill(en);}}}if(p.rlt<=0){p.rl=false;this.rollDamagedEnemies.clear();}this.applyPP(s);return;}

// ---- LEDGE HANG ----
if(p.hang){
p.vx=0;p.vy=0;p.wjLeft=p.wjMax;p.dj=p.hdj;p.jbt=0;
const hmx=inp.getMoveX();
const jHeld=inp.isJump();

this.applyPP(s);return;
}

const jbtn=(zz,on,cd)=>{const cx=zz.cx,cy=zz.cy,r=zz.r,col='#6f6';c.globalAlpha=on?0.96:0.6;c.beginPath();c.arc(cx,cy,r,0,Math.PI*2);const g=c.createRadialGradient(cx,cy-r*0.3,r*0.2,cx,cy,r);g.addColorStop(0,on?'rgba(20,80,40,.95)':'rgba(16,26,20,.78)');g.addColorStop(1,'rgba(4,8,6,.6)');c.fillStyle=g;c.fill();
c.globalAlpha=on?1:0.78;c.lineWidth=3;c.strokeStyle=on?col:'rgba(120,170,130,.6)';c.beginPath();c.arc(cx,cy,r,0,Math.PI*2);c.stroke();
c.save();c.translate(cx,cy-r*0.06);c.strokeStyle=on?'#c8ffcc':'#9fd0a8';c.shadowColor=on?col:'transparent';c.shadowBlur=on?12:0;c.lineWidth=Math.max(3,r*0.16);c.lineCap='round';c.lineJoin='round';
const cw2=r*0.42,ch2=r*0.32;for(let k=0;k<2;k++){const oy=-r*0.16+k*r*0.34;c.beginPath();c.moveTo(-cw2,oy+ch2);c.lineTo(0,oy-ch2*0.4);c.lineTo(cw2,oy+ch2);c.stroke();}c.restore();c.shadowBlur=0;
c.globalAlpha=on?0.95:0.7;c.fillStyle=on?col:'#8ab';c.font=`bold ${Math.round(r*0.3)}px Courier New`;c.textAlign='center';c.fillText('JUMP',cx,cy+r*0.6);};
const wt=p.weapons[p.cw].type;
cbtn(z.attack,wt==='sword'?'⚔':'➹',wt==='sword'?'ATTACK':'SHOOT','#f55',inp.btns.attack,p.acd>0?p.acd/(p.ad+4):0);
jbtn(z.jump,inp.btns.jump);
cbtn(z.roll,'⟳','ROLL','#4af',inp.btns.roll,p.rlcd>0?p.rlcd/35:0);
cbtn(z.skill,'✦','SKILL','#fb3',inp.btns.skill,p.scd>0?p.scd/p.smc:0);
cbtn(z.swap,'⇄','SWAP','#da5',inp.btns.swap);
cbtn(z.sneak,'☾','SNEAK','#a48fd0',inp.btns.sneak);
cbtn(z.flask,'✚','FLASK','#4d6',inp.btns.flask,p.flasks<=0?1:0);
{const fz=z.flask;c.globalAlpha=0.95;c.fillStyle=p.flasks>0?'#4d6':'#556';c.beginPath();c.arc(fz.cx+fz.r*0.72,fz.cy-fz.r*0.72,9,0,Math.PI*2);c.fill();c.fillStyle='#031';c.font='bold 11px Courier New';c.fillText(''+p.flasks,fz.cx+fz.r*0.72,fz.cy-fz.r*0.72+1);}
c.restore();}

drawMinimap(c){const mmW=Math.min(130,canvas.width*.13),mmH=Math.min(66,canvas.height*.16),mx=canvas.width-mmW-10,my=10,scX=mmW/this.world.pw,scY=mmH/this.world.ph;c.save();c.fillStyle='rgba(6,10,16,0.6)';this._rr(c,mx-4,my-4,mmW+8,mmH+8,5);c.fill();c.strokeStyle='rgba(0,255,170,0.25)';c.lineWidth=1;this._rr(c,mx-4,my-4,mmW+8,mmH+8,5);c.stroke();c.save();this._rr(c,mx,my,mmW,mmH,3);c.clip();const exp=this.world.explored;
// ---- cached static explored-tile layer: only re-rasterise when new area is explored (avoids a full-map scan every frame) ----
const mw=Math.max(1,Math.ceil(mmW)),mh=Math.max(1,Math.ceil(mmH));
if(!this._mm||this._mm.width!==mw||this._mm.height!==mh){this._mm=document.createElement('canvas');this._mm.width=mw;this._mm.height=mh;this._mmExp=-1;this._mmLvl=-1;}
if(this._mmExp!==exp.size||this._mmLvl!==this.actualLvl){this._mmExp=exp.size;this._mmLvl=this.actualLvl;const mc=this._mm.getContext('2d');mc.clearRect(0,0,mw,mh);mc.globalAlpha=.75;const ts=this.world.ts;for(let ty=0;ty<this.world.th;ty++){const row=this.world.tiles[ty];if(!row)continue;for(let tx=0;tx<this.world.tw;tx++){const t=row[tx];if(!t)continue;if(!exp.has((tx>>2)+','+(ty>>2)))continue;mc.fillStyle=t===1?'#3a4256':t===2?'#33507a':t===3?'#7a2222':t===4?'#4ab0f0':t===5?'#3a8a3a':t===6?'#c8963c':'#556';mc.fillRect(tx*ts*scX,ty*ts*scY,Math.max(1,ts*scX),Math.max(1,ts*scY));}}mc.globalAlpha=1;}
c.drawImage(this._mm,mx,my);
c.strokeStyle='rgba(255,255,255,.35)';c.lineWidth=1;c.strokeRect(mx+this.cam.x*scX,my+this.cam.y*scY,(this.vw||canvas.width)*scX,(this.vh||canvas.height)*scY);c.fillStyle='#f44';for(const en of this.enemies)if(en.alive&&exp.has((Math.floor(en.x/32)>>2)+','+(Math.floor(en.y/32)>>2))){c.fillRect(mx+en.x*scX-1,my+en.y*scY-1,2.5,2.5);}const pl=0.6+Math.sin(Date.now()/250)*0.4;c.fillStyle='#a060ff';c.globalAlpha=pl;c.fillRect(mx+this.portalPos.x*scX-1.5,my+this.portalPos.y*scY-1.5,4,4);c.globalAlpha=1;c.fillStyle='#0fa';c.shadowColor='#0fa';c.shadowBlur=5;c.fillRect(mx+this.player.x*scX-1.5,my+this.player.y*scY-1.5,4,4);c.shadowBlur=0;c.restore();c.restore();}

loop(timestamp){if(!this.lastTime)this.lastTime=timestamp;const elapsed=Math.min(timestamp-this.lastTime,100);this.lastTime=timestamp;this.accumulator+=elapsed;this.pollGamepad();while(this.accumulator>=this.TARGET_MS){this.update(this.FIXED_DT);this.accumulator-=this.TARGET_MS;}this.draw();requestAnimationFrame((t)=>this.loop(t));}
start(){this.fr=0;this.ff=0;requestAnimationFrame((t)=>this.loop(t));}
}

const G=new Game();G.start();
