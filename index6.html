<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Courier New',monospace;touch-action:none;position:fixed}
#C{display:block;width:100%;height:100%;image-rendering:pixelated}
#LS{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(180deg,#0a0a1a,#1a0a2e 50%,#0a0a1a);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;transition:opacity .8s}
#LS.h{opacity:0;pointer-events:none}
.lt{font-size:42px;color:#0fa;text-shadow:0 0 20px #0fa,0 0 40px #0f8,0 0 60px #0f6;margin-bottom:8px;letter-spacing:8px;animation:titlePulse 3s ease-in-out infinite}
@keyframes titlePulse{0%,100%{text-shadow:0 0 20px #0fa,0 0 40px #0f8}50%{text-shadow:0 0 30px #0fa,0 0 60px #0f8,0 0 80px #0f6}}

.lb{width:0;height:100%;background:linear-gradient(90deg,#0fa,#0af);border-radius:3px;transition:width .3s}
.ts{font-size:15px;color:#0fa;margin-top:30px;animation:bk 1.5s infinite;display:none}
@keyframes bk{0%,100%{opacity:1}50%{opacity:.3}}
.menu-btn{padding:14px 50px;margin:8px;background:rgba(0,255,170,.06);border:1px solid #0fa;color:#0fa;font-family:inherit;font-size:16px;border-radius:6px;cursor:pointer;pointer-events:auto;letter-spacing:3px;transition:all .2s;text-transform:uppercase}
.menu-btn:hover,.menu-btn:active{background:rgba(0,255,170,.2);transform:scale(1.05);box-shadow:0 0 20px rgba(0,255,170,.3)}
.menu-btn.red{border-color:#f44;color:#f44;background:rgba(255,68,68,.06)}
.menu-btn.red:hover,.menu-btn.red:active{background:rgba(255,68,68,.2);box-shadow:0 0 20px rgba(255,68,68,.3)}
.menu-btn.gold{border-color:#fd0;color:#fd0;background:rgba(255,221,0,.06)}
.menu-btn.gold:hover,.menu-btn.gold:active{background:rgba(255,221,0,.2);box-shadow:0 0 20px rgba(255,221,0,.3)}
.menu-particles{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden}
.menu-particle{position:absolute;width:2px;height:2px;background:#0fa;border-radius:50%;animation:floatUp linear infinite}
@keyframes floatUp{0%{transform:translateY(100vh) scale(1);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-10vh) scale(0);opacity:0}}
#MainMenu{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(180deg,#050510,#0a0a2a 30%,#15082e 60%,#050510);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:900}

#SaveMenu{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(5,5,20,.97);display:none;flex-direction:column;align-items:center;justify-content:flex-start;z-index:950;overflow-y:auto;padding:20px}
#SaveMenu.active{display:flex}

.save-slot .sl-info{color:#667;font-size:10px}

.save-slot .sl-btn.del{border-color:#622;color:#f44}
.save-slot .sl-btn:active{transform:scale(.95)}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(5,5,20,.95);display:none;flex-direction:column;align-items:center;justify-content:flex-start;z-index:200;overflow-y:auto;padding:15px 10px}
.overlay.active{display:flex}
.ov-title{font-size:22px;color:#0fa;letter-spacing:5px;margin-bottom:4px;margin-top:10px;text-shadow:0 0 12px #0fa}
.ov-sub{font-size:10px;color:#556;margin-bottom:10px}
.ov-currency{font-size:13px;margin-bottom:8px}
.ov-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:7px;max-width:650px}
.ov-item{background:rgba(0,255,170,.04);border:1px solid #224;padding:8px 12px;border-radius:5px;min-width:120px;max-width:150px;cursor:pointer;transition:all .15s;text-align:center;pointer-events:auto}
.ov-item:active{background:rgba(0,255,170,.15);transform:scale(.96)}
.ov-item.dis{border-color:#1a1a1a;opacity:.25;pointer-events:none}
.ov-item.bought{border-color:#333;opacity:.3;pointer-events:none}
.ov-item .nm{color:#adf;font-size:11px;margin-bottom:2px}

.ov-item .co{font-size:10px}
.ov-item .tag{font-size:8px;color:#555;margin-top:2px}
.ov-skip{margin-top:12px;margin-bottom:20px;padding:8px 32px;background:rgba(0,255,170,.07);border:1px solid #0fa;color:#0fa;font-family:inherit;font-size:12px;border-radius:4px;cursor:pointer;pointer-events:auto}
.ov-skip:active{background:rgba(0,255,170,.25)}
#PM{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:300}
#PM.active{display:flex}
.mb{padding:12px 44px;margin:6px;background:rgba(0,255,170,.08);border:1px solid #0fa;color:#0fa;font-family:inherit;font-size:16px;border-radius:4px;cursor:pointer;pointer-events:auto}
.mb:active{background:rgba(0,255,170,.25);transform:scale(.96)}
#DS{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:300;transition:background 1s}
#DS.active{display:flex;background:rgba(20,0,0,.92)}
.dt{font-size:48px;color:#f24;text-shadow:0 0 30px #f00;letter-spacing:12px;margin-bottom:12px}
.ds{color:#a66;font-size:12px;margin:2px}
#PB{position:fixed;top:6px;left:50%;transform:translateX(-50%);width:34px;height:34px;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.2);border-radius:6px;color:#fff;font-size:15px;display:flex;align-items:center;justify-content:center;z-index:50;pointer-events:auto;cursor:pointer}
#Settings{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(5,5,20,.97);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:960}
#Settings.active{display:flex}
.settings-box{background:rgba(0,255,170,.03);border:1px solid #224;border-radius:10px;padding:30px 40px;max-width:400px;width:90%}
.settings-row{margin:16px 0;display:flex;flex-direction:column;gap:6px}
.settings-label{color:#0fa;font-size:13px;letter-spacing:2px;display:flex;justify-content:space-between;align-items:center}
.settings-val{color:#667;font-size:11px}
.vol-slider{-webkit-appearance:none;appearance:none;width:100%;height:6px;background:#1a1a3a;border-radius:3px;outline:none;cursor:pointer}
.vol-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:18px;height:18px;background:#0fa;border-radius:50%;cursor:pointer;box-shadow:0 0 8px #0fa}
.vol-slider::-moz-range-thumb{width:18px;height:18px;background:#0fa;border-radius:50%;cursor:pointer;border:none}
</style></head>

<script type="module" src="my_custom_level.js"></script>
<script>
window.GAME_LEVELS=window.GAME_LEVELS||[];
const canvas=document.getElementById('C'),ctx=canvas.getContext('2d');
try{screen.orientation.lock('landscape').catch(()=>{})}catch(e){}
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}
resize();window.addEventListener('resize',resize);

// ===== AUDIO SYSTEM =====
const SFX={
ctx:null,
masterGain:null,
musicGain:null,
sfxGain:null,
initialized:false,
musicPlaying:false,
heartbeatInterval:null,
_musicTimeout:null,
_ambTimeout:null,
volumes:{master:0.5,music:0.4,sfx:0.7},
_settingsFrom:null,

init(){
if(this.initialized)return;
try{
this.ctx=new(window.AudioContext||window.webkitAudioContext)();
this.masterGain=this.ctx.createGain();
this.masterGain.gain.value=this.volumes.master;
this.masterGain.connect(this.ctx.destination);
this.musicGain=this.ctx.createGain();
this.musicGain.gain.value=this.volumes.music;
this.musicGain.connect(this.masterGain);
this.sfxGain=this.ctx.createGain();
this.sfxGain.gain.value=this.volumes.sfx;
this.sfxGain.connect(this.masterGain);
this.initialized=true;
// Load saved volumes
try{const sv=JSON.parse(localStorage.getItem('dp_vol'));if(sv){this.setMaster(sv.master);this.setMusic(sv.music);this.setSfx(sv.sfx);}}catch(e){}
}catch(e){}
},

resume(){if(this.ctx&&this.ctx.state==='suspended')this.ctx.resume();},

setMaster(v){this.volumes.master=v;if(this.masterGain)this.masterGain.gain.value=v;this._saveVol();},
setMusic(v){this.volumes.music=v;if(this.musicGain)this.musicGain.gain.value=v;this._saveVol();},
setSfx(v){this.volumes.sfx=v;if(this.sfxGain)this.sfxGain.gain.value=v;this._saveVol();},
_saveVol(){try{localStorage.setItem('dp_vol',JSON.stringify(this.volumes));}catch(e){}},

playTone(freq,dur,type='square',vol=0.2,detune=0){
if(!this.initialized)return;
const o=this.ctx.createOscillator();
const g=this.ctx.createGain();
o.type=type;o.frequency.value=freq;o.detune.value=detune;
g.gain.setValueAtTime(vol,this.ctx.currentTime);
g.gain.exponentialRampToValueAtTime(0.001,this.ctx.currentTime+dur);
o.connect(g);g.connect(this.sfxGain);
o.start();o.stop(this.ctx.currentTime+dur);
},

playNoise(dur,vol=0.15,highpass=2000){
if(!this.initialized)return;
const buf=this.ctx.createBuffer(1,this.ctx.sampleRate*dur,this.ctx.sampleRate);
const d=buf.getChannelData(0);
for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1);
const s=this.ctx.createBufferSource();
s.buffer=buf;
const g=this.ctx.createGain();
g.gain.setValueAtTime(vol,this.ctx.currentTime);
g.gain.exponentialRampToValueAtTime(0.001,this.ctx.currentTime+dur);
const f=this.ctx.createBiquadFilter();
f.type='highpass';f.frequency.value=highpass;
s.connect(f);f.connect(g);g.connect(this.sfxGain);
s.start();
},

hit(){this.playTone(200,0.08,'square',0.3);this.playNoise(0.06,0.15);},
swordSwing(){this.playNoise(0.1,0.1);this.playTone(400,0.05,'sawtooth',0.1);},
swordHit(){
  if(!this.initialized)return;
  this.playTone(150,0.1,'square',0.3);
  this.playTone(250,0.06,'sawtooth',0.15);
  this.playNoise(0.08,0.1,1500);
},

bowShoot(){
if(!this.initialized)return;
const t=this.ctx.currentTime;
// String release twang
const o1=this.ctx.createOscillator();
const g1=this.ctx.createGain();
o1.type='sine';
o1.frequency.setValueAtTime(180,t);
o1.frequency.exponentialRampToValueAtTime(90,t+0.15);
g1.gain.setValueAtTime(0.5,t);
g1.gain.exponentialRampToValueAtTime(0.001,t+0.2);
o1.connect(g1);g1.connect(this.sfxGain);
o1.start(t);o1.stop(t+0.2);
// Wood creak
const o2=this.ctx.createOscillator();
const g2=this.ctx.createGain();
o2.type='triangle';
o2.frequency.setValueAtTime(300,t);
o2.frequency.exponentialRampToValueAtTime(150,t+0.08);
g2.gain.setValueAtTime(0.2,t);
g2.gain.exponentialRampToValueAtTime(0.001,t+0.1);
o2.connect(g2);g2.connect(this.sfxGain);
o2.start(t);o2.stop(t+0.1);
// Arrow whoosh - filtered noise
const buf=this.ctx.createBuffer(1,this.ctx.sampleRate*0.12,this.ctx.sampleRate);
const bd=buf.getChannelData(0);
for(let i=0;i<bd.length;i++)bd[i]=(Math.random()*2-1);
const ns=this.ctx.createBufferSource();ns.buffer=buf;
const ng=this.ctx.createGain();
ng.gain.setValueAtTime(0.25,t+0.02);
ng.gain.exponentialRampToValueAtTime(0.001,t+0.14);
const bp=this.ctx.createBiquadFilter();
bp.type='bandpass';bp.frequency.value=1200;bp.Q.value=2;
ns.connect(bp);bp.connect(ng);ng.connect(this.sfxGain);
ns.start(t+0.02);
},

pickup(){this.playTone(600,0.06,'sine',0.05);this.playTone(900,0.08,'sine',0.2);},
goldPickup(){this.playTone(800,0.05,'sine',0.05);this.playTone(1200,0.08,'sine',0.04);this.playTone(1600,0.06,'sine',0.025);},
healthPickup(){this.playTone(400,0.1,'sine',0.05);this.playTone(600,0.12,'sine',0.04);},
playerHit(){this.playTone(100,0.15,'sawtooth',0.3);this.playNoise(0.1,0.2);},
enemyDie(){this.playTone(200,0.1,'square',0.2);this.playTone(100,0.15,'sawtooth',0.15);this.playNoise(0.12,0.12);},
explosion(){this.playNoise(0.3,0.4,400);this.playTone(60,0.3,'sawtooth',0.3);this.playTone(40,0.4,'square',0.2);},
impact(){this.playNoise(0.15,0.3,600);this.playTone(80,0.2,'square',0.25);},
parry(){this.playTone(1000,0.05,'square',0.3);this.playTone(1500,0.08,'sine',0.2);},
levelUp(){for(let i=0;i<5;i++)setTimeout(()=>this.playTone(400+i*200,0.1,'sine',0.15),i*60);},
dodge(){this.playTone(500,0.04,'sine',0.1);},
block(){this.playTone(300,0.06,'square',0.2);this.playNoise(0.04,0.1);},
portal(){this.playTone(400,0.2,'sine',0.15);this.playTone(600,0.25,'sine',0.12);this.playTone(800,0.2,'sine',0.1);},
die(){this.playTone(200,0.3,'sawtooth',0.3);this.playTone(100,0.5,'square',0.2);this.playNoise(0.3,0.2);},

startHeartbeat(hpRatio){
this.stopHeartbeat();
if(hpRatio>0.3||!this.initialized)return;
const rate=300+hpRatio*700;
this.heartbeatInterval=setInterval(()=>{
this.playTone(60,0.08,'sine',0.7);
setTimeout(()=>this.playTone(50,0.1,'sine',0.44),100);
},rate);
},
stopHeartbeat(){if(this.heartbeatInterval){clearInterval(this.heartbeatInterval);this.heartbeatInterval=null;}},

startMusic(){
if(!this.initialized||this.musicPlaying)return;
this.musicPlaying=true;
this._playMusicLoop();
},
stopMusic(){
this.musicPlaying=false;
if(this._musicTimeout){clearTimeout(this._musicTimeout);this._musicTimeout=null;}
},

_playMusicLoop(){
if(!this.musicPlaying||!this.initialized)return;
// Melodic pentatonic arpeggio pattern
const scale=[130.81,146.83,164.81,196.00,220.00,261.63,293.66,329.63,392.00,440.00];
const patterns=[
[0,2,4,7,9,7,4,2],
[1,3,5,8,9,8,5,3],
[0,4,7,9,7,4,2,0],
[2,5,7,9,8,5,3,1],
];
const pattern=patterns[Math.floor(Math.random()*patterns.length)];
const noteDur=0.55;
const t=this.ctx.currentTime;

pattern.forEach((ni,i)=>{
const freq=scale[ni];
const nt=t+i*noteDur;

// Main melody - sine for clarity
const o1=this.ctx.createOscillator();
const g1=this.ctx.createGain();
o1.type='sine';o1.frequency.value=freq;
g1.gain.setValueAtTime(0,nt);
g1.gain.linearRampToValueAtTime(0.07,nt+0.05);
g1.gain.setValueAtTime(0.07,nt+noteDur*0.5);
g1.gain.exponentialRampToValueAtTime(0.001,nt+noteDur*0.95);
o1.connect(g1);g1.connect(this.musicGain);
o1.start(nt);o1.stop(nt+noteDur);

// Harmony - triangle octave below
const o2=this.ctx.createOscillator();
const g2=this.ctx.createGain();
o2.type='triangle';o2.frequency.value=freq*0.5;
g2.gain.setValueAtTime(0,nt);
g2.gain.linearRampToValueAtTime(0.03,nt+0.08);
g2.gain.exponentialRampToValueAtTime(0.001,nt+noteDur*0.9);
o2.connect(g2);g2.connect(this.musicGain);
o2.start(nt);o2.stop(nt+noteDur);

// Soft pad - sine fifth
if(i%2===0){
const o3=this.ctx.createOscillator();
const g3=this.ctx.createGain();
o3.type='sine';o3.frequency.value=freq*1.5;
g3.gain.setValueAtTime(0,nt);
g3.gain.linearRampToValueAtTime(0.015,nt+0.1);
g3.gain.exponentialRampToValueAtTime(0.001,nt+noteDur*2*0.9);
o3.connect(g3);g3.connect(this.musicGain);
o3.start(nt);o3.stop(nt+noteDur*2);
}
});

// Bass drone
const ob=this.ctx.createOscillator();
const gb=this.ctx.createGain();
ob.type='sine';ob.frequency.value=scale[pattern[0]]*0.25;
const totalDur=pattern.length*noteDur;
gb.gain.setValueAtTime(0,t);
gb.gain.linearRampToValueAtTime(0.04,t+0.3);
gb.gain.setValueAtTime(0.04,t+totalDur-0.5);
gb.gain.exponentialRampToValueAtTime(0.001,t+totalDur);
ob.connect(gb);gb.connect(this.musicGain);
ob.start(t);ob.stop(t+totalDur);

// Schedule next phrase with a small gap
this._musicTimeout=setTimeout(()=>this._playMusicLoop(),(totalDur+0.8)*1000);
},
};

const U={
lerp(a,b,t){return a+(b-a)*t},
clamp(v,a,b){return Math.max(a,Math.min(b,v))},
dist(x1,y1,x2,y2){return Math.sqrt((x2-x1)**2+(y2-y1)**2)},

ch(p){return Math.random()<p},

};

function hasLOS(w,x1,y1,x2,y2){
const dx=x2-x1,dy=y2-y1,d=Math.sqrt(dx*dx+dy*dy),s=Math.ceil(d/10);
for(let i=0;i<=s;i++){const t=i/s;const tx=Math.floor((x1+dx*t)/w.ts),ty=Math.floor((y1+dy*t)/w.ts);
if(ty>=0&&ty<w.th&&tx>=0&&tx<w.tw&&w.tiles[ty][tx]===1)return false;}
return true;
}

class SlashArc{

c.save();c.globalAlpha=a*0.7;c.translate(sx,sy);

c.strokeStyle=this.color;c.shadowColor=this.color;c.shadowBlur=12*a;c.lineWidth=3*a;
c.beginPath();c.arc(0,0,this.range*0.6,-1.2,1.2);c.stroke();
c.lineWidth=1.5*a;c.strokeStyle='#fff';c.globalAlpha=a*0.5;
c.beginPath();c.arc(0,0,this.range*0.5,-1.0,1.0);c.stroke();
c.shadowBlur=0;c.restore();
}
}

class Particle{
constructor(x,y,c={}){

class PS{
constructor(){this.p=[]}

draw(c,cam){this.p.forEach(p=>p.draw(c,cam))}

class FT{
constructor(x,y,t,c='#fff'){this.x=x;this.y=y;this.t=t;this.c=c;this.life=50;this.ml=50;this.vy=-1.5}

class Shake{

class Enemy{

update(world,player,game,dt){

this.y+=this.vy*s;let vt=world.getTilesAround(this.x,this.y,this.w,this.h);for(const t of vt)if(t.type===1&&U.rc({x:this.x,y:this.y,w:this.w,h:this.h},t)){this.y=oy;this.vy*=-.5;break;}
}else if(this.archer){

updateElite(world,player,game,see,dx,dy,dist,s){

class Input{
constructor(){this.keys={};this.touches={};this.btns={left:false,right:false,down:false,jump:false,attack:false,roll:false,skill:false,swap:false};
window.addEventListener('keydown',e=>{this.keys[e.code]=true;e.preventDefault();});
window.addEventListener('keyup',e=>{this.keys[e.code]=false;e.preventDefault();});
canvas.addEventListener('touchstart',e=>this.ts(e),{passive:false});
canvas.addEventListener('touchmove',e=>this.tm(e),{passive:false});
canvas.addEventListener('touchend',e=>this.te(e),{passive:false});
canvas.addEventListener('touchcancel',e=>this.te(e),{passive:false});}
getZones(){const cw=canvas.width,ch=canvas.height;const lw=Math.min(cw*0.1,110),lh=Math.min(ch*0.2,100),margin=10;const bottomRowY=ch-lh-margin,topRowY=bottomRowY-lh+5;return{left:{x:margin,y:topRowY,w:lw,h:lh},right:{x:margin+lw+10,y:topRowY,w:lw,h:lh},down:{x:margin+(lw*0.5)+5,y:bottomRowY,w:lw,h:lh*0.8},jump:{cx:cw-80,cy:ch-150,r:34},attack:{cx:cw-140,cy:ch-100,r:38},roll:{cx:cw-80,cy:ch-50,r:32},skill:{cx:cw-200,cy:ch-100,r:30},swap:{cx:cw-200,cy:ch-50,r:28}};}
ts(e){e.preventDefault();SFX.init();SFX.resume();for(const t of e.changedTouches)this.assignT(t);}
tm(e){e.preventDefault();for(const t of e.changedTouches){const b=this.touches[t.identifier];if(b&&(b==='left'||b==='right'||b==='down')){const z=this.getZones(),nb=this.hitM(t.clientX,t.clientY,z);if(nb!==b){this.btns[b]=false;if(nb){this.btns[nb]=true;this.touches[t.identifier]=nb;}}}}}
te(e){e.preventDefault();for(const t of e.changedTouches){const b=this.touches[t.identifier];if(b){this.btns[b]=false;delete this.touches[t.identifier];}}}
hitM(x,y,z){if(x<z.left.x+z.left.w&&y>z.left.y&&y<z.left.y+z.left.h)return'left';if(x>z.right.x&&x<z.right.x+z.right.w&&y>z.right.y&&y<z.right.y+z.right.h)return'right';if(x>z.down.x&&x<z.down.x+z.down.w&&y>z.down.y&&y<z.down.y+z.down.h)return'down';return null;}
assignT(t){const x=t.clientX,y=t.clientY,z=this.getZones();let btn=this.hitM(x,y,z);if(!btn){const bs=[{id:'jump',cx:z.jump.cx,cy:z.jump.cy,r:z.jump.r},{id:'attack',cx:z.attack.cx,cy:z.attack.cy,r:z.attack.r},{id:'roll',cx:z.roll.cx,cy:z.roll.cy,r:z.roll.r},{id:'skill',cx:z.skill.cx,cy:z.skill.cy,r:z.skill.r},{id:'swap',cx:z.swap.cx,cy:z.swap.cy,r:z.swap.r}];let best=null,bd=Infinity;for(const b of bs){const d=U.dist(x,y,b.cx,b.cy);if(d<b.r*1.8&&d<bd){best=b.id;bd=d;}}btn=best;}if(btn){this.btns[btn]=true;this.touches[t.identifier]=btn;}}
getMoveX(){let x=0;if(this.btns.left||this.keys['ArrowLeft']||this.keys['KeyA'])x=-1;if(this.btns.right||this.keys['ArrowRight']||this.keys['KeyD'])x=1;return x;}
isDown(){return this.btns.down||this.keys['ArrowDown']||this.keys['KeyS'];}
isJump(){return this.btns.jump||this.keys['Space']||this.keys['KeyW']||this.keys['ArrowUp'];}
isAttack(){return this.btns.attack||this.keys['KeyJ']||this.keys['KeyZ'];}
isRoll(){return this.btns.roll||this.keys['KeyK']||this.keys['KeyX'];}
isSkill(){return this.btns.skill||this.keys['KeyL']||this.keys['KeyC'];}
isSwap(){return this.btns.swap||this.keys['KeyQ']||this.keys['Tab'];}
}

showSaveMenu(){const el=document.getElementById('SaveMenu');el.classList.add('active');const sub=document.getElementById('SaveMenuSub');sub.textContent=this.saveMenuMode==='new'?'Choose a slot for new game':'Select a save to load';const slots=SaveSystem.getSlotList();let h='';slots.forEach(s=>{if(s.data){const d=new Date(s.data.timestamp);const ts=d.toLocaleDateString()+' '+d.toLocaleTimeString();h+=`<div class="save-slot" onclick="G.selectSlot(${s.slot})"><div class="sl-name">Slot ${s.slot} — Lv${s.data.playerLevel||1}</div><div class="sl-info">Gold: ${s.data.gold||0} | Kills: ${s.data.kills||0} | Level: ${s.data.actualLvl||0}<br>${ts}</div><div class="sl-actions"><div class="sl-btn" onclick="event.stopPropagation();G.selectSlot(${s.slot})">${this.saveMenuMode==='load'?'LOAD':'OVERWRITE'}</div><div class="sl-btn del" onclick="event.stopPropagation();G.deleteSlot(${s.slot})">DELETE</div></div></div>`;}else{h+=`<div class="save-slot empty" onclick="G.selectSlot(${s.slot})"><div class="sl-name">Slot ${s.slot} — Empty</div><div class="sl-info">${this.saveMenuMode==='new'?'Click to start new game here':'No save data'}</div></div>`;}});document.getElementById('SaveSlots').innerHTML=h;}
closeSaveMenu(){document.getElementById('SaveMenu').classList.remove('active');this.showMainMenu();}

selectSlot(slot){document.getElementById('SaveMenu').classList.remove('active');this.currentSlot=slot;if(this.saveMenuMode==='load'){const data=SaveSystem.load(slot);if(data){this.loadFromSave(data);}else{this.startFresh();}}else{this.startFresh();}}

startFresh(){this.player=this.mkP();this.ups={hp:0,dmg:0,spd:0,bow:0,dodge:0,vamp:0};this.boughtOnce={};this.stats={cells:0,kills:0,gold:0,st:Date.now()};this.slashArcs=[];document.getElementById('PB').style.display='flex';SFX.stopMusic();this.startLevel(0);}

loadFromSave(data){this.player=this.mkP();this.boughtOnce=data.boughtOnce||{};this.ups=data.ups||{hp:0,dmg:0,spd:0,bow:0,dodge:0,vamp:0};this.stats={cells:data.cells||0,kills:data.kills||0,gold:data.gold||0,st:Date.now()};if(data.playerData){const pd=data.playerData;this.player.mhp=pd.mhp||this.player.mhp;this.player.hp=pd.hp||this.player.mhp;this.player.speed=pd.speed||this.player.speed;this.player.gold=pd.gold||0;this.player.cells=0;this.player.weapons=pd.weapons||this.player.weapons;this.player.hasParry=pd.hasParry||false;this.player.hasStrikeBlock=pd.hasStrikeBlock||false;this.player.dodgeChance=pd.dodgeChance||0;this.player.vampLvl=pd.vampLvl||0;this.player.vampChance=pd.vampChance||0;this.player.level=pd.level||1;this.player.exp=pd.exp||0;this.player.etl=pd.etl||50;this.player.pullOnHit=pd.pullOnHit||false;this.player.arrowPierce=pd.arrowPierce||false;this.player.rollDamageTrail=pd.rollDamageTrail||false;this.player.hasGroundPound=pd.hasGroundPound||false;}this.slashArcs=[];document.getElementById('PB').style.display='flex';SFX.stopMusic();this.startLevel(data.actualLvl||0);}

saveGame(){if(!this.currentSlot)return;const p=this.player;const data={actualLvl:this.actualLvl||0,boughtOnce:this.boughtOnce,ups:this.ups,cells:this.stats.cells,kills:this.stats.kills,gold:this.stats.gold,playerLevel:p.level,playerData:{mhp:p.mhp,hp:p.hp,speed:p.speed,gold:p.gold,weapons:p.weapons,hasParry:p.hasParry,hasStrikeBlock:p.hasStrikeBlock,dodgeChance:p.dodgeChance,vampLvl:p.vampLvl,vampChance:p.vampChance,level:p.level,exp:p.exp,etl:p.etl,pullOnHit:p.pullOnHit,arrowPierce:p.arrowPierce,rollDamageTrail:p.rollDamageTrail,hasGroundPound:p.hasGroundPound}};SaveSystem.save(this.currentSlot,data);this.ft.push(new FT(p.x+p.w/2,p.y-30,'SAVED!','#0fa'));}

backToMenu(){document.getElementById('PM').classList.remove('active');document.getElementById('DS').classList.remove('active');document.getElementById('CellShop').classList.remove('active');document.getElementById('Merchant').classList.remove('active');SFX.stopHeartbeat();this.paused=false;this.state='menu';this.showMainMenu();}

startLevel(li){const lvls=getAllLevels();this.lvl=li%lvls.length;const ld=lvls[this.lvl];this.world=new World(this.lvl);this.enemies=ld.enemies.map(e=>new Enemy(e.x,e.y,e.type,li));this.items=ld.items.map(it=>({x:it.x*32,y:it.y*32,type:it.type,collected:false,bob:Math.random()*Math.PI*2}));this.decos=ld.decos.filter(d=>d.type!=='barrel');this.barrels=ld.decos.filter(d=>d.type==='barrel').map(d=>{let fy=this.world.th-2;for(let y=d.y;y<this.world.th;y++)if(this.world.tiles[y]&&(this.world.tiles[y][d.x]===1||this.world.tiles[y][d.x]===2)){fy=y;break;}return new Barrel(d.x*32+4,fy*32-24);});this.decos=this.decos.map(d=>{let py=d.y*32;if(d.type==='chain'){let cy=1;for(let y=d.y;y>=0;y--)if(this.world.tiles[y]&&this.world.tiles[y][d.x]===1){cy=y;break;}py=cy*32+32;}else if(d.type==='bones'){let fy=this.world.th-2;for(let y=d.y;y<this.world.th;y++)if(this.world.tiles[y]&&(this.world.tiles[y][d.x]===1||this.world.tiles[y][d.x]===2)){fy=y;break;}py=fy*32;}else{let fy=this.world.th-2;for(let y=d.y;y<this.world.th;y++)if(this.world.tiles[y]&&(this.world.tiles[y][d.x]===1||this.world.tiles[y][d.x]===2)){fy=y;break;}py=fy*32-16;}return{x:d.x*32,y:py,type:d.type};});this.arrows=[];this.bombs=[];this.ft=[];this.slashArcs=[];this.particles=new PS();const sp=ld.spawn;this.player.x=sp.x*32;this.player.y=sp.y*32;this.player.vx=0;this.player.vy=0;this.player.hp=this.player.mhp;this.player.inv=0;this.player.atk=false;this.player.rl=false;this.player.maxFallSpeed=0;this.portalPos={x:ld.portal.x*32,y:ld.portal.y*32};this.levelName=ld.name;this.levelNameTimer=180;this.state='playing';this.stats.st=Date.now();this.actualLvl=li;SFX.stopMusic();}

showCellShop(){this.state='shop';SFX.portal();const el=document.getElementById('CellShop');const p=this.player;const items=[{id:'hp',name:'Vitality',desc:`+20 Max HP`,cost:2+this.ups.hp,fn:()=>{p.mhp+=20;p.hp=p.mhp;this.ups.hp++;}},{id:'dmg',name:'Brutality',desc:`+4 Sword DMG`,cost:2+this.ups.dmg,fn:()=>{p.weapons[0].damage+=4;this.ups.dmg++;}},{id:'bow',name:'Tactics',desc:`+3 Bow DMG`,cost:2+this.ups.bow,fn:()=>{p.weapons[1].damage+=3;this.ups.bow++;}},{id:'spd',name:'Swiftness',desc:`+0.3 Speed`,cost:3+this.ups.spd,fn:()=>{p.speed+=.3;this.ups.spd++;}},{id:'dodge',name:'Evasion',desc:`+5% Dodge`,cost:3+this.ups.dodge*2,dis:p.dodgeChance>=.3,fn:()=>{p.dodgeChance=Math.min(.3,p.dodgeChance+.05);this.ups.dodge++;}},{id:'vamp',name:'Vampirism',desc:`${(p.vampLvl+1)*4}% heal on kill`,cost:4+this.ups.vamp*3,fn:()=>{p.vampLvl++;p.vampChance=p.vampLvl*.04;this.ups.vamp++;}},{id:'heal',name:'Full Heal',desc:'Restore all HP',cost:1,fn:()=>{p.hp=p.mhp;}}];let h=`<div class="ov-title">COLLECTOR'S SHOP</div><div class="ov-sub">Spend cells (reset on death)</div><div class="ov-currency"><span style="color:#0fa">◆ ${p.cells}</span></div><div class="ov-grid">`;items.forEach((it,i)=>{const ca=p.cells<it.cost;const mx=it.dis;h+=`<div class="ov-item${ca||mx?' dis':''}" onclick="G.buyCellItem(${i})"><div class="nm">${it.name}</div><div class="ds">${it.desc}</div><div class="co" style="color:#0fa">◆ ${it.cost}</div>${mx?'<div class="tag">MAXED</div>':''}</div>`;});h+=`</div><div class="ov-skip" onclick="G.closeCellShop()">CONTINUE →</div>`;el.innerHTML=h;el.classList.add('active');this._ci=items;}
buyCellItem(i){const it=this._ci[i];if(!it.dis&&this.player.cells>=it.cost){this.player.cells-=it.cost;it.fn();SFX.pickup();this.showCellShop();}}
closeCellShop(){document.getElementById('CellShop').classList.remove('active');const nl=this.actualLvl+1;if(nl%2===0)this.showMerchant(nl);else this.startLevel(nl);}

showMerchant(nl){this.state='merchant';const el=document.getElementById('Merchant');const p=this.player;const items=[{id:'pot1',name:'Health Potion',desc:'+50 HP',cost:30,once:false,fn:()=>{p.hp=Math.min(p.hp+50,p.mhp);}},{id:'pot2',name:'Large Potion',desc:'+100 HP',cost:55,once:false,fn:()=>{p.hp=Math.min(p.hp+100,p.mhp);}},{id:'parry',name:'Parry Skill',desc:'Deflect arrows',cost:120,once:true,fn:()=>{p.hasParry=true;}},{id:'strikeblock',name:'Strike Block',desc:'Block while attacking',cost:100,once:true,fn:()=>{p.hasStrikeBlock=true;}},{id:'pull',name:'Graviton Blade',desc:'Sword pulls enemies',cost:80,once:true,fn:()=>{p.pullOnHit=true;}},{id:'pierce',name:'Pierce Arrows',desc:'Arrows pierce enemies',cost:90,once:true,fn:()=>{p.arrowPierce=true;}},{id:'rolltrail',name:'Shadow Trail',desc:'Roll damages enemies',cost:70,once:true,fn:()=>{p.rollDamageTrail=true;}},{id:'groundpound',name:'Seismic Landing',desc:'Damage enemies on hard landing',cost:60,once:true,fn:()=>{p.hasGroundPound=true;}},{id:'swd',name:'Sword Forge',desc:'+6 Sword DMG',cost:80,once:false,fn:()=>{p.weapons[0].damage+=6;}},{id:'bowup',name:'Bow Upgrade',desc:'+5 Bow DMG',cost:70,once:false,fn:()=>{p.weapons[1].damage+=5;}},{id:'boots',name:'Speed Boots',desc:'+0.5 Speed',cost:50,once:true,fn:()=>{p.speed+=.5;}},{id:'hpup',name:'Max HP +30',desc:'Permanent',cost:90,once:false,fn:()=>{p.mhp+=30;p.hp=Math.min(p.hp+30,p.mhp);}}];let h=`<div class="ov-title" style="color:#ffdd00">MERCHANT</div><div class="ov-sub">Gold purchases persist across deaths</div><div class="ov-currency"><span style="color:#fd0">● ${p.gold}g</span> &nbsp; <span style="color:#f44">HP ${Math.ceil(p.hp)}/${p.mhp}</span></div><div class="ov-grid">`;items.forEach((it,i)=>{const bought=it.once&&this.boughtOnce[it.id];const ca=p.gold<it.cost;let cls='ov-item';if(bought)cls+=' bought';else if(ca)cls+=' dis';h+=`<div class="${cls}" onclick="G.buyMerch(${i})"><div class="nm">${it.name}</div><div class="ds">${it.desc}</div><div class="co" style="color:#fd0">● ${it.cost}g</div>${bought?'<div class="tag">PURCHASED</div>':''}</div>`;});h+=`</div><div class="ov-skip" onclick="G.closeMerch()">LEAVE →</div>`;el.innerHTML=h;el.classList.add('active');this._mi=items;this._nl=nl;}
buyMerch(i){const it=this._mi[i];if((it.once&&this.boughtOnce[it.id]))return;if(this.player.gold>=it.cost){this.player.gold-=it.cost;it.fn();if(it.once)this.boughtOnce[it.id]=true;SFX.goldPickup();this.showMerchant(this._nl);}}
closeMerch(){document.getElementById('Merchant').classList.remove('active');this.startLevel(this._nl);}

togglePause(){
this.paused=!this.paused;
document.getElementById('PM').classList.toggle('active',this.paused);
if(this.paused){SFX.startMusic();}else{SFX.stopMusic();}
}

restart(){document.getElementById('PM').classList.remove('active');document.getElementById('DS').classList.remove('active');document.getElementById('CellShop').classList.remove('active');document.getElementById('Merchant').classList.remove('active');SFX.stopHeartbeat();SFX.stopMusic();this.paused=false;this.player=this.mkP();this.ups={hp:0,dmg:0,spd:0,bow:0,dodge:0,vamp:0};this.applyGoldPurchases();this.stats={cells:0,kills:0,gold:0,st:Date.now()};this.slashArcs=[];this.startLevel(0);}

applyGoldPurchases(){const p=this.player;const bo=this.boughtOnce;if(bo.parry)p.hasParry=true;if(bo.strikeblock)p.hasStrikeBlock=true;if(bo.pull)p.pullOnHit=true;if(bo.pierce)p.arrowPierce=true;if(bo.rolltrail)p.rollDamageTrail=true;if(bo.boots)p.speed+=.5;if(bo.groundpound)p.hasGroundPound=true;}

die(){this.state='dead';SFX.die();SFX.stopHeartbeat();this.permUpgrades.runs++;this.permUpgrades.totalKills+=this.stats.kills;this.permUpgrades.bonusHp=Math.floor(this.permUpgrades.runs/3)*5;this.permUpgrades.bonusDmg=Math.floor(this.permUpgrades.totalKills/15);this.savePerm();const el=Math.floor((Date.now()-this.stats.st)/1000);document.getElementById('dc').textContent=`Cells:${this.stats.cells}`;document.getElementById('dk').textContent=`Kills:${this.stats.kills}`;document.getElementById('dt2').textContent=`Time:${Math.floor(el/60)}:${(el%60).toString().padStart(2,'0')}`;document.getElementById('dperm').textContent=`Legacy: +${this.permUpgrades.bonusHp}HP +${this.permUpgrades.bonusDmg}DMG (Run #${this.permUpgrades.runs})`;document.getElementById('DS').classList.add('active');}

playerTakeDmg(dmg,kbDir){const p=this.player;if(p.dodgeChance>0&&U.ch(p.dodgeChance)){this.ft.push(new FT(p.x+p.w/2,p.y,'DODGE!','#4af'));SFX.dodge();p.inv=20;return;}if(p.hasStrikeBlock&&p.atk&&p.weapons[p.cw].type==='sword'){dmg=Math.ceil(dmg*0.3);this.ft.push(new FT(p.x+p.w/2,p.y-10,'BLOCK!','#88f'));SFX.block();this.shake.trigger(4,5);p.inv=15;p.hp-=Math.max(1,dmg-p.def);return;}if(p.shield>0){const ab=Math.min(dmg,p.shield);p.shield-=ab;dmg-=ab;this.ft.push(new FT(p.x+p.w/2,p.y-10,`BLOCK -${ab}`,'#88f'));SFX.block();if(dmg<=0){p.inv=15;return;}}dmg=Math.max(1,dmg-p.def);p.hp-=dmg;p.inv=40;p.vx=kbDir*5;p.vy=-4;
this.shake.trigger(8,10);this.ft.push(new FT(p.x+p.w/2,p.y,'-'+dmg,'#f00'));
this.particles.emit(p.x+p.w/2,p.y+p.h/2,10,{color:'#f00',size:3,life:18,vxMin:-4,vxMax:4,vyMin:-3,vyMax:1});const hpRatio=p.hp/p.mhp;if(hpRatio<=0.3)SFX.startHeartbeat(hpRatio);}

doMeleeHit(){const p=this.player,w=p.weapons[p.cw];const hb={x:p.facing===1?p.x+p.w:p.x-w.range,y:p.y-5,w:w.range,h:p.h+10};this.slashArcs.push(new SlashArc(p.facing===1?p.x+p.w:p.x,p.y+p.h/2,p.facing,w.range,'#adf'));let hit=false;for(const en of this.enemies){if(!en.alive)continue;if(U.rc(hb,{x:en.x,y:en.y,w:en.w,h:en.h})){const d=w.damage+U.ri(-3,3);en.hit(d,p.facing);hit=true;this.ft.push(new FT(en.x+en.w/2,en.y,d+'','#f44'));this.particles.emit(p.facing===1?en.x:en.x+en.w,en.y+en.h/2,8,{color:'#f44',size:3,life:18,vxMin:p.facing*1,vxMax:p.facing*5,vyMin:-3,vyMax:1});if(p.pullOnHit&&en.alive)en.vx+=-p.facing*3;if(!en.alive)this.onKill(en);}}for(const bl of this.barrels){if(!bl.alive)continue;if(U.rc(hb,{x:bl.x,y:bl.y,w:bl.w,h:bl.h})){bl.hp-=w.damage;if(bl.hp<=0){bl.alive=false;this.breakBarrel(bl);}hit=true;}}if(hit){SFX.swordHit();this.shake.trigger(5,7);this.ff=2;}}

breakBarrel(bl){this.particles.emit(bl.x+bl.w/2,bl.y+bl.h/2,15,{color:'#885522',size:4,life:25,vxMin:-5,vxMax:5,vyMin:-5,vyMax:1});const roll=Math.random();if(roll<.2){this.bombs.push(new Bomb(bl.x+bl.w/2-5,bl.y));this.ft.push(new FT(bl.x+bl.w/2,bl.y,'BOMB!','#f44'));}else if(roll<.5){for(let i=0;i<3;i++)this.spawnDrop(bl.x+U.rand(-8,8),bl.y,'gold');}else if(roll<.7)this.spawnDrop(bl.x,bl.y,'health');else if(roll<.9){for(let i=0;i<U.ri(1,3);i++)this.spawnDrop(bl.x+U.rand(-8,8),bl.y,'cell');}}

spawnDrop(x,y,type){this.items.push({x,y,type,collected:false,bob:Math.random()*Math.PI*2,vx:U.rand(-2,2),vy:U.rand(-3,-1),dropped:true,prevY:y});}

onKill(en){this.stats.kills++;this.player.exp+=en.exp;SFX.enemyDie();if(en.type==='elite'){const g=U.ri(15,25);this.stats.gold+=g;this.player.gold+=g;this.ft.push(new FT(en.x+en.w/2,en.y-20,'+'+g+'g','#fd0'));}if(this.player.vampLvl>0&&U.ch(this.player.vampChance)){const heal=Math.ceil(this.player.mhp*.05*this.player.vampLvl);this.player.hp=Math.min(this.player.hp+heal,this.player.mhp);this.ft.push(new FT(this.player.x+this.player.w/2,this.player.y-15,'+'+heal+' HP','#a4f'));}if(this.player.exp>=this.player.etl){this.player.exp-=this.player.etl;this.player.level++;this.player.etl=Math.floor(this.player.etl*1.5);this.player.mhp+=8;this.player.hp=Math.min(this.player.hp+15,this.player.mhp);this.ft.push(new FT(this.player.x+this.player.w/2,this.player.y-20,'LEVEL UP!','#fd0'));SFX.levelUp();}this.particles.emit(en.x+en.w/2,en.y+en.h/2,18,{color:en.type==='elite'?'#f60':'#a44',size:4,life:28,vxMin:-5,vxMax:5,vyMin:-5,vyMax:2});const cc=en.type==='elite'?U.ri(3,6):U.ri(0,2);for(let i=0;i<cc;i++)this.spawnDrop(en.x+U.rand(-20,20),en.y,'cell');for(let i=0;i<U.ri(1,3);i++)this.spawnDrop(en.x+U.rand(-15,15),en.y,'gold');}

updatePlayer(dt){const p=this.player,inp=this.input;const s=dt;if(p.hp<=0){this.die();return;}if(p.inv>0)p.inv-=s;if(p.acd>0)p.acd-=s;if(p.rlcd>0)p.rlcd-=s;if(p.scd>0)p.scd-=s;if(p.shieldTimer>0){p.shieldTimer-=s;if(p.shieldTimer<=0)p.shield=0;}const spT=this.world.getTilesAround(p.x,p.y,p.w,p.h);for(const t of spT)if(t.type===3&&U.rc({x:p.x,y:p.y,w:p.w,h:p.h},t)){if(p.inv<=0){this.playerTakeDmg(15,0);p.vy=-8;}}if(p.gr){p.cyt=8;p.dj=p.hdj;}else if(p.cyt>0)p.cyt-=s;if(p.jbt>0)p.jbt-=s;if(!p.gr&&p.vy>0)p.maxFallSpeed=Math.max(p.maxFallSpeed,p.vy);
if(p.rl){p.rlt-=s;p.vx=p.facing*p.rls;p.inv=3;if(p.rollDamageTrail){this.particles.emit(p.x+p.w/2,p.y+p.h,2,{color:'#48f',size:4,life:15,glow:true,vxMin:-1,vxMax:1,vyMin:0,vyMax:1,gravity:0});for(const en of this.enemies){if(!en.alive||this.rollDamagedEnemies.has(en))continue;if(U.dist(p.x+p.w/2,p.y+p.h/2,en.x+en.w/2,en.y+en.h/2)<40){const rdmg=8;en.hit(rdmg,p.facing);this.rollDamagedEnemies.add(en);this.ft.push(new FT(en.x+en.w/2,en.y,rdmg+'','#48f'));if(!en.alive)this.onKill(en);}}}if(p.rlt<=0){p.rl=false;this.rollDamagedEnemies.clear();}this.applyPP(s);return;}
const mx=inp.getMoveX();const atkSpeedMult=p.atk?0.5:1.0;if(Math.abs(mx)>.1){p.vx=U.lerp(p.vx,mx*p.speed*atkSpeedMult,p.gr?.2:.12);p.facing=mx>0?1:-1;}else{p.vx*=p.gr?.75:.92;if(Math.abs(p.vx)<.1)p.vx=0;}
if(inp.isJump()){if(!p.jmp){p.jbt=8;p.jmp=true;}}else p.jmp=false;if(p.jbt>0&&(p.cyt>0||p.dj)){if(p.cyt>0){p.vy=p.jf;p.cyt=0;}else if(p.dj){p.vy=p.jf*.85;p.dj=false;}p.jbt=0;p.gr=false;}if(!inp.isJump()&&p.vy<-2)p.vy*=.85;
if(inp.isSwap()){if(!this._sw){p.cw=(p.cw+1)%p.weapons.length;this._sw=true;}}else this._sw=false;
if(inp.isAttack()&&!p.atk&&p.acd<=0){p.atk=true;p.at=0;p.ad=p.weapons[p.cw].speed;p.acd=p.ad+4;if(p.weapons[p.cw].type==='bow'){this.arrows.push(new Arrow(p.x+p.w/2,p.y+p.h/2,p.facing*10,-1,p.weapons[p.cw].damage,'player'));SFX.bowShoot();}this.shake.trigger(3,4);}
if(p.atk){p.at+=s;if(p.at>=p.ad)p.atk=false;if(p.at>=4.5&&p.at<5.5+s&&p.weapons[p.cw].type==='sword')this.doMeleeHit();}
if(inp.isRoll()&&!p.rl&&p.rlcd<=0&&p.gr){p.rl=true;p.rlt=p.rld;p.rlcd=35;this.rollDamagedEnemies.clear();}
if(inp.isSkill()&&p.scd<=0){p.scd=p.smc;if(!p.gr){p.vy=15;}else{for(let i=-3;i<=3;i++){const a=new Arrow(p.x+p.w/2,p.y+p.h/2,i*3,-5+Math.abs(i),25,'player');a.life=60;this.arrows.push(a);setTimeout(()=>SFX.bowShoot(),(i+3)*30);}this.shake.trigger(8,10);}}
p.vy+=.55*s;p.vy=U.clamp(p.vy,-15,15);p.wallSliding=false;if(!p.gr&&p.vy>0){const wt=this.world.getTilesAround(p.x+p.facing*2,p.y,p.w,p.h);let tw=false;for(const t of wt)if(t.type===1&&U.rc({x:p.x+(p.facing===1?p.w:-4),y:p.y,w:4,h:p.h},t)){tw=true;break;}if(tw&&Math.abs(mx)>.3){p.vy=Math.min(p.vy,2);p.dj=true;p.wallSliding=true;if(this.fr%4===0)this.particles.emit(p.facing===1?p.x+p.w:p.x,p.y+p.h*0.7,1,{color:'#888',size:2,life:12,gravity:0.02,vxMin:p.facing*-1,vxMax:p.facing*-0.3,vyMin:-0.5,vyMax:0.5});}}
this.applyPP(s);
if(p.gr&&!p._wg){if(p.hasGroundPound&&p.maxFallSpeed>=18){this.shake.trigger(10,12);SFX.impact();this.particles.emit(p.x+p.w/2,p.y+p.h,20,{color:'#fa4',size:4,life:20,glow:true,vxMin:-6,vxMax:6,vyMin:-3,vyMax:0});const gpRadius=60;const pcx=p.x+p.w/2,pcy=p.y+p.h;for(const en of this.enemies){if(!en.alive)continue;const edist=U.dist(pcx,pcy,en.x+en.w/2,en.y+en.h/2);if(edist>gpRadius)continue;if(!hasLOS(this.world,pcx,pcy,en.x+en.w/2,en.y+en.h/2))continue;const gpDmg=Math.floor(p.maxFallSpeed*3);en.hit(gpDmg,Math.sign(en.x-p.x));this.ft.push(new FT(en.x+en.w/2,en.y,gpDmg+'','#fa0'));if(!en.alive)this.onKill(en);}}p.maxFallSpeed=0;}p._wg=p.gr;const hpRatio=p.hp/p.mhp;if(hpRatio>0.3)SFX.stopHeartbeat();}

applyPP(dt){const p=this.player;const s=dt||1;p.x+=p.vx*s;const hT=this.world.getTilesAround(p.x,p.y,p.w,p.h);for(const t of hT)if(t.type===1&&U.rc({x:p.x,y:p.y,w:p.w,h:p.h},t)){if(p.vx>0)p.x=t.x-p.w;else if(p.vx<0)p.x=t.x+t.w;p.vx=0;}const prevY=p.y;p.y+=p.vy*s;p.gr=false;const vT=this.world.getTilesAround(p.x,p.y,p.w,p.h);for(const t of vT){if(!U.rc({x:p.x,y:p.y,w:p.w,h:p.h},t))continue;if(t.type===2){if(p.vy>0&&prevY+p.h<=t.y+2&&!this.input.isDown()){p.y=t.y-p.h;p.vy=0;p.gr=true;}}else if(t.type===1){if(p.vy>0){p.y=t.y-p.h;p.gr=true;}else if(p.vy<0)p.y=t.y+t.h;p.vy=0;}}}

updateEnemies(dt){const p=this.player;for(const en of this.enemies){if(!en.alive)continue;en.update(this.world,p,this,dt);if(!en.archer&&!en.isWindingUp&&en.elitePhase!=='dash'&&en.elitePhase!=='strike'&&U.rc({x:en.x,y:en.y,w:en.w,h:en.h},{x:p.x,y:p.y,w:p.w,h:p.h})){if(p.inv<=0&&!p.rl)this.playerTakeDmg(Math.ceil(en.dmg*.4),Math.sign(p.x-en.x));}}this.enemies=this.enemies.filter(e=>e.alive||e.hf>0);}

updateArrows(dt){const p=this.player;this.arrows=this.arrows.filter(ar=>{if(ar.dead)return false;if(!ar.update(this.world,dt))return false;if(ar.stuck)return true;if(ar.owner==='enemy'){if(U.rc({x:ar.x-4,y:ar.y-4,w:8,h:8},{x:p.x,y:p.y,w:p.w,h:p.h})){if(p.inv<=0&&!p.rl){if(p.hasParry&&p.atk&&p.at<8&&p.weapons[p.cw].type==='sword'){ar.vx*=-1.5;ar.vy*=-1;ar.owner='player';ar.dmg*=2;ar.life=120;this.ft.push(new FT(p.x+p.w/2,p.y-10,'PARRY!','#ff0'));SFX.parry();this.shake.trigger(6,8);return true;}this.playerTakeDmg(ar.dmg,Math.sign(ar.vx));ar.dead=true;return false;}}}else if(ar.owner==='player'){for(const en of this.enemies){if(!en.alive)continue;if(U.rc({x:ar.x-4,y:ar.y-4,w:8,h:8},{x:en.x,y:en.y,w:en.w,h:en.h})){en.hit(ar.dmg,Math.sign(ar.vx));this.ft.push(new FT(en.x+en.w/2,en.y,ar.dmg+'','#fa4'));SFX.hit();if(!en.alive)this.onKill(en);if(p.arrowPierce){ar.dmg=Math.ceil(ar.dmg*0.7);continue;}ar.dead=true;return false;}}}return true;});}

updateBombs(dt){const ex=[];this.bombs=this.bombs.filter(b=>{if(!b.update(this.world,dt)){ex.push(b);return false;}return true;});for(const b of ex){this.shake.trigger(12,15);SFX.explosion();this.particles.emit(b.x+5,b.y+5,30,{color:'#f60',size:5,life:30,glow:true,vxMin:-8,vxMax:8,vyMin:-8,vyMax:2});const p=this.player;if(U.dist(p.x+p.w/2,p.y+p.h/2,b.x+5,b.y+5)<b.radius&&p.inv<=0&&!p.rl)this.playerTakeDmg(b.dmg,Math.sign(p.x-b.x));for(const en of this.enemies){if(!en.alive)continue;if(U.dist(en.x+en.w/2,en.y+en.h/2,b.x+5,b.y+5)<b.radius){en.hit(b.dmg,Math.sign(en.x-b.x));if(!en.alive)this.onKill(en);}}}}

updateItems(dt){const p=this.player;const s=dt||1;for(const it of this.items){if(it.collected)continue;if(it.dropped&&it.vx!==undefined){it.prevY=it.y;it.x+=it.vx*s;it.y+=it.vy*s;it.vy+=.3*s;it.vx*=Math.pow(.95,s);const tiles=this.world.getTilesAround(it.x,it.y,12,12);for(const t of tiles){if(t.type===1&&U.rc({x:it.x,y:it.y,w:12,h:12},t)){if(it.vy>0){it.y=t.y-12;it.vy=-it.vy*.3;if(Math.abs(it.vy)<1){it.vy=0;it.vx=0;it.dropped=false;}}else if(it.vy<0){it.y=t.y+t.h;it.vy=0;}}if(t.type===2&&it.vy>0&&(it.prevY+12)<=t.y+2&&U.rc({x:it.x,y:it.y,w:12,h:12},t)){it.y=t.y-12;it.vy=-it.vy*.3;if(Math.abs(it.vy)<1){it.vy=0;it.vx=0;it.dropped=false;}}}}const ix=it.x+6,iy=it.y+6,px=p.x+p.w/2,py=p.y+p.h/2,d=U.dist(px,py,ix,iy);if(d<80&&hasLOS(this.world,px,py,ix,iy)){const a=Math.atan2(py-iy,px-ix);it.x+=Math.cos(a)*4*s;it.y+=Math.sin(a)*4*s;}if(d<25){if(it.type==='cell'){it.collected=true;this.stats.cells++;p.cells++;this.ft.push(new FT(it.x,it.y,'+1','#0fa'));SFX.pickup();}else if(it.type==='health'){it.collected=true;p.hp=Math.min(p.hp+25,p.mhp);this.ft.push(new FT(it.x,it.y,'+25','#4f4'));SFX.healthPickup();}else if(it.type==='gold'){it.collected=true;const g=U.ri(5,15);this.stats.gold+=g;p.gold+=g;this.ft.push(new FT(it.x,it.y,'+'+g+'g','#fd0'));SFX.goldPickup();}}}if(U.dist(p.x+p.w/2,p.y+p.h/2,this.portalPos.x+16,this.portalPos.y+16)<40){this.showCellShop();return;}this.items=this.items.filter(i=>!i.collected);}

updateCamera(){const p=this.player;this.cam.x=U.lerp(this.cam.x,p.x+p.w/2-canvas.width/3.2+p.facing*40,.1);this.cam.y=U.lerp(this.cam.y,p.y+p.h/2-canvas.height/3.0-20,.08);this.cam.x=U.clamp(this.cam.x,0,Math.max(0,this.world.pw-canvas.width));this.cam.y=U.clamp(this.cam.y,0,Math.max(0,this.world.ph-canvas.height));}

update(dt){if(this.state!=='playing'||this.paused)return;if(this.ff>0){this.ff-=dt;return;}this.fr++;this.updatePlayer(dt);this.updateEnemies(dt);this.updateArrows(dt);this.updateBombs(dt);this.updateItems(dt);this.updateCamera();this.particles.update(dt);this.shake.update(dt);this.ft=this.ft.filter(f=>f.update(dt));this.slashArcs=this.slashArcs.filter(s=>s.update());if(this.levelNameTimer>0)this.levelNameTimer-=dt;}

draw(){const c=ctx;c.clearRect(0,0,canvas.width,canvas.height);if(this.state==='loading'||this.state==='menu')return;const cam={x:this.cam.x+this.shake.x,y:this.cam.y+this.shake.y};const lvls=getAllLevels(),ld=lvls[this.lvl%lvls.length];const g=c.createLinearGradient(0,0,0,canvas.height);g.addColorStop(0,ld.bg1);g.addColorStop(.5,ld.bg2);g.addColorStop(1,ld.bg1);c.fillStyle=g;c.fillRect(0,0,canvas.width,canvas.height);this.world.draw(c,cam);
for(const d of this.decos){const sx=d.x-cam.x,sy=d.y-cam.y;if(sx<-60||sx>canvas.width+60)continue;if(d.type==='torch'){c.fillStyle='#554433';c.fillRect(sx+12,sy-16,8,16);const fl=Math.sin(Date.now()/100+d.x)*2;c.fillStyle='#ff6600';c.shadowColor='#ff4400';c.shadowBlur=14+fl;c.fillRect(sx+11,sy-24+fl,10,8);c.shadowBlur=0;}else if(d.type==='chain'){c.strokeStyle='#555';c.lineWidth=2;for(let i=0;i<7;i++)c.strokeRect(sx+14,sy+i*10,4,8);}else if(d.type==='banner'){const w2=Math.sin(Date.now()/500+d.x)*3;c.fillStyle='#440022';c.beginPath();c.moveTo(sx+10,sy);c.lineTo(sx+22,sy);c.lineTo(sx+22+w2,sy+32);c.lineTo(sx+16+w2,sy+26);c.lineTo(sx+10+w2,sy+32);c.closePath();c.fill();c.fillStyle='#663';c.fillRect(sx+8,sy-2,16,4);}else if(d.type==='bones'){c.fillStyle='#aaa';c.fillRect(sx+4,sy-4,14,2);c.fillRect(sx+8,sy-8,2,10);c.fillStyle='#bbb';c.fillRect(sx+14,sy-10,8,8);c.fillStyle='#222';c.fillRect(sx+15,sy-8,2,2);c.fillRect(sx+19,sy-8,2,2);}}
for(const bl of this.barrels)bl.draw(c,cam);
for(const it of this.items){if(it.collected)continue;const sx=it.x-cam.x,sy=it.y-cam.y+Math.sin(Date.now()/400+it.bob)*3;if(sx<-20||sx>canvas.width+20)continue;c.save();if(it.type==='cell'){c.fillStyle='#0fa';c.shadowColor='#0fa';c.shadowBlur=10;c.fillRect(sx+2,sy+2,8,8);c.shadowBlur=0;}else if(it.type==='health'){c.fillStyle='#f44';c.shadowColor='#f00';c.shadowBlur=8;c.fillRect(sx+3,sy+1,6,12);c.fillRect(sx,sy+4,12,6);c.shadowBlur=0;}else if(it.type==='gold'){c.fillStyle='#fd0';c.shadowColor='#fa0';c.shadowBlur=6;c.beginPath();c.arc(sx+6,sy+6,5,0,Math.PI*2);c.fill();c.shadowBlur=0;}c.restore();}
const pp=this.portalPos,psx=pp.x-cam.x,psy=pp.y-cam.y;if(psx>-60&&psx<canvas.width+60){c.save();const pulse=Math.sin(Date.now()/300)*.3+.7;c.strokeStyle='#a0f';c.shadowColor='#a0f';c.shadowBlur=20*pulse;c.lineWidth=3;c.beginPath();c.ellipse(psx+16,psy+16,20,28,0,0,Math.PI*2);c.stroke();c.shadowBlur=0;c.restore();}
for(const en of this.enemies){if(!en.alive)continue;const sx=en.x-cam.x;if(sx>-60&&sx<canvas.width+60)en.draw(c,cam);}
for(const sa of this.slashArcs)sa.draw(c,cam);
if(this.state==='playing'){c.save();if(this.player.inv>0)c.globalAlpha=.5+Math.sin(this.player.inv*8)*.3;this.drawPlayer(c,cam);c.restore();}
for(const ar of this.arrows)ar.draw(c,cam);for(const b of this.bombs)b.draw(c,cam);this.particles.draw(c,cam);for(const f of this.ft)f.draw(c,cam);this.drawHUD(c);
const vg=c.createRadialGradient(canvas.width/2,canvas.height/2,canvas.width*.28,canvas.width/2,canvas.height/2,canvas.width*.65);vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,.5)');c.fillStyle=vg;c.fillRect(0,0,canvas.width,canvas.height);
if(this.player.hp<this.player.mhp*.3){c.fillStyle=`rgba(255,0,0,${(1-this.player.hp/(this.player.mhp*.3))*.12*(Math.sin(Date.now()/300)*.5+.5)})`;c.fillRect(0,0,canvas.width,canvas.height);}}

drawPlayer(c,cam){const p=this.player,x=Math.round(p.x-cam.x),y=Math.round(p.y-cam.y),w=p.w,h=p.h,d=p.facing;c.save();c.translate(x+w/2,y+h/2);if(d===-1)c.scale(-1,1);if(p.atk)c.rotate(Math.sin(p.at/p.ad*Math.PI)*.3);if(p.rl){c.rotate(p.rlt/p.rld*Math.PI*2*p.facing);c.globalAlpha=.6;}if(p.wallSliding)c.scale(0.85,1.1);const bob=p.gr?Math.sin(Date.now()/200)*1:0;c.fillStyle='#3300aa';c.beginPath();c.moveTo(-w/2+2,-h/2+8+bob);c.quadraticCurveTo(-w/2-6,bob,-w/2-2,h/2-2+bob+Math.sin(Date.now()/300)*3);c.lineTo(-w/2+8,h/2+bob);c.closePath();c.fill();const tg=c.createLinearGradient(-w/2,-h/2,w/2,h/2);tg.addColorStop(0,'#1a5544');tg.addColorStop(.5,'#0d3322');tg.addColorStop(1,'#1a5544');c.fillStyle=tg;c.fillRect(-w/2+3,-h/2+6+bob,w-6,h-16);if(p.wallSliding){c.fillStyle='#0d3322';c.fillRect(-w/2-4,-h/2+10+bob,4,6);c.fillRect(w/2,-h/2+10+bob,4,6);}c.fillStyle='#1a4433';c.fillRect(-4,h/2-8+bob,4,8);c.fillRect(2,h/2-8+bob,4,8);c.fillStyle='#00bb88';c.fillRect(-5,-h/2+bob,12,10);c.fillStyle='#ff0';c.shadowColor='#fa0';c.shadowBlur=6;c.fillRect(2,-h/2+3+bob,3,3);c.fillRect(6,-h/2+3+bob,3,3);c.shadowBlur=0;if(p.shield>0){c.fillStyle=`rgba(100,150,255,${.12+Math.sin(Date.now()/200)*.04})`;c.beginPath();c.arc(0,0,22,0,Math.PI*2);c.fill();}const wep=p.weapons[p.cw];c.save();if(p.atk)c.rotate(-1.5+p.at/p.ad*Math.PI);else c.rotate(-.5);if(wep.type==='sword'){c.fillStyle='#adf';c.shadowColor='#48f';c.shadowBlur=4;c.fillRect(6,-2,wep.range*.6,3);c.shadowBlur=0;c.fillStyle='#863';c.fillRect(2,-2,6,4);c.fillStyle='#da3';c.fillRect(5,-4,2,8);}else if(wep.type==='bow'){c.strokeStyle='#863';c.lineWidth=2;c.beginPath();c.arc(8,0,12,-.8,.8);c.stroke();c.strokeStyle='#aaa';c.lineWidth=1;c.beginPath();c.moveTo(8,-9);c.lineTo(8,9);c.stroke();}c.restore();c.restore();}

drawHUD(c){const p=this.player,pad=10,cw=canvas.width,hbw=Math.min(150,cw*.18),hbh=10;c.fillStyle='rgba(0,0,0,.6)';c.fillRect(pad-1,pad-1,hbw+2,hbh+2);c.fillStyle='#311';c.fillRect(pad,pad,hbw,hbh);const hp=p.hp/p.mhp;c.fillStyle=hp>.5?'#4d4':hp>.25?'#da0':'#d22';c.fillRect(pad,pad,hbw*hp,hbh);c.fillStyle='#fff';c.font='bold 9px Courier New';c.textAlign='left';c.fillText(`${Math.ceil(p.hp)}/${p.mhp}`,pad+3,pad+8);let sy2=pad+hbh+4;c.fillStyle='#0fa';c.font='bold 11px Courier New';c.fillText(`◆${p.cells}`,pad,sy2+10);c.fillStyle='#fd0';c.fillText(`●${p.gold}`,pad+60,sy2+10);c.fillStyle='#aaf';c.fillText(`LV${p.level}`,pad,sy2+24);c.fillStyle='rgba(0,0,0,.5)';c.fillRect(pad,sy2+28,100,14);c.fillStyle='#adf';c.font='9px Courier New';c.fillText(`⚔ ${p.weapons[p.cw].name}`,pad+3,sy2+38);
if(this.levelNameTimer>0){c.save();c.globalAlpha=Math.min(1,this.levelNameTimer/30);c.fillStyle='#0fa';c.font='bold 18px Courier New';c.textAlign='center';c.shadowColor='#0fa';c.shadowBlur=12;c.fillText(this.levelName+(this.actualLvl>0?' (Cycle '+(Math.floor(this.actualLvl/getAllLevels().length)+1)+')':''),cw/2,canvas.height*.18);c.restore();}this.drawControls(c);this.drawMinimap(c);}

drawControls(c){const z=this.input.getZones(),p=this.player;c.save();const db=(x,y,w,h,l,col,on)=>{c.globalAlpha=on?.35:.14;c.fillStyle='rgba(0,0,0,.5)';c.fillRect(x,y,w,h);c.strokeStyle=col;c.lineWidth=2;c.strokeRect(x,y,w,h);c.fillStyle=col;c.font='bold 18px sans-serif';c.textAlign='center';c.textBaseline='middle';c.fillText(l,x+w/2,y+h/2);};db(z.left.x,z.left.y,z.left.w,z.left.h,'◀','#0fa',this.input.btns.left);db(z.right.x,z.right.y,z.right.w,z.right.h,'▶','#0fa',this.input.btns.right);db(z.down.x,z.down.y,z.down.w,z.down.h,'▼','#0af',this.input.btns.down);const dc=(cx,cy,r,l,col,on,sl)=>{c.globalAlpha=on?.4:.16;c.beginPath();c.arc(cx,cy,r,0,Math.PI*2);c.fillStyle='rgba(0,0,0,.5)';c.fill();c.strokeStyle=col;c.lineWidth=2;c.stroke();c.fillStyle=col;c.font=`bold ${r*.5}px Courier New`;c.textAlign='center';c.textBaseline='middle';c.fillText(l,cx,cy-(sl?4:0));if(sl){c.font=`${r*.3}px Courier New`;c.globalAlpha*=.7;c.fillText(sl,cx,cy+r*.35);}};dc(z.jump.cx,z.jump.cy,z.jump.r,'▲','#4f4',this.input.btns.jump,'JMP');const atkLabel=p.weapons[p.cw].type==='sword'?'⚔':'🏹';const atkSub=p.weapons[p.cw].type==='sword'?'ATK':'BOW';dc(z.attack.cx,z.attack.cy,z.attack.r,atkLabel,'#f44',this.input.btns.attack,atkSub);dc(z.roll.cx,z.roll.cy,z.roll.r,'↻','#48f',this.input.btns.roll,'RLL');dc(z.skill.cx,z.skill.cy,z.skill.r,'✦','#f80',this.input.btns.skill,'SKL');dc(z.swap.cx,z.swap.cy,z.swap.r,'⇄','#da3',this.input.btns.swap,'SWAP');c.restore();}

drawMinimap(c){const mmW=Math.min(120,canvas.width*.12),mmH=Math.min(60,canvas.height*.15),mx=canvas.width-mmW-8,my=8,scX=mmW/this.world.pw,scY=mmH/this.world.ph;c.save();c.globalAlpha=.5;c.fillStyle='rgba(0,0,0,.7)';c.fillRect(mx-1,my-1,mmW+2,mmH+2);for(let ty=0;ty<this.world.th;ty++)for(let tx=0;tx<this.world.tw;tx++){const t=this.world.tiles[ty]?this.world.tiles[ty][tx]:0;if(!t)continue;c.fillStyle=t===1?'#445':t===2?'#336':'#622';c.fillRect(mx+tx*this.world.ts*scX,my+ty*this.world.ts*scY,Math.max(1,this.world.ts*scX),Math.max(1,this.world.ts*scY));}c.strokeStyle='rgba(255,255,255,.3)';c.strokeRect(mx+this.cam.x*scX,my+this.cam.y*scY,canvas.width*scX,canvas.height*scY);c.fillStyle='#f44';for(const en of this.enemies)if(en.alive)c.fillRect(mx+en.x*scX,my+en.y*scY,2,2);c.fillStyle='#0f0';c.fillRect(mx+this.player.x*scX-1,my+this.player.y*scY-1,3,3);c.fillStyle='#a0f';c.fillRect(mx+this.portalPos.x*scX-1,my+this.portalPos.y*scY-1,3,3);c.restore();}

loop(timestamp){if(!this.lastTime)this.lastTime=timestamp;const elapsed=Math.min(timestamp-this.lastTime,100);this.lastTime=timestamp;this.accumulator+=elapsed;while(this.accumulator>=this.TARGET_MS){this.update(this.FIXED_DT);this.accumulator-=this.TARGET_MS;}this.draw();requestAnimationFrame((t)=>this.loop(t));}
start(){this.fr=0;this.ff=0;requestAnimationFrame((t)=>this.loop(t));}
}

const G=new Game();G.start();
</script></body></html>
